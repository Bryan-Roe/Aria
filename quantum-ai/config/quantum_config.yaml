azure:
  location: eastus
  resource_group: rg-quantum-ai
  storage_account: quantumstorage
  subscription_id: ''
  workspace_name: quantum-ai-workspace
logging:
  level: INFO
  results_dir: ./results
  save_results: true
ml:
  data:
    feature_dimension: 4
    train_test_split: 0.8
  model:
    entanglement: linear  # OPTIMIZED: 82.5% (was: full 52.5%)
    n_layers: 3  # OPTIMIZED: 87.5% (was: 2 layers 77.5%)
    n_qubits: 4
  training:
    batch_size: 32
    epochs: 100  # Restored for full training
    learning_rate: 0.1  # OPTIMIZED: 90.0% (was: 0.01 85.0%)
    validation_split: 0.2
quantum:
  hardware:
    optimization_level: 2
    shots: 500
  provider: ionq
  simulator:
    backend: default.qubit
    shots: 1024
