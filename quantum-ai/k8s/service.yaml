apiVersion: v1
kind: Service
metadata:
  name: quantum-ai-api
  labels:
    app: quantum-ai-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5050
    protocol: TCP
    name: http
  selector:
    app: quantum-ai-api
---
apiVersion: v1
kind: Service
metadata:
  name: quantum-ai-api-lb
  labels:
    app: quantum-ai-api
spec:
  type: LoadBalancer
  ports:
  - port: 5050
    targetPort: 5050
    protocol: TCP
    name: http
  selector:
    app: quantum-ai-api
