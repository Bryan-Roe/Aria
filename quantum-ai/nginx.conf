upstream quantum_api {
    least_conn;
    server localhost:5050 max_fails=3 fail_timeout=30s;
    # For multiple instances:
    # server quantum-api-1:5050;
    # server quantum-api-2:5050;
}

# HTTP server
server {
    listen 80;
    server_name quantum-ai.example.com;

    # Redirect to HTTPS (uncomment in production)
    # return 301 https://$server_name$request_uri;

    # Or serve directly on HTTP
    location / {
        proxy_pass http://quantum_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Health checks
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # Health check endpoint (bypass proxy for monitoring)
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

