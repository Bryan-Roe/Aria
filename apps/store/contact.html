<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - TechDrop</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../global-upgrade.css">
</head>
<body>

  <div id="header-slot"></div>

  <main>
    <div class="page-header">
      <div class="container">
        <h1>Contact Us</h1>
        <p>Have a question or want to inquire about a product? We'd love to hear from you.</p>
      </div>
    </div>

    <section class="contact-section">
      <div class="container">
        <div class="contact-grid">
          <div class="contact-form">
            <h2>Send a Message</h2>
            <form id="contactForm">
              <div class="form-group">
                <label for="contactName">Your Name</label>
                <input type="text" id="contactName" required placeholder="John Doe">
              </div>
              <div class="form-group">
                <label for="contactEmail">Your Email</label>
                <input type="email" id="contactEmail" required placeholder="john@example.com">
              </div>
              <div class="form-group">
                <label for="contactSubject">Subject</label>
                <input type="text" id="contactSubject" placeholder="Product inquiry, question, etc.">
              </div>
              <div class="form-group">
                <label for="contactMessage">Message</label>
                <textarea id="contactMessage" required placeholder="Tell us how we can help..."></textarea>
              </div>
              <button type="submit" class="btn btn-primary" style="width:100%;">
                <i class="fa-solid fa-paper-plane"></i> Send Message
              </button>
            </form>
          </div>

          <div class="contact-info">
            <h2>Get in Touch</h2>
            <div class="contact-info-item">
              <i class="fa-solid fa-envelope"></i>
              <div>
                <h4>Email</h4>
                <p>contact@example.com</p>
              </div>
            </div>
            <div class="contact-info-item">
              <i class="fa-solid fa-clock"></i>
              <div>
                <h4>Business Hours</h4>
                <p>Monday - Friday: 9am - 6pm<br>Saturday: 10am - 4pm</p>
              </div>
            </div>
            <div class="contact-info-item">
              <i class="fa-solid fa-comments"></i>
              <div>
                <h4>Response Time</h4>
                <p>We typically respond within 24 hours.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-slot"></div>

  <script src="js/products.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
  <script>initContactPage();</script>
    <script src="../global-upgrade.js"></script>
</body>
</html>
