[pytest]
# PyTest configuration for QAI workspace
testpaths = 
    cooking-ai/tests
    tests
    quantum-ai/tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Increase verbosity and improve Test Explorer integration
addopts = -v --tb=short --no-header --color=yes

# Markers for conditional test execution
markers =
    azure: tests requiring Azure Quantum credentials (deselect with '-m "not azure"')
    slow: slow-running tests (deselect with '-m "not slow"')
    integration: integration tests requiring external services
    unit: fast unit tests
    playwright: Playwright-based E2E tests requiring Playwright and browser installation
    selenium: Selenium-based E2E tests requiring Selenium and remote Chrome
    e2e: End-to-end browser tests (includes playwright and selenium)
    pyppeteer: Pyppeteer-based E2E tests requiring pyppeteer and Chromium
    asyncio: async tests using pytest-asyncio

# Ignore virtual environments and build artifacts
norecursedirs = venv venv_* __pycache__ .git results data_out mount __blobstorage__ __queuestorage__
