[pytest]
markers =
    unit: Unit tests
    slow: Slow tests that may take significant time
    azure: Tests requiring Azure services
    integration: Integration tests
    e2e: End-to-end tests
    playwright: Tests using Playwright browser automation
    pyppeteer: Tests using Pyppeteer browser automation
    selenium: Tests using Selenium browser automation
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
