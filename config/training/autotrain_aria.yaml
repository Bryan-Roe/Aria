version: 1

# Aria Movement Command Training Configuration
# Trains AI to generate [aria:action:direction] commands for character movement

jobs:
  # Quick training for Aria movement commands (testing)
  - name: aria_movement_quick
    category: specialized
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/aria_movement
    save_dir: data_out/aria_models/aria_quick
    epochs: 2
    max_train_samples: 40
    max_eval_samples: 10
    learning_rate: 0.0003  # Higher LR for specialized task
    lora_dropout: 0.05     # Lower dropout for small dataset
    hf_model_id: microsoft/Phi-3.5-mini-instruct
    device: auto
    description: Quick training on aria movement dataset for testing

  # Full training for Aria movement commands
  - name: aria_movement_full
    category: specialized
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/aria_movement
    save_dir: data_out/aria_models/aria_full
    epochs: 3
    max_train_samples: null  # Use all samples
    max_eval_samples: null
    learning_rate: 0.0003
    lora_dropout: 0.05
    hf_model_id: microsoft/Phi-3.5-mini-instruct
    device: auto
    description: Full training on complete aria movement dataset

  # Qwen variant for Aria movement
  - name: aria_movement_qwen
    category: specialized
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/aria_movement
    save_dir: data_out/aria_models/aria_qwen
    epochs: 3
    max_train_samples: null
    max_eval_samples: null
    learning_rate: 0.0003
    lora_dropout: 0.05
    hf_model_id: Qwen/Qwen2.5-3B-Instruct
    device: auto
    description: Qwen model trained on aria movement commands
