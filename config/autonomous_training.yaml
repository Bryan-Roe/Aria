# Autonomous AI Training Configuration
# This file controls automatic learning cycles and data collection

autonomous_mode:
  enabled: true
  continuous: true  # Set to false for single-cycle mode
  cycle_interval_minutes: 30  # Time between training cycles
  max_cycles: 0  # 0 = infinite, set to positive number to limit cycles

data_collection:
  auto_discover: true  # Automatically scan for new datasets
  min_datasets: 500  # Minimum datasets to maintain
  quality_threshold: 50  # Minimum quality score (0-100)
  categories:
    - quantum
    - chat
    - vision
  sources:
    - openml
    - huggingface
    - kaggle
  parallel_downloads: 10  # Concurrent downloads

training:
  auto_train: true
  epochs_progression:  # Progressive epoch training
    - 25
    - 50
    - 100
    - 200
  workers: 20  # Parallel training workers
  min_accuracy_threshold: 0.75
  adaptive_epochs: true  # Automatically adjust epochs based on performance
  checkpoint_frequency: 10  # Save checkpoint every N datasets

optimization:
  auto_tune: true  # Enable automatic hyperparameter tuning
  hyperparameter_search: true
  architecture_evolution: false  # Neural architecture search (experimental)
  pruning_enabled: false  # Model pruning (experimental)

monitoring:
  track_metrics: true
  alert_on_degradation: true
  performance_threshold: 0.70  # Alert if accuracy drops below this

deployment:
  auto_deploy_best: false  # Automatically deploy models meeting criteria
  min_accuracy_for_deployment: 0.90
  azure_quantum_enabled: false  # Deploy to Azure Quantum

# Advanced Settings
learning_strategy:
  curriculum_learning: false  # Start with easier datasets
  active_learning: false  # Prioritize uncertain predictions
  transfer_learning: false  # Use pre-trained models

resource_management:
  max_gpu_memory_gb: 0  # 0 = use all available
  max_cpu_cores: 20
  disk_space_warning_gb: 50  # Alert when disk space below this

notifications:
  enabled: false
  email: ""
  slack_webhook: ""
  alert_on_completion: false
  alert_on_error: true
