# For evaluation_script.py compatibility
jobs:
  - model_path: data_out/lora_training/phi35_mixed_chat
    dataset_path: datasets/chat/mixed_chat
  - model_path: data_out/lora_training/phi35_dolly
    dataset_path: datasets/chat/dolly
# Batch Evaluation Configuration

evaluation_tasks:
  - model_id: lora_phi35_mixed
    model_type: lora
    model_path: data_out/lora_training/phi35_mixed_chat
    dataset: datasets/chat/mixed_chat
    metrics:
      - accuracy
      - perplexity
      - bleu
    max_samples: 100
    batch_size: 8

  - model_id: lora_phi35_dolly
    model_type: lora
    model_path: data_out/lora_training/phi35_dolly
    dataset: datasets/chat/dolly
    metrics:
      - accuracy
      - perplexity
      - f1_score
    max_samples: 100
    batch_size: 8

  - model_id: quantum_heart
    model_type: quantum
    model_path: quantum_heart_classifier
    dataset: datasets/quantum/heart_disease.csv
    metrics:
      - accuracy
      - precision
      - recall
    max_samples: 50
    batch_size: 4

  - model_id: local_baseline
    model_type: local
    model_path: local_model
    dataset: datasets/chat/mixed_chat
    metrics:
      - accuracy
      - response_time
    max_samples: 50
    batch_size: 8
