trigger:
- main

pool:
  vmImage: 'windows-latest'

variables:
- name: LOGIC_APP_URL
  value: ''  # Set via variable group or pipeline variable

stages:
- stage: QuantumOrchestration
  jobs:
  - job: Run
    steps:
    - task: AzureCLI@2
      displayName: 'Login to Azure and run orchestration'
      inputs:
        azureSubscription: 'YOUR-SERVICE-CONNECTION'  # Replace with your DevOps service connection
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          pwsh -NoLogo -NonInteractive -File "$(Build.SourcesDirectory)/ai-projects/quantum-ml/azure/quantum_master_orchestration.ps1" -ResourceGroup rg-quantum-ai -WorkspaceName quantum-ai-workspace -Location eastus
          # Or run the Logic App version and pass the URL:
          # pwsh -File "$(Build.SourcesDirectory)/ai-projects/quantum-ml/azure/quantum_full_logicapp_orchestration.ps1" -LogicAppUrl "$(LOGIC_APP_URL)"
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.SourcesDirectory)'
        ArtifactName: 'repo'
        publishLocation: 'Container'
