$schema: https://azuremlschemas.azureedge.net/latest/sweepJob.schema.json

name: qai-lora-sweep
experiment_name: phi36-lora-hpo
compute: azureml:gpu-cluster
code: ../../..

sampling_algorithm: random
max_concurrent_trials: 4
objective:
  goal: minimize
  primary_metric: eval_loss

trial:
  command: >-
    python AI/microsoft_phi-silica-3.6_v1/scripts/train_lora.py
    --config AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    --save-dir ${{outputs.model_out}}
    --train-manifest ${{inputs.train_manifest}}
    --eval-manifest ${{inputs.eval_manifest}}
    --hf-model-id ${{inputs.hf_model_id}}
    --max-train-samples ${{inputs.max_train_samples}}
    --max-eval-samples ${{inputs.max_eval_samples}}
    --learning-rate ${{search_space.learning_rate}}
    --lora-dropout ${{search_space.lora_dropout}}
    --epochs ${{search_space.epochs}}
    --train-batch-size ${{search_space.train_batch_size}}
    --eval-batch-size ${{search_space.eval_batch_size}}
    --no-stream
  environment: azureml:AzureML-pytorch-2.4-ubuntu22.04-py310-cuda12@latest
  # environment:
  #   build:
  #     conda_file: azureml/environment.yml
  inputs:
    train_manifest:
      type: uri_file
      path: azureml://datastores/workspaceblobstore/paths/qai/datasets/dolly/manifest.txt
      mode: ro_mount
    eval_manifest:
      type: uri_file
      path: azureml://datastores/workspaceblobstore/paths/qai/datasets/dolly/manifest.txt
      mode: ro_mount
    hf_model_id:
      type: string
      value: microsoft/Phi-3.5-mini-instruct
    max_train_samples:
      type: integer
      value: 1024
    max_eval_samples:
      type: integer
      value: 256
  outputs:
    model_out:
      type: uri_folder
      mode: rw_mount

search_space:
  learning_rate:
    type: uniform
    min_value: 1e-5
    max_value: 5e-4
  lora_dropout:
    type: choice
    values: [0.05, 0.1, 0.15]
  epochs:
    type: choice
    values: [1, 2]
  train_batch_size:
    type: choice
    values: [1, 2]
  eval_batch_size:
    type: choice
    values: [4, 8]

limits:
  max_total_trials: 12
  timeout: 172800  # 48h
