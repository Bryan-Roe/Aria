<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - QAI</title>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .provider-info {
            font-size: 12px;
            opacity: 0.9;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 12px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        /* Markdown content styling */
        .message-content p {
            margin: 0.5em 0;
        }

        .message-content p:first-child {
            margin-top: 0;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content pre {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .message-content pre code {
            background: none;
            padding: 0;
            display: block;
            color: #e6e6e6;
        }

        .message-content ul, .message-content ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .message-content li {
            margin: 4px 0;
        }

        .message-content blockquote {
            border-left: 4px solid #667eea;
            padding-left: 12px;
            margin: 8px 0;
            color: #666;
        }

        .message-content a {
            color: #667eea;
            text-decoration: none;
        }

        .message-content a:hover {
            text-decoration: underline;
        }

        .message-content h1, .message-content h2, .message-content h3 {
            margin: 12px 0 8px 0;
            font-weight: 600;
        }

        .message-content h1 {
            font-size: 1.5em;
        }

        .message-content h2 {
            font-size: 1.3em;
        }

        .message-content h3 {
            font-size: 1.1em;
        }

        .message-content table {
            border-collapse: collapse;
            margin: 8px 0;
            width: 100%;
        }

        .message-content th, .message-content td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        .message-content th {
            background: #f5f5f5;
            font-weight: 600;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message.system .message-content {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
            max-width: 90%;
            font-size: 14px;
            text-align: center;
            margin: 0 auto;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator span {
            height: 8px;
            width: 8px;
            background: #667eea;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% { 
                transform: scale(0);
            } 
            40% { 
                transform: scale(1);
            }
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
            color: #666;
        }

        .model-selector {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .model-selector select {
            padding: 4px 8px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }

        .model-selector select:focus {
            border-color: #667eea;
        }

        .keyboard-hints {
            opacity: 0.7;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
            resize: none;
            max-height: 150px;
            min-height: 48px;
            font-family: inherit;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        #sendButton {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #sendButton:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #sendButton:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .control-button {
            background: #f0f0f0;
            border: none;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .control-button:hover {
            background: #e0e0e0;
        }

        .copy-button {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message-content pre {
            position: relative;
        }

        .message-content pre:hover .copy-button {
            opacity: 1;
        }

        .copy-button:hover {
            background: white;
        }

        .stats-bar {
            padding: 8px 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            font-size: 11px;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-item {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        /* Scrollbar styling */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        @media (max-width: 600px) {
            .chat-container {
                height: 100vh;
                border-radius: 0;
            }

            .message-content {
                max-width: 85%;
            }
            
            .keyboard-hints {
                display: none;
            }
        }

        /* Dark Theme */
        body.dark-theme {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        body.dark-theme .chat-container {
            background: #1e1e1e;
        }

        body.dark-theme .chat-header {
            background: linear-gradient(135deg, #2d3561 0%, #1f2937 100%);
        }

        body.dark-theme .chat-messages {
            background: #2a2a2a;
        }

        body.dark-theme .message.assistant .message-content {
            background: #3a3a3a;
            color: #e0e0e0;
            border-color: #4a4a4a;
        }

        body.dark-theme .chat-input-container {
            background: #1e1e1e;
            border-top-color: #3a3a3a;
        }

        body.dark-theme #messageInput {
            background: #2a2a2a;
            color: #e0e0e0;
            border-color: #4a4a4a;
        }

        body.dark-theme #messageInput:focus {
            border-color: #667eea;
        }

        body.dark-theme .control-button {
            background: #3a3a3a;
            color: #e0e0e0;
        }

        body.dark-theme .control-button:hover {
            background: #4a4a4a;
        }

        body.dark-theme .stats-bar {
            background: #1a1a1a;
            border-top-color: #3a3a3a;
            color: #999;
        }

        body.dark-theme .model-selector select {
            background: #2a2a2a;
            color: #e0e0e0;
            border-color: #4a4a4a;
        }

        body.dark-theme .input-toolbar {
            color: #999;
        }

        body.dark-theme .message.system .message-content {
            background: #3a3a3a;
            color: #e0e0e0;
            border-color: #4a4a4a;
        }

        body.dark-theme .message-content th {
            background: #3a3a3a;
        }

        body.dark-theme .message-content code {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 AI Chat</h1>
            <div class="provider-info" id="providerInfo">Local</div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message system">
                <div class="message-content">
                    Welcome! Ask me anything. Type your message below to start chatting.
                </div>
            </div>
        </div>

        <div class="chat-input-container">
            <div class="input-toolbar">
                <div class="model-selector">
                    <label for="providerSelect">Provider:</label>
                    <select id="providerSelect">
                        <option value="auto">Auto-detect</option>
                        <option value="local">Local (Free)</option>
                        <option value="openai">OpenAI</option>
                        <option value="azure">Azure OpenAI</option>
                    </select>
                </div>
                <div class="keyboard-hints">
                    <span>Enter to send • Shift+Enter for new line • Ctrl+K for new chat</span>
                </div>
            </div>
            <div class="chat-input-wrapper">
                <textarea 
                    id="messageInput" 
                    placeholder="Type your message..."
                    autocomplete="off"
                    rows="1"
                ></textarea>
                <button id="sendButton">Send</button>
            </div>
            <div class="controls">
                <button class="control-button" id="newChatButton">🔄 New Chat</button>
                <button class="control-button" id="clearButton">🗑️ Clear</button>
                <button class="control-button" id="exportButton">💾 Export</button>
                <button class="control-button" id="toggleThemeButton">🌓 Theme</button>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span>Messages: <strong id="messageCount">0</strong></span>
            </div>
            <div class="stat-item">
                <span id="statusText">Ready</span>
            </div>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
