<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum World - Aria</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .container {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }
        
        .controls {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            width: 350px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .world-display {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        .control-group input,
        .control-group select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1em;
        }
        
        .control-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.6);
        }
        
        .stage {
            width: 100%;
            height: 600px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .object {
            position: absolute;
            font-size: 2em;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
            opacity: 0;
        }
        
        .object:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
        }
        
        .quantum-object {
            animation: quantumPulse 2s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes quantumPulse {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(102, 126, 234, 0.8))
                        drop-shadow(0 0 20px rgba(102, 126, 234, 0.4));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(118, 75, 162, 0.8))
                        drop-shadow(0 0 40px rgba(118, 75, 162, 0.4));
            }
        }
        
        .info-panel {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 0.9em;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .info-label {
            font-weight: 600;
            opacity: 0.8;
        }
        
        .info-value {
            text-align: right;
        }
        
        .status {
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        
        .status.success {
            background: rgba(76, 175, 80, 0.3);
            display: block;
        }
        
        .status.error {
            background: rgba(244, 67, 54, 0.3);
            display: block;
        }
        
        .qubit-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, 
                rgba(102, 126, 234, 0.6) 0%, 
                rgba(118, 75, 162, 0.6) 100%);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.8);
        }
        
        .gate-connection {
            position: absolute;
            width: 2px;
            background: linear-gradient(180deg,
                rgba(240, 147, 251, 0.8) 0%,
                rgba(245, 87, 108, 0.8) 100%);
            box-shadow: 0 0 10px rgba(240, 147, 251, 0.8);
        }
        
        .object.dragging {
            cursor: grabbing !important;
            transform: scale(1.3) translate(-50%, -50%) !important;
            z-index: 1000;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
        }
        
        .object.selected {
            outline: 3px solid rgba(255, 215, 0, 0.8);
            outline-offset: 5px;
            animation: selectedPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes selectedPulse {
            0%, 100% { outline-color: rgba(255, 215, 0, 0.8); }
            50% { outline-color: rgba(255, 165, 0, 1); }
        }
        
        .object.spinning {
            animation: spin 2s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg) translate(-50%, -50%); }
            to { transform: rotate(360deg) translate(-50%, -50%); }
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, rgba(255, 255, 255, 1) 0%, rgba(102, 126, 234, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 3s ease-out forwards;
        }

        .portal-link {
            display: inline-block;
            margin: 12px 0 0 12px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid #d7d7d7;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .portal-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
        }
        
        @keyframes particleFloat {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }
    </style>
</head>
<body>
    <a class="portal-link" id="portalLink" href="quantum-portal.html">← Back to Portal</a>
    <div class="header">
        <h1>⚛️ Quantum World Generator</h1>
        <p>3D World powered by Quantum Computing</p>
    </div>
    
    <div class="container">
        <div class="controls">
            <h2 style="margin-bottom: 20px;">Generation Controls</h2>
            
            <div class="control-group">
                <label for="theme">Theme</label>
                <select id="theme">
                    <option value="quantum">⚛️ Quantum</option>
                    <option value="nature">🌳 Nature</option>
                    <option value="space">🚀 Space</option>
                    <option value="ocean">🌊 Ocean</option>
                    <option value="tech">💻 Tech</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="count">Object Count (4-16)</label>
                <input type="number" id="count" min="4" max="16" value="8">
            </div>
            
            <div class="control-group">
                <label for="seed">Seed (optional)</label>
                <input type="number" id="seed" placeholder="Random if empty">
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="useQuantum" checked>
                <label for="useQuantum">Use Quantum Generation</label>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="enablePhysics" checked>
                <label for="enablePhysics">Enable Physics</label>
            </div>
            
            <div class="control-group">
                <label for="animationSpeed">Animation Speed</label>
                <input type="range" id="animationSpeed" min="0.5" max="3" step="0.5" value="1">
                <span id="speedValue" style="font-size: 0.9em; opacity: 0.8;">1x</span>
            </div>
            
            <button class="btn btn-primary" onclick="generateWorld()">
                🌍 Generate World
            </button>
            
            <button class="btn btn-secondary" onclick="visualizeCircuit()">
                📊 Visualize Circuit
            </button>
            
            <div style="display: flex; gap: 5px; margin-top: 10px;">
                <button class="btn btn-secondary" onclick="saveWorld()" style="flex: 1; font-size: 0.9em;">
                    💾 Save
                </button>
                <button class="btn btn-secondary" onclick="loadWorld()" style="flex: 1; font-size: 0.9em;">
                    📂 Load
                </button>
            </div>
            
            <button class="btn btn-secondary" onclick="randomizePositions()" style="margin-top: 10px;">
                🎲 Randomize Positions
            </button>
            
            <button class="btn btn-secondary" onclick="clearWorld()" style="margin-top: 10px;">
                🗑️ Clear World
            </button>
            
            <div id="status" class="status"></div>
            
            <div class="info-panel" id="infoPanel">
                <h3 style="margin-bottom: 10px;">World Info</h3>
                <div id="worldInfo">
                    <p style="opacity: 0.7;">Generate a world to see details</p>
                </div>
            </div>
        </div>
        
        <div class="world-display">
            <h2 style="margin-bottom: 15px;">Stage</h2>
            <div class="stage" id="stage">
                <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0.5;">
                    <p style="font-size: 3em;">⚛️</p>
                    <p style="margin-top: 10px;">Click "Generate World" to begin</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = (() => {
            const params = new URLSearchParams(window.location.search);
            const apiParam = params.get('api');
            if (apiParam) {
                return apiParam.replace(/\/+$/, '');
            }
            if (window.location.origin === 'null') {
                return 'http://localhost:8080';
            }
            return '';
        })();

        (function () {
            const link = document.getElementById('portalLink');
            if (!link) {
                return;
            }
            const query = window.location.search;
            if (query) {
                link.setAttribute('href', `quantum-portal.html${query}`);
            }
        })();
        let currentWorld = null;
        let selectedObject = null;
        let isDragging = false;
        let physicsEnabled = true;
        let animationSpeedMultiplier = 1;
        
        async function generateWorld() {
            const theme = document.getElementById('theme').value;
            const count = parseInt(document.getElementById('count').value);
            const seedInput = document.getElementById('seed').value;
            const seed = seedInput ? parseInt(seedInput) : null;
            const useQuantum = document.getElementById('useQuantum').checked;
            
            showStatus('Generating world...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/api/aria/world`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        theme,
                        count,
                        seed,
                        use_quantum: useQuantum,
                        use_llm: false
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    currentWorld = data;
                    renderWorld(data);
                    displayWorldInfo(data);
                    showStatus(`✓ World generated! ${useQuantum ? '⚛️ Quantum' : '🎲 Classical'}`, 'success');
                } else {
                    showStatus('Error: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            }
        }
        
        async function visualizeCircuit() {
            showStatus('Generating quantum circuit visualization...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/api/aria/quantum/circuit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    renderCircuit(data);
                    displayCircuitInfo(data);
                    showStatus('✓ Quantum circuit visualized!', 'success');
                } else if (data.status === 'unavailable') {
                    showStatus('⚠️ Quantum generation not available', 'error');
                } else {
                    showStatus('Error: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            }
        }
        
        function renderWorld(data) {
            const stage = document.getElementById('stage');
            stage.innerHTML = '';
            
            const objects = data.objects || {};
            const stageWidth = stage.offsetWidth;
            const stageHeight = stage.offsetHeight;
            
            if (Object.keys(objects).length === 0) {
                stage.innerHTML = '<div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0.5;"><p style="font-size: 3em;">⚛️</p><p style="margin-top: 10px;">No objects generated</p></div>';
                return;
            }
            
            for (const [id, obj] of Object.entries(objects)) {
                const elem = document.createElement('div');
                elem.className = 'object';
                elem.textContent = obj.emoji || '✨';
                elem.title = id;
                
                // Handle position from response
                const position = obj.position || { x: 50, y: 50 };
                const x = (position.x / 100) * stageWidth;
                const y = (position.y / 100) * stageHeight;
                
                elem.style.left = `${x}px`;
                elem.style.top = `${y}px`;
                elem.style.transform = 'translate(-50%, -50%)';
                
                if (obj.properties?.quantum_generated || obj.quantum_state) {
                    elem.classList.add('quantum-object');
                }
                
                if (obj.properties?.scale) {
                    elem.style.fontSize = `${2 * obj.properties.scale}em`;
                }
                
                elem.addEventListener('click', (e) => {
                    if (!isDragging) {
                        if (e.shiftKey) {
                            toggleSelection(elem);
                        } else {
                            const state = obj.state || 'on_stage';
                            const quantumInfo = obj.quantum_state ? `Quantum State: ${JSON.stringify(obj.quantum_state)}` : '';
                            alert(`Object: ${id}\nPosition: (${position.x}, ${position.y})\nState: ${state}\n${quantumInfo}`);
                        }
                    }
                });
                
                // Make draggable
                makeDraggable(elem);
                
                stage.appendChild(elem);
                
                // Animate in
                setTimeout(() => {
                    elem.style.opacity = '1';
                }, Math.random() * 500);
            }
        }
        
        function renderCircuit(data) {
            const stage = document.getElementById('stage');
            stage.innerHTML = '';
            
            const objects = data.objects || {};
            const stageWidth = stage.offsetWidth;
            const stageHeight = stage.offsetHeight;
            
            // Draw qubit lines
            const qubits = Object.values(objects).filter(o => o.properties?.type === 'qubit');
            qubits.forEach(qubit => {
                const line = document.createElement('div');
                line.className = 'qubit-line';
                const position = qubit.position || { y: 50 };
                const y = (position.y / 100) * stageHeight;
                line.style.top = `${y}px`;
                line.style.left = '0';
                line.style.width = '100%';
                stage.appendChild(line);
            });
            
            // Draw objects
            for (const [id, obj] of Object.entries(objects)) {
                const elem = document.createElement('div');
                elem.className = 'object quantum-object';
                elem.textContent = obj.emoji || '✨';
                const gateType = obj.properties?.gate_type || obj.properties?.type || 'unknown';
                elem.title = `${id} (${gateType})`;
                
                const position = obj.position || { x: 50, y: 50 };
                const x = (position.x / 100) * stageWidth;
                const y = (position.y / 100) * stageHeight;
                
                elem.style.left = `${x}px`;
                elem.style.top = `${y}px`;
                elem.style.transform = 'translate(-50%, -50%)';
                
                elem.addEventListener('click', () => {
                    const gateInfo = obj.properties?.gate_type ? `Gate: ${obj.properties.gate_type}\n` : '';
                    alert(`${id}\nType: ${obj.properties?.type || 'unknown'}\n${gateInfo}Position: (${position.x}, ${position.y})`);
                });
                
                stage.appendChild(elem);
                
                // Animate in
                setTimeout(() => {
                    elem.style.opacity = '1';
                }, Math.random() * 500);
            }
        }
        
        function displayWorldInfo(data) {
            const env = data.environment || {};
            const html = `
                <div class="info-row">
                    <span class="info-label">Theme:</span>
                    <span class="info-value">${env.theme || 'Unknown'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Objects:</span>
                    <span class="info-value">${data.count || 0}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Method:</span>
                    <span class="info-value">${env.generation_method || 'unknown'}</span>
                </div>
                ${env.quantum_qubits ? `
                <div class="info-row">
                    <span class="info-label">Qubits:</span>
                    <span class="info-value">${env.quantum_qubits}</span>
                </div>
                ` : ''}
                ${env.seed ? `
                <div class="info-row">
                    <span class="info-label">Seed:</span>
                    <span class="info-value">${env.seed}</span>
                </div>
                ` : ''}
                <div class="info-row">
                    <span class="info-label">Quantum:</span>
                    <span class="info-value">${data.used_quantum ? '⚛️ Yes' : '❌ No'}</span>
                </div>
            `;
            document.getElementById('worldInfo').innerHTML = html;
        }
        
        function displayCircuitInfo(data) {
            const env = data.environment || {};
            const circuit = data.circuit_data || {};
            const html = `
                <div class="info-row">
                    <span class="info-label">Circuit Type:</span>
                    <span class="info-value">${circuit.name || 'custom'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Qubits:</span>
                    <span class="info-value">${env.n_qubits || circuit.n_qubits || 0}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Gates:</span>
                    <span class="info-value">${circuit.gates?.length || 0}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Objects:</span>
                    <span class="info-value">${Object.keys(data.objects || {}).length}</span>
                </div>
            `;
            document.getElementById('worldInfo').innerHTML = html;
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            
            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 5000);
            }
        }
        
        // Save world to localStorage
        function saveWorld() {
            if (!currentWorld) {
                showStatus('⚠ No world to save', 'error');
                return;
            }
            
            try {
                const saveData = {
                    world: currentWorld,
                    timestamp: new Date().toISOString(),
                    theme: document.getElementById('theme').value,
                    count: document.getElementById('count').value
                };
                localStorage.setItem('quantum_world_save', JSON.stringify(saveData));
                showStatus('✓ World saved!', 'success');
            } catch (e) {
                showStatus('✗ Save failed: ' + e.message, 'error');
            }
        }
        
        // Load world from localStorage
        function loadWorld() {
            try {
                const saveData = localStorage.getItem('quantum_world_save');
                if (!saveData) {
                    showStatus('⚠ No saved world found', 'error');
                    return;
                }
                
                const data = JSON.parse(saveData);
                currentWorld = data.world;
                renderWorld(currentWorld);
                displayWorldInfo(currentWorld);
                
                // Restore controls
                if (data.theme) document.getElementById('theme').value = data.theme;
                if (data.count) document.getElementById('count').value = data.count;
                
                const date = new Date(data.timestamp).toLocaleString();
                showStatus(`✓ World loaded from ${date}`, 'success');
            } catch (e) {
                showStatus('✗ Load failed: ' + e.message, 'error');
            }
        }
        
        // Randomize object positions
        function randomizePositions() {
            const stage = document.getElementById('stage');
            const objects = stage.querySelectorAll('.object');
            
            if (objects.length === 0) {
                showStatus('⚠ No objects to randomize', 'error');
                return;
            }
            
            const stageWidth = stage.offsetWidth;
            const stageHeight = stage.offsetHeight;
            
            objects.forEach(obj => {
                const x = Math.random() * 0.8 + 0.1; // 10-90%
                const y = Math.random() * 0.8 + 0.1;
                
                obj.style.left = (x * stageWidth) + 'px';
                obj.style.top = (y * stageHeight) + 'px';
                obj.style.transition = 'all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
            });
            
            createParticleEffect(stageWidth / 2, stageHeight / 2, 20);
            showStatus('✓ Positions randomized!', 'success');
        }
        
        // Clear world
        function clearWorld() {
            const stage = document.getElementById('stage');
            const objects = stage.querySelectorAll('.object, .qubit-line');
            
            objects.forEach(obj => {
                obj.style.transition = 'all 0.5s ease-out';
                obj.style.opacity = '0';
                obj.style.transform = 'scale(0) translate(-50%, -50%)';
            });
            
            setTimeout(() => {
                stage.innerHTML = '<div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0.5;"><p style="font-size: 3em;">⚛️</p><p style="margin-top: 10px;">Click "Generate World" to begin</p></div>';
                currentWorld = null;
                showStatus('✓ World cleared', 'success');
            }, 500);
        }
        
        // Create particle effect
        function createParticleEffect(x, y, count = 10) {
            const stage = document.getElementById('stage');
            
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const angle = (Math.PI * 2 * i) / count;
                const distance = 50 + Math.random() * 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                stage.appendChild(particle);
                
                setTimeout(() => particle.remove(), 3000);
            }
        }
        
        // Make objects draggable
        function makeDraggable(elem) {
            let startX, startY, initialLeft, initialTop;
            
            elem.addEventListener('mousedown', startDrag);
            elem.addEventListener('touchstart', startDrag);
            
            function startDrag(e) {
                e.preventDefault();
                isDragging = true;
                elem.classList.add('dragging');
                
                const touch = e.touches ? e.touches[0] : e;
                startX = touch.clientX;
                startY = touch.clientY;
                initialLeft = elem.offsetLeft;
                initialTop = elem.offsetTop;
                
                document.addEventListener('mousemove', drag);
                document.addEventListener('touchmove', drag);
                document.addEventListener('mouseup', stopDrag);
                document.addEventListener('touchend', stopDrag);
            }
            
            function drag(e) {
                if (!isDragging) return;
                
                const touch = e.touches ? e.touches[0] : e;
                const dx = touch.clientX - startX;
                const dy = touch.clientY - startY;
                
                elem.style.left = (initialLeft + dx) + 'px';
                elem.style.top = (initialTop + dy) + 'px';
            }
            
            function stopDrag() {
                isDragging = false;
                elem.classList.remove('dragging');
                
                document.removeEventListener('mousemove', drag);
                document.removeEventListener('touchmove', drag);
                document.removeEventListener('mouseup', stopDrag);
                document.removeEventListener('touchend', stopDrag);
                
                // Create particle effect on release
                createParticleEffect(elem.offsetLeft, elem.offsetTop, 5);
            }
        }
        
        // Toggle object selection
        function toggleSelection(elem) {
            if (selectedObject === elem) {
                elem.classList.remove('selected');
                selectedObject = null;
            } else {
                if (selectedObject) {
                    selectedObject.classList.remove('selected');
                }
                elem.classList.add('selected');
                selectedObject = elem;
                
                // Add spinning effect for quantum objects
                if (elem.classList.contains('quantum-object')) {
                    elem.classList.toggle('spinning');
                }
            }
        }
        
        // Initialize controls
        function initializeControls() {
            const speedSlider = document.getElementById('animationSpeed');
            const speedValue = document.getElementById('speedValue');
            const physicsCheckbox = document.getElementById('enablePhysics');
            
            speedSlider.addEventListener('input', (e) => {
                animationSpeedMultiplier = parseFloat(e.target.value);
                speedValue.textContent = animationSpeedMultiplier + 'x';
                
                // Update animation speeds
                document.querySelectorAll('.object').forEach(obj => {
                    const duration = 3 / animationSpeedMultiplier;
                    obj.style.animationDuration = duration + 's';
                });
            });
            
            physicsCheckbox.addEventListener('change', (e) => {
                physicsEnabled = e.target.checked;
                showStatus(`Physics ${physicsEnabled ? 'enabled' : 'disabled'}`, 'success');
            });
        }
        
        // Keyboard shortcuts
        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    switch(e.key) {
                        case 's':
                            e.preventDefault();
                            saveWorld();
                            break;
                        case 'o':
                            e.preventDefault();
                            loadWorld();
                            break;
                        case 'r':
                            e.preventDefault();
                            randomizePositions();
                            break;
                    }
                } else if (e.key === 'Delete' && selectedObject) {
                    selectedObject.remove();
                    selectedObject = null;
                    showStatus('✓ Object deleted', 'success');
                } else if (e.key === 'Escape' && selectedObject) {
                    selectedObject.classList.remove('selected', 'spinning');
                    selectedObject = null;
                }
            });
        }
        
        // Auto-generate on load
        window.addEventListener('load', () => {
            initializeControls();
            setupKeyboardShortcuts();
            
            setTimeout(() => {
                generateWorld();
            }, 500);
        });
    </script>
</body>
</html>
