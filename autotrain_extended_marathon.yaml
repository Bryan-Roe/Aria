version: 1

# EXTENDED MARATHON TRAINING - Multi-hour comprehensive training session
# Estimated total runtime: 4-6 hours (depends on GPU/CPU)
# Trains multiple models on various datasets with extensive epochs

jobs:
  # ===== MEGA SYNTHETIC DATA TRAINING (New Generated Data) =====
  
  # Train on freshly generated synthetic data - Phi-3.5
  - name: phi35_mega_synthetic_full
    category: marathon
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/mega_synthetic
    save_dir: data_out/lora_training/marathon/phi35_mega_synthetic
    epochs: 3
    max_train_samples: null  # Use ALL generated samples
    max_eval_samples: 200
    learning_rate: 0.0002
    lora_dropout: 0.1
    hf_model_id: microsoft/Phi-3.5-mini-instruct
    device: auto

  # Train on synthetic data - Qwen2.5
  - name: qwen25_mega_synthetic_full
    category: marathon
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/mega_synthetic
    save_dir: data_out/lora_training/marathon/qwen25_mega_synthetic
    epochs: 3
    max_train_samples: null  # Use ALL generated samples
    max_eval_samples: 200
    learning_rate: 0.0002
    lora_dropout: 0.1
    hf_model_id: Qwen/Qwen2.5-3B-Instruct
    device: auto

  # ===== COMPREHENSIVE DATASET MARATHON (All merged data) =====
  
  # Phi-3.5 on comprehensive merged dataset - Extended training
  - name: phi35_comprehensive_marathon
    category: marathon
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/comprehensive
    save_dir: data_out/lora_training/marathon/phi35_comprehensive
    epochs: 5
    max_train_samples: 3000  # Large batch
    max_eval_samples: 300
    learning_rate: 0.0002
    lora_dropout: 0.1
    hf_model_id: microsoft/Phi-3.5-mini-instruct
    device: auto

  # Qwen2.5 on comprehensive merged dataset - Extended training
  - name: qwen25_comprehensive_marathon
    category: marathon
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/comprehensive
    save_dir: data_out/lora_training/marathon/qwen25_comprehensive
    epochs: 5
    max_train_samples: 3000
    max_eval_samples: 300
    learning_rate: 0.0002
    lora_dropout: 0.1
    hf_model_id: Qwen/Qwen2.5-3B-Instruct
    device: auto

  # ===== DOLLY FULL DATASET TRAINING =====
  
  # Phi-3.5 on full Dolly dataset with maximum epochs
  - name: phi35_dolly_marathon
    category: marathon
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/dolly
    save_dir: data_out/lora_training/marathon/phi35_dolly_full
    epochs: 5
    max_train_samples: 5000  # Large subset
    max_eval_samples: 500
    learning_rate: 0.00015
    lora_dropout: 0.1
    hf_model_id: microsoft/Phi-3.5-mini-instruct
    device: auto

  # Qwen2.5 on Dolly dataset
  - name: qwen25_dolly_marathon
    category: marathon
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/dolly
    save_dir: data_out/lora_training/marathon/qwen25_dolly_full
    epochs: 5
