<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nebula Launch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <nav>
      <strong>Nebula</strong>
      <a href="#features">Features</a>
      <a href="#pricing">Pricing</a>
      <a href="#contact">Contact</a>
    </nav>
    <h1>Ship ideas faster with Nebula Launch</h1>
    <p>A clean starter for product launch pages.</p>
    <button id="ctaBtn">Start Free Trial</button>
  </header>

  <main>
    <section id="features">
      <h2>Features</h2>
      <div class="grid">
        <article><h3>Fast setup</h3><p>Go live in minutes.</p></article>
        <article><h3>Analytics</h3><p>Track every conversion.</p></article>
        <article><h3>Automation</h3><p>Capture leads automatically.</p></article>
      </div>
    </section>

    <section id="pricing">
      <h2>Pricing</h2>
      <p>Starter • Pro • Enterprise</p>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <form id="contactForm">
        <input placeholder="Email" type="email" required />
        <button type="submit">Notify Me</button>
      </form>
      <p id="formStatus"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
