<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Console Output Viewer</title>
</head>
<body>
  <h1>Console Output Viewer</h1>
  <label for="consoleArea">Console Output:</label>
  <textarea id="consoleArea" rows="20" cols="100" style="width:100%;font-family:monospace;font-size:1em;resize:vertical;" placeholder="Console output will appear here. You can select and copy all text." title="Console Output"></textarea>
  <br>
  <button onclick="loadConsoleOutput()">Load/Refresh Output</button>
  <script>
    function loadConsoleOutput() {
      // Example: Replace with actual logic to fetch console output
      document.getElementById('consoleArea').value = 'Sample console output...\nAll output is selectable.';
    }
  </script>
</body>
</html>
