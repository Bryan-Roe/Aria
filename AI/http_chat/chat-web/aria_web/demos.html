<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria Quick Demo Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .demos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .demo-btn {
            background: white;
            border: none;
            border-radius: 12px;
            padding: 20px 15px;
            text-decoration: none;
            color: #333;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            animation: popIn 0.5s ease backwards;
        }

        .demo-btn:nth-child(1) { animation-delay: 0.1s; }
        .demo-btn:nth-child(2) { animation-delay: 0.2s; }
        .demo-btn:nth-child(3) { animation-delay: 0.3s; }
        .demo-btn:nth-child(4) { animation-delay: 0.4s; }
        .demo-btn:nth-child(5) { animation-delay: 0.5s; }
        .demo-btn:nth-child(6) { animation-delay: 0.6s; }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .demo-btn:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .demo-icon {
            font-size: 2.5em;
            margin-bottom: 8px;
            display: block;
        }

        .demo-label {
            display: block;
            font-size: 0.9em;
        }

        .demo-btn.movement:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .demo-btn.quantum:hover {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .demo-btn.emotions:hover {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }

        .demo-btn.learning:hover {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: white;
        }

        .demo-btn.dialogue:hover {
            background: linear-gradient(135deg, #fa709a, #fee140);
            color: white;
        }

        .demo-btn.center:hover {
            background: linear-gradient(135deg, #30cfd0, #330867);
            color: white;
        }

        .footer {
            text-align: center;
            color: white;
            font-size: 0.9em;
            margin-top: 30px;
            opacity: 0.9;
        }

        .footer a {
            color: #ffd89b;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 2em;
            }

            .subtitle {
                font-size: 1em;
            }

            .demos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Aria Demos</h1>
            <p class="subtitle">Interactive AI Character Platform</p>
        </div>

        <div class="demos-grid">
            <a href="demo-movement.html" class="demo-btn movement">
                <span class="demo-icon">🎯</span>
                <span class="demo-label">Movement</span>
            </a>

            <a href="demo-quantum.html" class="demo-btn quantum">
                <span class="demo-icon">⚛️</span>
                <span class="demo-label">Quantum</span>
            </a>

            <a href="demo-emotions.html" class="demo-btn emotions">
                <span class="demo-icon">😊</span>
                <span class="demo-label">Emotions</span>
            </a>

            <a href="demo-learning.html" class="demo-btn learning">
                <span class="demo-icon">🧠</span>
                <span class="demo-label">Learning</span>
            </a>

            <a href="demo-dialogue.html" class="demo-btn dialogue">
                <span class="demo-icon">💬</span>
                <span class="demo-label">Dialogue</span>
            </a>

            <a href="demo-center.html" class="demo-btn center">
                <span class="demo-icon">📚</span>
                <span class="demo-label">All Demos</span>
            </a>
        </div>

        <div class="footer">
            <p>← Back to <a href="index.html">Main Interface</a> or <a href="../../web-hub.html">Hub</a></p>
        </div>
    </div>
</body>
</html>
