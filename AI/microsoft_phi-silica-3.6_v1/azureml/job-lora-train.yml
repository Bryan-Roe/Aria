$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json

name: qai-lora-train
experiment_name: phi36-lora

# Default compute; override with: az ml job create -f job-lora-train.yml --set compute=azureml:gpu-cluster
compute: azureml:gpu-cluster

code: ../../..

# Curated GPU environment (adjust if unavailable in your region)
# To use a custom env instead, comment this line and uncomment the 'environment:' block below.
environment: azureml:AzureML-pytorch-2.4-ubuntu22.04-py310-cuda12@latest
# environment:
#   build:
#     conda_file: azureml/environment.yml
#     image: mcr.microsoft.com/azureml/curated/minimal-ubuntu22.04:latest

inputs:
  train_manifest:
    type: uri_file
    # Upload your manifest to this path or override via --set inputs.train_manifest.path=...
    path: azureml://datastores/workspaceblobstore/paths/qai/datasets/dolly/manifest.txt
    mode: ro_mount
  eval_manifest:
    type: uri_file
    optional: true
    # If omitted, the script will reuse a small subset of the train files for evaluation.
    path: azureml://datastores/workspaceblobstore/paths/qai/datasets/dolly/manifest.txt
    mode: ro_mount
  hf_model_id:
    type: string
    # microsoft/Phi-3.5-mini-instruct is a good default for experimentation
    value: microsoft/Phi-3.5-mini-instruct
  max_train_samples:
    type: integer
    value: 512
  max_eval_samples:
    type: integer
    value: 128
  learning_rate:
    type: number
    value: 0.0002
  lora_dropout:
    type: number
    value: 0.1
  epochs:
    type: integer
    value: 1
  train_batch_size:
    type: integer
    value: 1
  eval_batch_size:
    type: integer
    value: 8

outputs:
  model_out:
    type: uri_folder
    mode: rw_mount

resources:
  instance_count: 1

limits:
  timeout: 86400  # 24h

command: >-
  python AI/microsoft_phi-silica-3.6_v1/scripts/train_lora.py
  --config AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
  --save-dir ${{outputs.model_out}}
  --train-manifest ${{inputs.train_manifest}}
  --eval-manifest ${{inputs.eval_manifest}}
  --hf-model-id ${{inputs.hf_model_id}}
  --max-train-samples ${{inputs.max_train_samples}}
  --max-eval-samples ${{inputs.max_eval_samples}}
  --learning-rate ${{inputs.learning_rate}}
  --lora-dropout ${{inputs.lora_dropout}}
  --epochs ${{inputs.epochs}}
  --train-batch-size ${{inputs.train_batch_size}}
  --eval-batch-size ${{inputs.eval_batch_size}}
  --no-stream
