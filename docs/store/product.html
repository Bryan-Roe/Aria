<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offer - Aria Store</title>
  <meta name="description" content="Inspect Aria Store offer details, included deliverables, and related packages.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../global-upgrade.css">
</head>
<body class="store-theme">

  <div id="header-slot"></div>

  <main>
    <section class="store-subpage-hero">
      <div class="container">
        <div class="page-hero-card">
          <p class="store-eyebrow">Offer detail</p>
          <h1>Review scope before you commit.</h1>
          <p>Each offer page summarizes what the package is for, what it includes, and which related packages a team should compare before moving forward.</p>
        </div>
      </div>
    </section>

    <section class="store-section">
      <div class="container">
        <div class="page-shell">
          <div class="product-detail" id="productDetail">
            <!-- Rendered by JS -->
          </div>

          <div class="related-products">
            <h2>You May Also Like</h2>
            <div class="products-grid" id="relatedGrid">
              <!-- Rendered by JS -->
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-slot"></div>

  <script src="js/products.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
  <script>initProductPage();</script>
  <script src="../global-upgrade.js"></script>
</body>
</html>
