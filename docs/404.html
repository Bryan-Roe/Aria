<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Aria</title>
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#0f9d89">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23122033'/%3E%3Ccircle cx='50' cy='36' r='16' fill='%230f9d89'/%3E%3Cpath d='M24 78c5-14 18-22 26-22s21 8 26 22' stroke='%23f7f2e8' stroke-width='10' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --paper: #f7f2e8;
            --ink: #122033;
            --ink-soft: #5f6874;
            --panel: rgba(255, 255, 255, 0.78);
            --line: rgba(18, 32, 51, 0.12);
            --shadow: 0 24px 64px rgba(18, 32, 51, 0.12);
            --teal: #0f9d89;
            --coral: #d95b43;
            --gold: #d3a53e;
            --slate: #22405c;
            --radius-xl: 30px;
            --radius-md: 16px;
            --transition: 220ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        html { scroll-behavior: smooth; }

        body {
            min-height: 100vh;
            font-family: "Instrument Sans", system-ui, sans-serif;
            color: var(--ink);
            background: linear-gradient(180deg, #fbf7ef 0%, #f7f2e8 56%, #efe5d6 100%);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(circle at 14% 18%, rgba(15, 157, 137, 0.18), transparent 30%),
                radial-gradient(circle at 86% 12%, rgba(217, 91, 67, 0.16), transparent 26%),
                radial-gradient(circle at 50% 82%, rgba(211, 165, 62, 0.16), transparent 28%);
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(18, 32, 51, 0.032) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 32, 51, 0.032) 1px, transparent 1px);
            background-size: 34px 34px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.82), transparent 92%);
            pointer-events: none;
        }

        .card {
            width: min(480px, 100%);
            padding: 40px 36px;
            border-radius: var(--radius-xl);
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.62);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            text-align: center;
        }

        .brand-mark {
            display: inline-block;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background:
                radial-gradient(circle at 50% 34%, var(--teal) 0 14px, transparent 16px),
                linear-gradient(180deg, var(--slate), #16283d);
            position: relative;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.16);
            margin-bottom: 20px;
        }

        .brand-mark::after {
            content: "";
            position: absolute;
            left: 12px;
            right: 12px;
            bottom: 10px;
            height: 13px;
            border-radius: 999px 999px 8px 8px;
            border: 3px solid rgba(247, 242, 232, 0.96);
            border-top: 0;
        }

        .error-code {
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(4rem, 16vw, 7rem);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.06em;
            background: linear-gradient(135deg, var(--teal), var(--coral));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        h1 {
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 12px;
        }

        p {
            color: var(--ink-soft);
            line-height: 1.7;
            font-size: 1rem;
            margin-bottom: 28px;
        }

        .links {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 46px;
            padding: 0 20px;
            border-radius: 999px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            transition: transform var(--transition), box-shadow var(--transition);
            border: 1px solid transparent;
        }

        .btn:hover,
        .btn:focus-visible {
            transform: translateY(-2px);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--teal), #1bb6a4);
            color: #f6fffd;
            box-shadow: 0 10px 24px rgba(15, 157, 137, 0.24);
        }

        .btn-primary:hover {
            box-shadow: 0 16px 32px rgba(15, 157, 137, 0.32);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.64);
            border-color: var(--line);
            color: var(--ink);
        }

        @media (prefers-reduced-motion: reduce) {
            .btn { transition: none; }
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="brand-mark" aria-hidden="true"></span>
        <div class="error-code">404</div>
        <h1>Aria can't find that page</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <div class="links">
            <a href="./" class="btn btn-primary">Back to Home</a>
            <a href="documentation.html" class="btn btn-outline">Browse Docs</a>
        </div>
    </div>
</body>
</html>
