version: 1

# Define one or more training jobs. Jobs run sequentially when invoked.
# Runners:
#   - hf:    Uses Hugging Face stack via AI/microsoft_phi-silica-3.6_v1/scripts/train_lora.py
#   - local: Uses the streamlined local runner scripts/run_local_lora_training.py

jobs:
  # Phi-3.5 Mini (Aug 2024) - Microsoft's latest open model (MOST EFFICIENT)
  - name: phi35_mixed_chat
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/mixed_chat
    save_dir: data_out/lora_training/phi35
    epochs: 3
    max_train_samples: null
    max_eval_samples: null
    learning_rate: 0.0002
    lora_dropout: 0.1
    hf_model_id: microsoft/Phi-3.5-mini-instruct

  # Qwen2.5 3B (Sep 2024) - excellent performance, no gating
  - name: qwen25_3b_mixed_chat
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/mixed_chat
    save_dir: data_out/lora_training/qwen25_3b
    epochs: 3
    max_train_samples: null
    max_eval_samples: null
    learning_rate: 0.0002
    lora_dropout: 0.1
    hf_model_id: Qwen/Qwen2.5-3B-Instruct

  # Phi-3.5 MAX PERFORMANCE - Full Dolly dataset, 3 epochs
  - name: phi35_max_performance
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/dolly
    save_dir: data_out/lora_training/phi35_max_performance
    epochs: 3
    max_train_samples: null  # Use full dataset
    max_eval_samples: null
    learning_rate: 0.0002
    lora_dropout: 0.1
    hf_model_id: microsoft/Phi-3.5-mini-instruct

  # Example of using the local runner (QLoRA-friendly, simple)
  # - name: local_quickstart
  #   runner: local
  #   config: AI/microsoft_phi-silica-3.6_v1/local_train/local_config.yaml
  #   epochs: 1
  #   max_train_samples: 10
  #   reinstall: false   # set true to force re-install of venv deps

  # --- Hyperparameter exploration (small, fast jobs) ---
  - name: phi35_mixed_chat_lr_low
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/mixed_chat
    save_dir: data_out/lora_training/phi35_lr_low
    epochs: 1
    max_train_samples: 64
    max_eval_samples: 16
    learning_rate: 0.0001
    lora_dropout: 0.1
    hf_model_id: microsoft/Phi-3.5-mini-instruct

  - name: phi35_mixed_chat_lr_high
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/mixed_chat
    save_dir: data_out/lora_training/phi35_lr_high
    epochs: 1
    max_train_samples: 64
    max_eval_samples: 16
    learning_rate: 0.0003
    lora_dropout: 0.1
    hf_model_id: microsoft/Phi-3.5-mini-instruct

  - name: phi35_mixed_chat_dropout_low
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/mixed_chat
    save_dir: data_out/lora_training/phi35_drop_low
    epochs: 1
    max_train_samples: 64
    max_eval_samples: 16
    learning_rate: 0.0002
    lora_dropout: 0.05
    hf_model_id: microsoft/Phi-3.5-mini-instruct

  - name: phi35_mixed_chat_dropout_high
    runner: hf
    config: AI/microsoft_phi-silica-3.6_v1/lora/lora.yaml
    dataset: datasets/chat/mixed_chat
    save_dir: data_out/lora_training/phi35_drop_high
    epochs: 1
    max_train_samples: 64
    max_eval_samples: 16
    learning_rate: 0.0002
    lora_dropout: 0.15
    hf_model_id: microsoft/Phi-3.5-mini-instruct

