name: 'Setup Python Environment'
description: 'Reusable setup for Python with pip caching and common dependencies'

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  install-requirements:
    description: 'Install requirements.txt'
    required: false
    default: 'true'
  extra-packages:
    description: 'Space-separated list of extra pip packages to install'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'

    - name: Install base dependencies
      shell: bash
      run: python -m pip install --upgrade pip

    - name: Install requirements
      if: inputs.install-requirements == 'true'
      shell: bash
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: Install extra packages
      if: inputs.extra-packages != ''
      shell: bash
      env:
        EXTRA_PACKAGES: ${{ inputs.extra-packages }}
      # Pass packages via env var to prevent shell-injection from the input value.
      # Word-splitting on $EXTRA_PACKAGES is intentional (space-separated list).
      # shellcheck disable=SC2086
      run: pip install $EXTRA_PACKAGES
