name: Validate Foundry Config
description: Validate .foundry/.deployment.json contract
inputs:
  script-path:
    description: Path to validator script
    required: false
    default: scripts/validate_foundry_config.py
runs:
  using: composite
  steps:
    - name: Validate foundry deployment config
      shell: bash
      run: |
        set -euo pipefail
        SCRIPT_PATH='${{ inputs.script-path }}'
        if [ ! -f "$SCRIPT_PATH" ]; then
          echo "Validator script not found: $SCRIPT_PATH" >&2
          exit 1
        fi
        python3 "$SCRIPT_PATH"
