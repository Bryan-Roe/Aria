name: Validate Composite Actions
description: Validate local composite action definitions under .github/actions/

inputs:
  script-path:
    description: Path to the composite-action validation script
    required: false
    default: scripts/validate_composite_actions.py

runs:
  using: composite
  steps:
    - name: Run composite action validator
      shell: bash
      run: |
        set -euo pipefail
        SCRIPT_PATH='${{ inputs.script-path }}'
        if [ ! -f "$SCRIPT_PATH" ]; then
          echo "Validation script not found: $SCRIPT_PATH" >&2
          exit 1
        fi
        python3 "$SCRIPT_PATH"
