# =============================================================================
# Secrets Scan - Detect hardcoded credentials and sensitive file changes
# =============================================================================
# Purpose: Runs Gitleaks to detect accidentally committed secrets/credentials
#          and checks for sensitive file changes (local.settings.json, .env, etc.)
# Triggers: push to main/dev, pull_request to main/dev, manual dispatch
# Jobs:
#   - gitleaks: Scans git history for leaked secrets via Gitleaks action
#   - sensitive-file-guard: Warns when sensitive config files are modified
# =============================================================================

name: Secrets Scan

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]
    workflow_dispatch:

# Principle of least privilege: grant only what each job actually needs.
# Individual jobs may further narrow these permissions below.
permissions:
    contents: read

concurrency:
    group: secrets-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    # Centralized pinned versions so dependabot/renovate updates one place.
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    CHECKOUT_ACTION: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
    GITLEAKS_ACTION: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2

jobs:
    # ---------------------------------------------------------------------------
    # Gitleaks: authoritative secret detection (blocking)
    # ---------------------------------------------------------------------------
    gitleaks:
        name: Gitleaks Secret Detection
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
            pull-requests: write   # allow Gitleaks to comment on PRs
            security-events: write # allow upload of SARIF (if enabled by action)

        steps:
            - name: Checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
              with:
                  # Full history needed for Gitleaks to scan past commits.
                  fetch-depth: 0
                  persist-credentials: false

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # GITLEAKS_LICENSE is required for org-level repos on enterprise plans.
                  # For personal/public repos on free plans, this is not needed.
                  GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
                  GITLEAKS_ENABLE_COMMENTS: "true"
                  GITLEAKS_ENABLE_SUMMARY: "true"
                  GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"

    # ---------------------------------------------------------------------------
    # Sensitive File Guard: advisory check for risky config files
    # ---------------------------------------------------------------------------
    sensitive-file-guard:
        name: Sensitive File Guard
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
              with:
                  fetch-depth: 0
                  persist-credentials: false

            # NOTE: All steps below pass GitHub context values via `env:` rather
            # than expanding ${{ ... }} directly inside `run:` scripts. This
            # prevents script-injection via attacker-controlled context values
            # (e.g. branch/PR titles). See:
            # https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable

            - name: Resolve diff range
              id: range
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
                  PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
                  PUSH_BEFORE: ${{ github.event.before }}
                  COMMIT_SHA: ${{ github.sha }}
              shell: bash
              run: |
                  set -euo pipefail
                  EMPTY_TREE=$(git hash-object -t tree /dev/null)
                  ZERO_SHA="0000000000000000000000000000000000000000"

                  if [ "$EVENT_NAME" = "pull_request" ]; then
                      BASE="$PR_BASE_SHA"
                      HEAD="$PR_HEAD_SHA"
                  elif [ -z "${PUSH_BEFORE:-}" ] || [ "$PUSH_BEFORE" = "$ZERO_SHA" ]; then
                      # Initial push / new branch — diff against the empty tree.
                      BASE="$EMPTY_TREE"
                      HEAD="$COMMIT_SHA"
                  else
                      BASE="$PUSH_BEFORE"
                      HEAD="$COMMIT_SHA"
                  fi

                  # Guard against force-pushes where BASE is unreachable.
                  if [ "$BASE" != "$EMPTY_TREE" ] && ! git cat-file -e "$BASE" 2>/dev/null; then
                      echo "::warning::Base commit $BASE not reachable (force-push?). Falling back to empty tree."
                      BASE="$EMPTY_TREE"
                  fi

                  echo "base=$BASE" >> "$GITHUB_OUTPUT"
                  echo "head=$HEAD" >> "$GITHUB_OUTPUT"

            - name: Detect sensitive file changes
              id: sensitive
              env:
                  BASE: ${{ steps.range.outputs.base }}
                  HEAD: ${{ steps.range.outputs.head }}
              shell: bash
              run: |
                  set -euo pipefail

                  # Files that should never contain real credentials in source control.
                  # Examples (.env.example, *.pem.example, etc.) are explicitly excluded.
                  SENSITIVE_PATTERN='(^|/)(local\.settings\.json|\.env|\.env\.[A-Za-z0-9_-]+|secrets\.[A-Za-z0-9_-]+|credentials\.[A-Za-z0-9_-]+|id_rsa|id_ecdsa|id_ed25519)$|\.(pem|p12|pfx|key)$'
                  EXCLUDE_PATTERN='\.(example|sample|template|dist)$'

                  TOUCHED=$(git diff --name-only --diff-filter=ACMRT "$BASE" "$HEAD" \
                      | grep -E "$SENSITIVE_PATTERN" \
                      | grep -Ev "$EXCLUDE_PATTERN" \
                      || true)

                  if [ -n "$TOUCHED" ]; then
                      echo "touched=true" >> "$GITHUB_OUTPUT"
                      {
                          echo "files<<__EOF__"
                          echo "$TOUCHED"
                          echo "__EOF__"
                      } >> "$GITHUB_OUTPUT"
                  else
                      echo "touched=false" >> "$GITHUB_OUTPUT"
                      echo "files=" >> "$GITHUB_OUTPUT"
                  fi

            - name: Validate local.settings.json safety
              shell: bash
              run: |
                  set -euo pipefail
                  if [ ! -f "local.settings.json" ]; then
                      echo "local.settings.json not present — skipping"
                      exit 0
                  fi

                  python3 - <<'PYEOF'
                  import json
                  import re
                  import sys
                  from pathlib import Path

                  SAFE_PATTERNS = re.compile(
                      r'^$|^<.*>$|^your[-_]|^YOUR_|^xxx|^placeholder|example|changeme|'
                      r'^https?://localhost|^UseDevelopmentStorage|^AccountName=devstoreaccount|'
                      r'^https?://127\.|^https?://0\.0\.0\.0|^https?://\[::1\]',
                      re.IGNORECASE,
                  )

                  # Keys whose real values are expected and non-sensitive.
                  BENIGN_KEYS = {
                      'AzureWebJobsStorage',
                      'FUNCTIONS_WORKER_RUNTIME',
                      'FUNCTIONS_EXTENSION_VERSION',
                      'WEBSITE_RUN_FROM_PACKAGE',
                  }

                  path = Path('local.settings.json')
                  try:
                      data = json.loads(path.read_text(encoding='utf-8'))
                  except json.JSONDecodeError as exc:
                      print(f"::error file=local.settings.json::Invalid JSON: {exc}")
                      sys.exit(1)

                  all_values = {}
                  for section in ('Values', 'ConnectionStrings'):
                      section_data = data.get(section)
                      if isinstance(section_data, dict):
                          all_values.update(section_data)

                  suspicious = []
                  for key, val in all_values.items():
                      if key in BENIGN_KEYS or not isinstance(val, str) or not val:
                          continue
                      if SAFE_PATTERNS.match(val):
                          continue
                      # Heuristic: long opaque values that look like keys/tokens.
                      if len(val) > 24 and not val.lower().startswith(('http://', 'https://')):
                          suspicious.append(key)

                  if suspicious:
                      print(f"::warning file=local.settings.json::May contain real secrets in: {suspicious}")
                      print("Gitleaks will perform the authoritative check.")
                  else:
                      print("✅ local.settings.json appears to use placeholder values")
                  PYEOF

            - name: Write sensitive-file summary
              if: always()
              env:
                  TOUCHED: ${{ steps.sensitive.outputs.touched }}
                  FILES: ${{ steps.sensitive.outputs.files }}
              shell: bash
              run: |
                  set -euo pipefail
                  {
                      echo "## Sensitive File Guard"
                      echo ""
                      if [ "${TOUCHED:-false}" = "true" ]; then
                          echo "⚠️ **Sensitive files were modified in this change:**"
                          echo ''
                          echo '```'
                          printf '%s\n' "$FILES"
                          echo '```'
                          echo ""
                          echo "> This is an **advisory warning**. Gitleaks performs the authoritative secret scan."
                          echo "> Ensure no real credentials are present in the modified files."
                      else
                          echo "✅ No sensitive config files were modified"
                      fi
                      echo ""
                      echo "| Job | Purpose |"
                      echo "|-----|---------|"
                      echo "| Gitleaks | Scans git history for leaked API keys, tokens, passwords |"
                      echo "| Sensitive File Guard | Warns when \`local.settings.json\`, \`.env\`, keys are touched |"
                  } >> "$GITHUB_STEP_SUMMARY"
