# =============================================================================
# Secrets Scan - Detect hardcoded credentials and sensitive file changes
# =============================================================================
# Purpose: Runs Gitleaks to detect accidentally committed secrets/credentials
#          and checks for sensitive file changes (local.settings.json, .env, etc.)
# Triggers: push to main/dev, pull_request to main/dev
# Jobs:
#   - gitleaks: Scans git history for leaked secrets via Gitleaks action
#   - sensitive-file-guard: Warns when sensitive config files are modified
# =============================================================================

name: Secrets Scan

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]
    workflow_dispatch:

concurrency:
    group: secrets-${{ github.ref }}
    cancel-in-progress: true

jobs:
    gitleaks:
        name: Gitleaks Secret Detection
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
              with:
                  fetch-depth: 0

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # GITLEAKS_LICENSE is required for org-level repos on enterprise plans.
                  # For personal/public repos on free plans, this is not needed.
                  GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

    sensitive-file-guard:
        name: Sensitive File Guard
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
              with:
                  fetch-depth: 0

            - name: Resolve diff range
              id: range
              run: |
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    echo "base=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
                    echo "head=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
                  elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ] || \
                       [ -z "${{ github.event.before }}" ]; then
                    echo "base=$(git hash-object -t tree /dev/null)" >> $GITHUB_OUTPUT
                    echo "head=${{ github.sha }}" >> $GITHUB_OUTPUT
                  else
                    echo "base=${{ github.event.before }}" >> $GITHUB_OUTPUT
                    echo "head=${{ github.sha }}" >> $GITHUB_OUTPUT
                  fi

            - name: Detect sensitive file changes
              id: sensitive
              run: |
                  BASE="${{ steps.range.outputs.base }}"
                  HEAD="${{ steps.range.outputs.head }}"

                  # Files that should never contain real credentials in CI
                  SENSITIVE_PATTERN='local\.settings\.json$|\.env$|\.env\.[a-z]|secrets\.[a-z]|credentials\.[a-z]|id_rsa$|id_ecdsa$|id_ed25519$|\.pem$|\.p12$|\.pfx$|\.key$'

                  TOUCHED=$(git diff --name-only "$BASE".."$HEAD" \
                    | grep -E "$SENSITIVE_PATTERN" | grep -v '\.example$' || true)

                  if [ -n "$TOUCHED" ]; then
                    echo "touched=true" >> $GITHUB_OUTPUT
                    echo "files<<EOF" >> $GITHUB_OUTPUT
                    echo "$TOUCHED" >> $GITHUB_OUTPUT
                    echo "EOF" >> $GITHUB_OUTPUT
                  else
                    echo "touched=false" >> $GITHUB_OUTPUT
                    echo "files=" >> $GITHUB_OUTPUT
                  fi

            - name: Validate local.settings.json safety
              run: |
                  if [ ! -f "local.settings.json" ]; then
                    echo "local.settings.json not present — skipping"
                    exit 0
                  fi

                  python3 - <<'PYEOF'
                  import json, sys, re

                  SAFE_PATTERNS = re.compile(
                      r'^$|^<.*>$|^your-|^YOUR_|^xxx|^PLACEHOLDER|example|'
                      r'^https?://localhost|^UseDevelopmentStorage|^AccountName=devstoreaccount|'
                      r'^https?://127\.|^https?://0\.0\.0',
                      re.IGNORECASE
                  )
                  # Keys whose real values are expected and non-sensitive
                  BENIGN_KEYS = {
                      'AzureWebJobsStorage', 'FUNCTIONS_WORKER_RUNTIME',
                      'FUNCTIONS_EXTENSION_VERSION', 'WEBSITE_RUN_FROM_PACKAGE',
                  }

                  with open('local.settings.json') as f:
                      data = json.load(f)

                  all_values = {}
                  all_values.update(data.get('Values', {}))
                  all_values.update(data.get('ConnectionStrings', {}))

                  suspicious = []
                  for key, val in all_values.items():
                      if key in BENIGN_KEYS or not isinstance(val, str) or not val:
                          continue
                      if SAFE_PATTERNS.match(val):
                          continue
                      # Heuristic: long opaque values that look like keys/tokens
                      if len(val) > 24 and not val.startswith('http'):
                          suspicious.append(key)

                  if suspicious:
                      print(f"⚠️  local.settings.json may contain real secrets in: {suspicious}")
                      print("    Gitleaks will perform the authoritative check.")
                      # Advisory only — Gitleaks is the blocking gate
                  else:
                      print("✅ local.settings.json appears to use placeholder values")
                  PYEOF

            - name: Write sensitive-file summary
              if: always()
              run: |
                  echo "## Sensitive File Guard" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  if [ "${{ steps.sensitive.outputs.touched }}" = "true" ]; then
                    echo "⚠️ **Sensitive files were modified in this push:**" >> $GITHUB_STEP_SUMMARY
                    echo '```' >> $GITHUB_STEP_SUMMARY
                    echo "${{ steps.sensitive.outputs.files }}" >> $GITHUB_STEP_SUMMARY
                    echo '```' >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "> This is an **advisory warning**. Gitleaks performs the authoritative secret scan." >> $GITHUB_STEP_SUMMARY
                    echo "> Ensure no real credentials are present in the modified files." >> $GITHUB_STEP_SUMMARY
                  else
                    echo "✅ No sensitive config files were modified" >> $GITHUB_STEP_SUMMARY
                  fi
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Job | Purpose |" >> $GITHUB_STEP_SUMMARY
                  echo "|-----|---------|" >> $GITHUB_STEP_SUMMARY
                  echo "| Gitleaks | Scans git history for leaked API keys, tokens, passwords |" >> $GITHUB_STEP_SUMMARY
                  echo "| Sensitive File Guard | Warns when \`local.settings.json\`, \`.env\`, keys are touched |" >> $GITHUB_STEP_SUMMARY
