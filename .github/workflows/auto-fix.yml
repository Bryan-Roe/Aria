name: auto-fix

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * 2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  autofix:
    name: Run safe autofixes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python and autofix tooling
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.11"
          install-requirements: "false"
          install-dev-requirements: "false"
          extra-packages: "ruff==0.11.13 black==25.1.0 pytest==8.3.5"

      - name: Detect safe Python targets
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from pathlib import Path

          ignore_dirs = {
              ".git",
              ".venv",
              "venv",
              ".tox",
              ".nox",
              "__pycache__",
              "node_modules",
              ".mypy_cache",
              ".pytest_cache",
              ".ruff_cache",
              ".eggs",
              "dist",
              "build",
              "coverage",
              "htmlcov",
          }

          candidate_dirs = [
              Path("apps/aria"),
              Path("shared"),
              Path("scripts"),
          ]

          candidate_files = [
              Path("function_app.py"),
          ]

          targets = []

          for directory in candidate_dirs:
              if directory.exists() and any(
                  not ignore_dirs.intersection(path.parts)
                  for path in directory.rglob("*.py")
              ):
                  targets.append(str(directory))

          for file_path in candidate_files:
              if file_path.exists() and file_path.suffix == ".py":
                  targets.append(str(file_path))

          has_python = "true" if targets else "false"

          with open("detect_output.txt", "w", encoding="utf-8") as f:
              f.write(f"has_python={has_python}\n")
              f.write(f"targets={' '.join(targets)}\n")
          PY

          cat detect_output.txt >> "$GITHUB_OUTPUT"

      - name: Show detected targets
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Autofix targets: ${{ steps.detect.outputs.targets }}"

      - name: Run Ruff autofixes
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ruff check ${{ steps.detect.outputs.targets }} --fix

      - name: Run Black formatting
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          black ${{ steps.detect.outputs.targets }}

      - name: Verify Ruff
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ruff check ${{ steps.detect.outputs.targets }}

      - name: Verify Black
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          black ${{ steps.detect.outputs.targets }} --check

      - name: Run targeted pytest
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -euo pipefail

          ran_tests=false

          if [ -d "tests" ]; then
            pytest -q tests
            ran_tests=true
          fi

          if [ -d "apps/aria/tests" ]; then
            pytest -q apps/aria/tests
            ran_tests=true
          fi

          if [ "$ran_tests" = false ]; then
            echo "No supported targeted test directories found; skipping pytest."
          fi

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "ci(chore): apply automated safe autofixes"
          branch: "fix/autofix-weekly"
          delete-branch: false
          title: "ci: automated safe autofixes"
          body: |
            ## Summary
            Apply scheduled/manual safe autofixes for scoped Python targets.

            ## What changed
            - Ran `ruff check --fix` on approved Python paths
            - Ran `black` on approved Python paths
            - Verified lint and formatting
            - Ran targeted pytest where supported

            ## Scope
            - `apps/aria/`
            - `shared/`
            - `scripts/`
            - `function_app.py`

            ## Testing
            - Ruff verification
            - Black verification
            - Targeted pytest (when supported)

            ## Risk & Impact
            - Intended to be low risk and non-functional
            - Scoped to approved Python paths only
            - Review recommended before merge
          labels: |
            automation
            maintenance

      - name: No changes to commit
        if: steps.changes.outputs.changed != 'true'
        run: echo "No autofix changes detected."
