# =============================================================================
# Auto Validation - Orchestrator configuration validation
# =============================================================================
# Purpose: Validates autotrain.yaml and quantum_autorun.yaml configurations
# Triggers: Changes to YAML configs, training scripts, or daily schedule
# Jobs:
#   - dry-run: Validates orchestrator configs without execution
# =============================================================================

name: Auto Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'config/training/autotrain.yaml'
      - 'autotrain.yaml'
      - 'config/quantum/quantum_autorun.yaml'
      - 'quantum_autorun.yaml'
      - 'scripts/autotrain.py'
      - 'scripts/quantum_autorun.py'
      - 'scripts/auto_bootstrap.py'
      - '.github/actions/setup-python-env/**'
      - '.github/workflows/auto-validation.yml'
      - 'AI/**'
      - 'ai-projects/quantum-ml/**'
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: auto-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.2
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  UPLOAD_ARTIFACT_SHA: 65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
  PYTHON_UNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

defaults:
  run:
    shell: bash

jobs:
  dry-run:
    name: Dry-run orchestrator validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          extra-packages: 'pyyaml'

      - name: Auto bootstrap (env + orchestrator validation)
        run: |
          set -euo pipefail
          python scripts/auto_bootstrap.py

      - name: Generate validation summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Auto-Validation Results"
            echo
            for f in data_out/autotrain/status.json data_out/quantum_autorun/status.json data_out/auto_bootstrap/status_summary.json; do
              if [ -f "$f" ]; then
                echo "### $(basename "$f")"
                echo '```json'
                cat "$f"
                echo ''
                echo '```'
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload status artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: auto-validation-status-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            data_out/autotrain/status.json
            data_out/quantum_autorun/status.json
            data_out/auto_bootstrap/status_summary.json
          retention-days: 14
          if-no-files-found: warn
