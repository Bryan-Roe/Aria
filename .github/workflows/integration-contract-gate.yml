# =============================================================================
# Integration Contract Gate
# =============================================================================
# Purpose: Validates that all module API contracts remain intact.
#          Runs scripts/integration_contract_gate.sh on every PR and push.
#          Strict-endpoint mode runs on pushes to main to catch regressions
#          before they land in the default branch.
# Triggers:
#   - push to main (strict mode — 8/8 endpoint checks must pass)
#   - pull_request to main/dev (non-strict, fast gate)
#   - manual dispatch (choose mode via input)
# =============================================================================

name: Integration Contract Gate

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.devcontainer/**'
      - 'LICENSE'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.devcontainer/**'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      strict:
        description: 'Run in strict-endpoints mode (all 8 endpoint checks)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Cancel superseded PR runs; never cancel pushes to main (we want a full
# audit trail of contract validation on the default branch).
concurrency:
  group: contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Principle of least privilege: this workflow only reads code and uploads
# artifacts. No write access to issues, PRs, packages, or contents required.
permissions:
  contents: read

env:
  # Opt into Node.js 24 for JS actions ahead of the June 2026 forced migration.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.11'
  # Make Python output unbuffered so logs stream live in the Actions UI.
  PYTHONUNBUFFERED: '1'
  PYTHONDONTWRITEBYTECODE: '1'
  # Force colored output where supported.
  FORCE_COLOR: '1'
  # Integration endpoint used by the contract gate (override in workflows or runs)
  INTEGRATION_AI_STATUS_ENDPOINT: 'http://localhost:7071/api/ai/status'
  # Optional: command used to start a local Functions host (if desired in CI).
  # Example: 'func start --cors "*"' or 'func start --cors "*" --script-root ./functions'
  START_FUNC_CMD: 'func start --cors "*"'
  # Retry tuning for the gate script/steps
  RETRY_COUNT: '30'
  RETRY_INTERVAL: '1'

defaults:
  run:
    shell: bash

jobs:
  contract-gate:
    name: API Contract Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # Shallow clone is sufficient for contract validation; speeds up checkout.
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          extra-packages: 'pytest pytest-timeout'

      - name: Determine gate mode
        id: mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          DISPATCH_STRICT: ${{ github.event.inputs.strict }}
        run: |
          set -euo pipefail
          strict='false'
          mode_label='standard (PR)'

          if [[ "${EVENT_NAME}" == "push" && "${REF}" == "refs/heads/main" ]]; then
            strict='true'
            mode_label='strict (push to main)'
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" && "${DISPATCH_STRICT}" == "true" ]]; then
            strict='true'
            mode_label='strict (manual dispatch)'
          fi

          {
            echo "strict=${strict}"
            echo "mode_label=${mode_label}"
          } >> "${GITHUB_OUTPUT}"

          echo "::notice title=Contract Gate Mode::${mode_label}"

      - name: Validate generated site bundles (strict)
        uses: ./.github/actions/validate-site-bundles
        with:
          strict-metadata: 'true'

      - name: Validate local composite actions
        uses: ./.github/actions/validate-composite-actions
        with:
          script-path: scripts/validate_composite_actions.py

      - name: Start local Functions host (for endpoint checks)
        id: start-func
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          echo "INTEGRATION_AI_STATUS_ENDPOINT=${{ env.INTEGRATION_AI_STATUS_ENDPOINT }}"

          # Install Azure Functions Core Tools if not present
          if ! command -v func >/dev/null 2>&1; then
            echo "Installing Azure Functions Core Tools v4..."
            npm install -g azure-functions-core-tools@4 --unsafe-perm true
          else
            echo "azure-functions-core-tools already installed"
          fi

          # Start the Functions host in the background. Use project 'functions' if present
          echo "Starting Functions host using START_FUNC_CMD: ${START_FUNC_CMD}"
          if [[ -d "./functions" ]]; then
            pushd functions >/dev/null
            nohup ${START_FUNC_CMD} &>/tmp/func.log &
            popd >/dev/null
          else
            nohup ${START_FUNC_CMD} &>/tmp/func.log &
          fi

          echo "Started Functions host (logs: /tmp/func.log). Waiting for endpoint..."
          for i in $(seq 1 ${RETRY_COUNT}); do
            if curl --silent --fail --max-time 5 "${{ env.INTEGRATION_AI_STATUS_ENDPOINT }}" >/dev/null 2>&1; then
              echo "Endpoint ready"
              exit 0
            fi
            sleep ${RETRY_INTERVAL}
          done

          echo "Functions host did not become ready after ${RETRY_COUNT} attempts" >&2
          tail -n 200 /tmp/func.log || true
          exit 1

      - name: Run contract gate (standard)
        if: steps.mode.outputs.strict == 'false'
        uses: ./.github/actions/run-integration-contract-gate

      - name: Run contract gate (strict)
        if: steps.mode.outputs.strict == 'true'
        uses: ./.github/actions/run-integration-contract-gate
        with:
          strict-endpoints: 'true'

      - name: Upload contract results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: contract-gate-results-${{ github.run_number }}-${{ github.run_attempt }}
          retention-days: 14
          if-no-files-found: warn
          compression-level: 9
          path: |
            data_out/integration_smoke/
            data_out/ci_orchestrator/status.json

      - name: Generate summary
        if: always()
        env:
          MODE_LABEL: ${{ steps.mode.outputs.mode_label }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          status_file='data_out/ci_orchestrator/status.json'

          {
            echo "## Integration Contract Gate"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| **Mode** | ${MODE_LABEL} |"
            echo "| **Job status** | ${JOB_STATUS} |"
            echo "| **Run** | [#${GITHUB_RUN_NUMBER} (attempt ${GITHUB_RUN_ATTEMPT})](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |"
            echo "| **Commit** | \`${GITHUB_SHA::7}\` |"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ -s "${status_file}" ]]; then
            {
              echo "### Orchestrator Status"
              echo ""
              echo '```json'
              # Pretty-print if jq is available, otherwise emit raw JSON.
              if command -v jq >/dev/null 2>&1; then
                jq '.' "${status_file}" || cat "${status_file}"
              else
                cat "${status_file}"
              fi
              echo ''
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "_No orchestrator status file produced (`${status_file}` missing or empty)._" \
              >> "${GITHUB_STEP_SUMMARY}"
          fi
