# =============================================================================
# Quantum Automation - Azure Quantum workflow orchestration
# =============================================================================
# Purpose: Executes quantum computing workflows on Azure Quantum
# Triggers: Push to main or manual workflow_dispatch
# Jobs:
#   - run-quantum: Runs quantum orchestration scripts
# Note: Requires Azure credentials for quantum workspace access
# =============================================================================

name: Quantum Automation

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      LOGIC_APP_URL:
        description: "Logic App URL for optional notifications"
        required: false
        type: string
      RESOURCE_GROUP:
        description: "Azure resource group containing the Azure Quantum workspace"
        required: false
        type: string
        default: "rg-quantum-ai"
      WORKSPACE_NAME:
        description: "Azure Quantum workspace name"
        required: false
        type: string
        default: "quantum-ai-workspace"
      LOCATION:
        description: "Azure region for the workspace (e.g., eastus)"
        required: false
        type: string
        default: "eastus"
      ORCHESTRATION_MODE:
        description: "Which orchestration entrypoint to run: master or logicapp"
        required: false
        type: choice
        default: "master"
        options:
          - master
          - logicapp

# Credentials must come exclusively from the AZURE_CREDENTIALS repository secret.
# Never pass service principal JSON as a workflow_dispatch input — it would be
# visible in the GitHub Actions UI and potentially captured in runner logs.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  AZURE_LOGIN_SHA: a457da9ea143d694b1b9c7c869ebb04ebe844ef5    # v2.3.0

concurrency:
  group: quantum-orchestration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

jobs:
  run-quantum:
    name: Run Quantum Orchestration
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      HAS_AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS != '' }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Validate inputs and required files
        run: |
          $ErrorActionPreference = 'Stop'

          # Read workflow inputs (do not rely on env vars here)
          $orchestrationMode = '${{ inputs.ORCHESTRATION_MODE }}'
          $logicAppUrl = '${{ inputs.LOGIC_APP_URL }}'
          $resourceGroup = '${{ inputs.RESOURCE_GROUP }}'
          $workspaceName = '${{ inputs.WORKSPACE_NAME }}'
          $location = '${{ inputs.LOCATION }}'

          if ($orchestrationMode -eq 'logicapp') {
            if ([string]::IsNullOrWhiteSpace($logicAppUrl)) {
              throw "LOGIC_APP_URL is required when ORCHESTRATION_MODE=logicapp."
            }
            # Basic URL validation (must be HTTPS)
            if (-not [System.Uri]::IsWellFormedUriString($logicAppUrl, [System.UriKind]::Absolute)) {
              throw "LOGIC_APP_URL is not a well-formed absolute URI."
            }
            if ((New-Object System.Uri($logicAppUrl)).Scheme -ne 'https') {
              throw "LOGIC_APP_URL must use the https scheme."
            }
          }

          # Validate names to reduce risk of injection; allow alphanum and hyphen
          $nameRegex = '^[a-zA-Z0-9\-]+$'
          foreach ($val in @($resourceGroup, $workspaceName, $location)) {
            if (-not [string]::IsNullOrWhiteSpace($val) -and -not ($val -match $nameRegex)) {
              throw "Input value '$val' contains invalid characters. Allowed: letters, numbers, hyphen."
            }
          }

          $master = './ai-projects/quantum-ml/azure/quantum_master_orchestration.ps1'
          $logic  = './ai-projects/quantum-ml/azure/quantum_full_logicapp_orchestration.ps1'

          if (-not (Test-Path -LiteralPath $master)) { throw "Missing script: $master" }
          if (-not (Test-Path -LiteralPath $logic))  { throw "Missing script: $logic" }

      - name: Azure Login
        if: env.HAS_AZURE_CREDENTIALS == 'true'
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Skip when Azure credentials are not configured
        if: env.HAS_AZURE_CREDENTIALS != 'true'
        run: |
          Write-Warning "AZURE_CREDENTIALS secret is not configured. Skipping Azure Quantum orchestration."
          Write-Output "To enable, add AZURE_CREDENTIALS as a repository secret."

      - name: Run orchestration
        if: env.HAS_AZURE_CREDENTIALS == 'true'
        env:
          LOGIC_APP_URL: ${{ inputs.LOGIC_APP_URL }}
          RESOURCE_GROUP: ${{ inputs.RESOURCE_GROUP }}
          WORKSPACE_NAME: ${{ inputs.WORKSPACE_NAME }}
          LOCATION: ${{ inputs.LOCATION }}
          ORCHESTRATION_MODE: ${{ inputs.ORCHESTRATION_MODE }}
        run: |
          $ErrorActionPreference = 'Stop'

          $rg = $env:RESOURCE_GROUP
          $ws = $env:WORKSPACE_NAME
          $loc = $env:LOCATION

          if ([string]::IsNullOrWhiteSpace($rg)) { throw "RESOURCE_GROUP is empty." }
          if ([string]::IsNullOrWhiteSpace($ws)) { throw "WORKSPACE_NAME is empty." }
          if ([string]::IsNullOrWhiteSpace($loc)) { throw "LOCATION is empty." }

          if ($env:ORCHESTRATION_MODE -eq 'logicapp') {
            ./ai-projects/quantum-ml/azure/quantum_full_logicapp_orchestration.ps1 -LogicAppUrl $env:LOGIC_APP_URL
          } else {
            ./ai-projects/quantum-ml/azure/quantum_master_orchestration.ps1 -ResourceGroup $rg -WorkspaceName $ws -Location $loc
          }

      - name: Azure Logout
        if: always() && env.HAS_AZURE_CREDENTIALS == 'true'
        run: |
          az logout | Out-Null
