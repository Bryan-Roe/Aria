name: Pytest CI

on:
  push:
    branches: [ main, dev, feature/* ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - fast
          - unit
          - integration
          - slow

env:
  PYTHON_VERSION: '3.11'
  CACHE_KEY_PREFIX: pytest-v1

jobs:
  # Fast unit tests - runs on every push
  fast-tests:
    name: Fast Tests (Unit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          dev-requirements.txt
    
    - name: Cache pytest cache
      uses: actions/cache@v4
      with:
        path: .pytest_cache
        key: ${{ env.CACHE_KEY_PREFIX }}-pytest-${{ runner.os }}-${{ hashFiles('tests/**/*.py') }}
        restore-keys: |
          ${{ env.CACHE_KEY_PREFIX }}-pytest-${{ runner.os }}-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install -r dev-requirements.txt
    
    - name: Verify pytest installation
      run: |
        python -m pytest --version
        python -m pytest --collect-only tests/ -q | tail -5
    
    - name: Run fast unit tests
      run: |
        python -m pytest tests/ \
          -m "not slow and not azure and not integration" \
          -v \
          --tb=short \
          --strict-markers \
          --junitxml=test-results-fast.xml \
          --durations=10
    
    - name: Upload fast test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fast-test-results
        path: test-results-fast.xml
        retention-days: 30

  # All tests (excluding slow/azure)
  full-tests:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: fast-tests
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          dev-requirements.txt
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install -r dev-requirements.txt
        pip install pytest-cov
    
    - name: Run full test suite with coverage
      run: |
        python -m pytest tests/ \
          -m "not slow and not azure" \
          -v \
          --tb=short \
          --strict-markers \
          --cov=aria_web \
          --cov=shared \
          --cov=function_app \
          --cov-report=xml \
          --cov-report=term \
          --junitxml=test-results-full.xml \
          --durations=20
    
    - name: Upload full test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: full-test-results
        path: |
          test-results-full.xml
          coverage.xml
        retention-days: 30
    
    - name: Upload coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: qai-coverage
        fail_ci_if_error: false

  # Integration tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fast-tests
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r dev-requirements.txt
    
    - name: Run integration tests
      run: |
        python -m pytest tests/ \
          -m "integration and not azure" \
          -v \
          --tb=short \
          --junitxml=test-results-integration.xml \
          --durations=10
      continue-on-error: true
    
    - name: Upload integration test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results
        path: test-results-integration.xml
        retention-days: 30

  # Slow tests - only on schedule or manual trigger
  slow-tests:
    name: Slow Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [fast-tests, full-tests]
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.test_suite == 'slow')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r dev-requirements.txt
    
    - name: Run slow tests
      run: |
        python -m pytest tests/ \
          -m "slow and not azure" \
          -v \
          --tb=short \
          --junitxml=test-results-slow.xml \
          --durations=20
      continue-on-error: true
    
    - name: Upload slow test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: slow-test-results
        path: test-results-slow.xml
        retention-days: 30

  # Test report summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [fast-tests, full-tests]
    if: always()
    
    steps:
    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        path: test-results
    
    - name: Generate summary
      run: |
        echo "## 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f test-results/fast-test-results/test-results-fast.xml ]; then
          echo "✅ **Fast tests completed**" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Fast tests failed or incomplete**" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ -f test-results/full-test-results/test-results-full.xml ]; then
          echo "✅ **Full test suite completed**" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ **Full test suite skipped or failed**" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Quick Stats" >> $GITHUB_STEP_SUMMARY
        echo "- Python Version: ${{ env.PYTHON_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- Runner: ubuntu-latest" >> $GITHUB_STEP_SUMMARY
        echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

  # Status check for branch protection
  ci-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [fast-tests, full-tests]
    if: always()
    
    steps:
    - name: Check test results
      run: |
        if [ "${{ needs.fast-tests.result }}" != "success" ]; then
          echo "❌ Fast tests failed"
          exit 1
        fi
        
        if [ "${{ needs.full-tests.result }}" == "failure" ]; then
          echo "❌ Full tests failed"
          exit 1
        fi
        
        echo "✅ All required tests passed"
