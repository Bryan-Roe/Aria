# =============================================================================
# Nightly Regression Baseline
# =============================================================================
# Purpose: Runs the full test suite nightly, archives results as artifacts,
#          and opens a GitHub Issue if the pass-rate drops compared to the
#          previous successful run (regression detection).
# Triggers: Nightly at 03:00 UTC, manual dispatch
# =============================================================================

name: Nightly Regression Baseline

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      fail-fast:
        description: 'Stop after first failure'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      coverage-threshold:
        description: 'Minimum coverage percentage (0 disables)'
        required: false
        default: '0'
        type: string

permissions:
  contents: read
  issues: write
  actions: read  # Required to read previous workflow run artifacts

concurrency:
  group: nightly-regression
  cancel-in-progress: false  # Never cancel a nightly run mid-flight

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 for JS actions ahead of June 2026 forced migration
  PYTHONUNBUFFERED: '1'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'

defaults:
  run:
    shell: bash

jobs:
  # ── Full test run ────────────────────────────────────────────────────────────
  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      passed: ${{ steps.parse.outputs.passed }}
      failed: ${{ steps.parse.outputs.failed }}
      skipped: ${{ steps.parse.outputs.skipped }}
      errors: ${{ steps.parse.outputs.errors }}
      total: ${{ steps.parse.outputs.total }}
      exit-code: ${{ steps.run-tests.outputs.exit-code }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          python-version: '3.11'
          extra-packages: 'pytest pytest-timeout pytest-cov'

      - name: Verify critical dependencies
        run: |
          set -euo pipefail
          echo "Verifying critical test dependencies are installed..."
          python - <<'PY'
          import importlib, sys
          required = ["azure.functions", "openai", "pytest"]
          missing = []
          for mod in required:
              try:
                  importlib.import_module(mod)
                  print(f"✓ {mod} installed")
              except ImportError as e:
                  print(f"✗ {mod} MISSING: {e}", file=sys.stderr)
                  missing.append(mod)
          if missing:
              sys.exit(f"Missing required modules: {missing}")
          PY

      - name: Resolve pytest flags
        id: flags
        env:
          FAIL_FAST: ${{ github.event.inputs.fail-fast }}
        run: |
          set -euo pipefail
          extra=""
          if [[ "${FAIL_FAST:-false}" == "true" ]]; then
            extra="--maxfail=1"
          fi
          echo "extra=${extra}" >> "$GITHUB_OUTPUT"

      - name: Run full test suite
        id: run-tests
        env:
          PYTEST_EXTRA: ${{ steps.flags.outputs.extra }}
        run: |
          set -uo pipefail
          # shellcheck disable=SC2086
          python -m pytest tests/ -q --tb=short \
            --junitxml=test-results.xml \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing:skip-covered \
            ${PYTEST_EXTRA} \
            2>&1 | tee pytest-output.txt
          # Capture pytest's exit code (not tee's), thanks to pipefail
          exit_code="${PIPESTATUS[0]}"
          echo "exit-code=${exit_code}" >> "$GITHUB_OUTPUT"
          echo "Pytest exit code: ${exit_code}"
          # Don't fail the step here; downstream steps need to run to upload artifacts.

      - name: Parse results (JUnit XML)
        id: parse
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os, sys, xml.etree.ElementTree as ET
          path = "test-results.xml"
          passed = failed = skipped = errors = total = 0
          if os.path.exists(path):
              try:
                  root = ET.parse(path).getroot()
                  suites = root.findall(".//testsuite") or [root]
                  for s in suites:
                      total   += int(s.attrib.get("tests", 0))
                      failed  += int(s.attrib.get("failures", 0))
                      errors  += int(s.attrib.get("errors", 0))
                      skipped += int(s.attrib.get("skipped", 0))
                  passed = max(total - failed - errors - skipped, 0)
              except ET.ParseError as e:
                  print(f"# JUnit parse error: {e}", file=sys.stderr)
          print(f"passed={passed}")
          print(f"failed={failed}")
          print(f"skipped={skipped}")
          print(f"errors={errors}")
          print(f"total={total}")
          PY

      - name: Log parsed result totals
        if: always()
        run: |
          echo "Parsed: passed=${{ steps.parse.outputs.passed }} failed=${{ steps.parse.outputs.failed }} skipped=${{ steps.parse.outputs.skipped }} errors=${{ steps.parse.outputs.errors }}"

      - name: Enforce coverage threshold
        if: ${{ github.event.inputs.coverage-threshold != '' && github.event.inputs.coverage-threshold != '0' }}
        env:
          COV_MIN: ${{ github.event.inputs.coverage-threshold }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, sys, xml.etree.ElementTree as ET
          threshold = float(os.environ.get("COV_MIN", "0") or "0")
          if threshold <= 0:
              sys.exit(0)
              if not os.path.exists("coverage.xml"):
              sys.exit("coverage.xml not found")
          rate = float(ET.parse("coverage.xml").getroot().attrib.get("line-rate", "0")) * 100
          print(f"Line coverage: {rate:.2f}%  (threshold: {threshold:.2f}%)")
          if rate + 1e-9 < threshold:
              sys.exit(f"Coverage {rate:.2f}% is below threshold {threshold:.2f}%")
          PY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: nightly-test-results-${{ github.run_number }}
          retention-days: 30
          path: |
            test-results.xml
            coverage.xml
            pytest-output.txt
          if-no-files-found: warn

      - name: Generate summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Nightly Regression Baseline"
            echo ""
            echo "| Result | Count |"
            echo "|--------|-------|"
            echo "| ✅ Passed | ${{ steps.parse.outputs.passed }} |"
            echo "| ❌ Failed | ${{ steps.parse.outputs.failed }} |"
            echo "| 💥 Errors | ${{ steps.parse.outputs.errors }} |"
            echo "| ⏭️ Skipped | ${{ steps.parse.outputs.skipped }} |"
            echo "| 🧮 Total | ${{ steps.parse.outputs.total }} |"
            echo ""
            echo "**Pytest exit code:** \`${{ steps.run-tests.outputs.exit-code }}\`"
            echo "**Run date:** $(date -u +'%Y-%m-%d %H:%M UTC')"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job on test failures
        if: always() && steps.run-tests.outputs.exit-code != '0' && steps.run-tests.outputs.exit-code != '5'
        run: |
          echo "::error::Pytest exited with code ${{ steps.run-tests.outputs.exit-code }} (failures=${{ steps.parse.outputs.failed }}, errors=${{ steps.parse.outputs.errors }})"
          exit 1

  # ── Regression detection ─────────────────────────────────────────────────────
  detect-regression:
    name: Detect Regression
    needs: full-test-suite
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download previous successful baseline
        id: download-prev
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11  # v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: nightly-regression.yml
          workflow_conclusion: success
          name: nightly-test-results-
          name_is_regexp: true
          path: ./prev-baseline
          if_no_artifact_found: warn
          # Find the most recent successful run that is NOT the current one.
          # (Omitting run_id makes the action pick the latest successful run.)
        continue-on-error: true

      - name: Compare against baseline
        id: compare
        env:
          CURRENT_PASSED:  ${{ needs.full-test-suite.outputs.passed }}
          CURRENT_FAILED:  ${{ needs.full-test-suite.outputs.failed }}
          CURRENT_ERRORS:  ${{ needs.full-test-suite.outputs.errors }}
          CURRENT_SKIPPED: ${{ needs.full-test-suite.outputs.skipped }}
        run: |
          set -euo pipefail
          PREV_PASSED=0
          PREV_FOUND=false

          # Look for any prior JUnit XML artifact first (more reliable than text parsing)
          PREV_XML="$(find ./prev-baseline -type f -name 'test-results.xml' 2>/dev/null | head -n1 || true)"
          if [[ -n "${PREV_XML}" && -f "${PREV_XML}" ]]; then
            PREV_FOUND=true
            PREV_PASSED="$(python - <<PY
          import xml.etree.ElementTree as ET
          r = ET.parse("${PREV_XML}").getroot()
          suites = r.findall('.//testsuite') or [r]
          total = sum(int(s.attrib.get('tests',0)) for s in suites)
          fail  = sum(int(s.attrib.get('failures',0)) for s in suites)
          err   = sum(int(s.attrib.get('errors',0)) for s in suites)
          skip  = sum(int(s.attrib.get('skipped',0)) for s in suites)
          print(max(total - fail - err - skip, 0))
          PY
          )"
          else
            # Fallback: parse pytest text output
            PREV_TXT="$(find ./prev-baseline -type f -name 'pytest-output.txt' 2>/dev/null | head -n1 || true)"
            if [[ -n "${PREV_TXT}" && -f "${PREV_TXT}" ]]; then
              PREV_FOUND=true
              PREV_PASSED="$(grep -oE '[0-9]+ passed' "${PREV_TXT}" | tail -1 | grep -oE '[0-9]+' || echo 0)"
            fi
          fi

          echo "Previous found:  ${PREV_FOUND}"
          echo "Previous passed: ${PREV_PASSED}"
          echo "Current passed:  ${CURRENT_PASSED}"
          echo "Current failed:  ${CURRENT_FAILED}"
          echo "Current errors:  ${CURRENT_ERRORS}"

          regression=false
          reason=""

          # Hard regression: any failures or errors in this run.
          if [[ "${CURRENT_FAILED}" -gt 0 || "${CURRENT_ERRORS}" -gt 0 ]]; then
            regression=true
            reason="Test failures detected (failed=${CURRENT_FAILED}, errors=${CURRENT_ERRORS})."
          fi

          # Soft regression: pass count dropped vs. last successful run.
          if [[ "${PREV_FOUND}" == "true" && "${CURRENT_PASSED}" -lt "${PREV_PASSED}" ]]; then
            regression=true
            reason="${reason:+${reason} }Pass count dropped: ${PREV_PASSED} → ${CURRENT_PASSED}."
          fi

          {
            echo "regression=${regression}"
            echo "prev-passed=${PREV_PASSED}"
            echo "prev-found=${PREV_FOUND}"
          } >> "$GITHUB_OUTPUT"

          # Multi-line reason via heredoc-style delimiter
          {
            echo "reason<<__EOF__"
            echo "${reason:-No regression detected.}"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Open regression issue
        if: steps.compare.outputs.regression == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          PASSED:      ${{ needs.full-test-suite.outputs.passed }}
          FAILED:      ${{ needs.full-test-suite.outputs.failed }}
          ERRORS:      ${{ needs.full-test-suite.outputs.errors }}
          SKIPPED:     ${{ needs.full-test-suite.outputs.skipped }}
          PREV_PASSED: ${{ steps.compare.outputs.prev-passed }}
          REASON:      ${{ steps.compare.outputs.reason }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `🚨 Nightly Regression — ${today}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              `## Nightly Regression Detected`,
              ``,
              `The nightly test suite reported a regression on **${new Date().toUTCString()}**.`,
              ``,
              `**Reason:** ${process.env.REASON}`,
              ``,
              `| Metric | Current | Previous (last success) |`,
              `|--------|---------|--------------------------|`,
              `| ✅ Passed   | ${process.env.PASSED}  | ${process.env.PREV_PASSED} |`,
              `| ❌ Failed   | ${process.env.FAILED}  | — |`,
              `| 💥 Errors   | ${process.env.ERRORS}  | — |`,
              `| ⏭️ Skipped | ${process.env.SKIPPED} | — |`,
              ``,
              `**Workflow run:** ${runUrl}`,
              ``,
              `Please investigate and resolve failures before the next release.`,
            ].join('\n');

            // Avoid duplicate issues: search for an open regression issue from today (paginated).
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'regression,automated',
              per_page: 100,
            });
            const existing = issues.find(i => i.title.includes(today));
            if (existing) {
              core.notice(`Regression issue already open: #${existing.number}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Another regression run reported failures.\n\n${body}`,
              });
              return;
            }

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['regression', 'automated', 'bug'],
            });
            core.notice(`Opened regression issue #${created.data.number}`);
