# =============================================================================
# E2E + Integration Tests - Quick Aria regression testing
# =============================================================================
# Purpose: Fast regression tests for Aria character system
# Triggers: Any push/PR to main (no path filtering)
# Jobs:
#   - integration: Quick unit & integration tests
#   - e2e_playwright: Playwright E2E tests
#   - containerized_chrome: Pyppeteer containerized tests
# Note: Faster subset of aria-tests.yml, runs on all changes
# =============================================================================

name: E2E + Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Unit & Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          install-requirements: 'false'
          extra-packages: 'pytest requests pytest-asyncio'
      - name: Start server and run integration tests
        run: |
          python3 aria_web/server.py > /tmp/aria_server.log 2>&1 &
          READY=0
          for i in $(seq 1 50); do
            if curl -sSf http://127.0.0.1:8080/api/aria/state >/dev/null; then
              READY=1
              break
            fi
            sleep 0.25
          done
          if [ "$READY" -ne 1 ]; then
            echo "Aria server did not become ready in integration job" >&2
            tail -n 100 /tmp/aria_server.log || true
            exit 1
          fi
          pytest -q tests/test_aria_server.py tests/test_object_api_integration.py

  e2e_playwright:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          install-requirements: 'false'
          extra-packages: 'pytest playwright pytest-asyncio requests'
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Start server and run Playwright tests
        run: |
          python3 aria_web/server.py > /tmp/aria_server.log 2>&1 &
          READY=0
          for i in $(seq 1 60); do
            if curl -sSf http://127.0.0.1:8080/api/aria/state >/dev/null; then
              READY=1
              break
            fi
            sleep 0.25
          done
          if [ "$READY" -ne 1 ]; then
            echo "Aria server did not become ready in Playwright job" >&2
            tail -n 100 /tmp/aria_server.log || true
            exit 1
          fi
          pytest -q tests/test_ui_playwright.py

  containerized_chrome:
    name: Containerized Chrome (pyppeteer)
    runs-on: ubuntu-latest
    container:
      image: python:3.11-bullseye
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Apt-get update & install dependencies
        run: |
          apt-get update
          apt-get install -y wget gnupg ca-certificates xz-utils fonts-liberation libgtk-3-0 libxss1 libasound2 libnss3 libatk-bridge2.0-0 libx11-xcb1 libgbm1
      - name: Install Chromium (stable)
        run: |
          set -e
          # Use Debian repo for chromium; package name varies by image/repo.
          if apt-get install -y chromium chromium-driver; then
            echo "Installed chromium + chromium-driver"
          elif apt-get install -y chromium-browser; then
            echo "Installed chromium-browser"
          else
            echo "Failed to install Chromium packages" >&2
            exit 1
          fi

          # Normalize executable path expected by CHROME_PATH.
          if command -v chromium >/dev/null 2>&1; then
            command -v chromium
          elif command -v chromium-browser >/dev/null 2>&1; then
            command -v chromium-browser
            ln -sf "$(command -v chromium-browser)" /usr/bin/chromium
          else
            echo "Chromium executable not found after installation" >&2
            exit 1
          fi
      - name: Install Python test deps
        run: python -m pip install --upgrade pip && python -m pip install pytest pytest-asyncio pyppeteer requests
      - name: Start server and run pyppeteer tests
        env:
          CHROME_PATH: /usr/bin/chromium
        run: |
          python3 aria_web/server.py > /tmp/aria_server.log 2>&1 &
          READY=0
          for i in $(seq 1 60); do
            if curl -sSf http://127.0.0.1:8080/api/aria/state >/dev/null; then
              READY=1
              break
            fi
            sleep 0.25
          done
          if [ "$READY" -ne 1 ]; then
            echo "Aria server did not become ready in pyppeteer job" >&2
            tail -n 100 /tmp/aria_server.log || true
            exit 1
          fi
          pytest -q tests/test_ui_pyppeteer.py
