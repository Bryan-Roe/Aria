name: Autofix

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * 2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  autofix:
    name: Run safe autofixes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install autofix tooling
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install \
            "ruff==0.11.13" \
            "black==25.1.0" \
            "pytest==8.3.5"

      - name: Detect Python files
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from pathlib import Path

          ignore_dirs = {
              ".git",
              ".venv",
              "venv",
              "__pycache__",
              "node_modules",
              ".mypy_cache",
              ".pytest_cache",
              "dist",
              "build",
          }

          has_python = False
          for path in Path(".").rglob("*.py"):
              if ignore_dirs.intersection(path.parts):
                  continue
              has_python = True
              break

          with open("detect_output.txt", "w", encoding="utf-8") as f:
              f.write(f"has_python={'true' if has_python else 'false'}\n")
          PY

          cat detect_output.txt >> "$GITHUB_OUTPUT"

      - name: Run Ruff autofixes
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ruff check . --fix

      - name: Run Black formatting
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          black .

      - name: Verify Ruff
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ruff check .

      - name: Verify Black
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          black . --check

      - name: Run pytest if configured
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ -d tests ] || [ -f pytest.ini ] || [ -f pyproject.toml ]; then
            pytest -q || {
              echo "Pytest failed in repo-wide mode; consider scoping tests per Python project."
              exit 1
            }
          else
            echo "No pytest configuration or tests directory found; skipping tests."
          fi

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "ci(chore): apply automated safe autofixes"
          branch: "fix/autofix-weekly"
          delete-branch: false
          title: "ci: automated safe autofixes"
          body: |
            ## Summary
            Apply scheduled/manual safe autofixes for Python code.

            ## What changed
            - Ran `ruff check --fix`
            - Ran `black`
            - Verified lint and formatting
            - Ran pytest when tests/configuration were present

            ## Testing
            - Ruff verification
            - Black verification
            - Pytest (when available)

            ## Risk & Impact
            - Intended to be low risk and non-functional
            - Review recommended before merge
          labels: |
            automation
            maintenance

      - name: No changes to commit
        if: steps.changes.outputs.changed != 'true'
        run: echo "No autofix changes detected."
