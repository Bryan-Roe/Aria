name: llm-maker Tests

on:
  push:
    paths:
      - 'ai-projects/llm-maker/**'
  pull_request:
    paths:
      - 'ai-projects/llm-maker/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  SETUP_PYTHON_SHA: a26af69be951a213d495a4c3e4e4022e16d87065    # v5.6.0

concurrency:
  group: llm-maker-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-llm-maker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; \
          elif [ -f pyproject.toml ]; then python -m pip install -e .[dev]; \
          else pip install pytest; fi

      - name: Run llm-maker tests
        uses: ./.github/actions/run-pytest-suite
        with:
          test-path: ai-projects/llm-maker/tests
          extra-args: --maxfail=1 -q
        env:
          CI: true
