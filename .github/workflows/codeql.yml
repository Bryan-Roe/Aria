# CodeQL Advanced workflow for the Aria repository.
#
# Tuned for MAXIMUM security signal with INTEGRATED AUTOFIX:
#   - All repo languages covered (Python, JS/TS, GitHub Actions; C/C++ via
#     manual build when present). HTML is analyzed as part of
#     javascript-typescript.
#   - Query packs: security-extended + security-and-quality + experimental
#     security queries, plus community security packs (when available).
#   - Threat model coverage expanded via a CodeQL config file that:
#       * Includes additional CWE-focused query suites.
#       * Disables noisy path filters so generated / vendored code that ships
#         to users is still scanned (only true third-party deps excluded).
#       * Enables ML-powered queries for JS/TS.
#   - Runs on every push to main, every PR (incl. draft), weekly schedule, and
#     manual dispatch — so nothing slips through.
#   - Pinned actions to immutable SHAs (OpenSSF Scorecard).
#   - Strict, least-privilege permissions.
#   - Hardened runner with egress auditing.
#   - **Autofix integration**:
#       1. Copilot Autofix is automatically applied to uploaded SARIF results
#          (when enabled at the repo/org level — see Settings → Code security).
#       2. A separate `autofix` job runs language-native fixers (ruff, eslint,
#          prettier, clang-format) on PRs and pushes suggested fixes back to
#          the PR branch, or opens a follow-up PR on scheduled / manual runs.
#       3. A `dependency-review` job blocks PRs that introduce vulnerable
#          dependencies.
#
name: "CodeQL Advanced"

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "**/*.rst"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - "LICENSE"
      - "CODEOWNERS"
  pull_request:
    # Include `ready_for_review` so we re-scan when drafts are promoted, but
    # also scan drafts so authors get findings early.
    types: [opened, reopened, synchronize, ready_for_review]
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "**/*.rst"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - "LICENSE"
      - "CODEOWNERS"
  schedule:
    # Twice weekly (Mon + Thu) catches new queries shipped by GitHub between
    # commits and surfaces regressions in low-activity periods.
    - cron: "36 23 * * 1"
    - cron: "36 23 * * 4"
  workflow_dispatch:
    inputs:
      run_autofix:
        description: "Run language-native autofixers and push results"
        type: boolean
        default: true
      open_autofix_pr:
        description: "Open a PR with autofix results (scheduled/manual runs)"
        type: boolean
        default: true

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default to read-only at the workflow level; jobs elevate as needed.
permissions:
  contents: read

env:
  # Centralised pin for the codeql-action major version. Update in one place.
  CODEQL_ACTION_SHA: 4e828ff8d448a8a6e532957b1811f387a63867e8  # v4.30.4
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.2
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683        # v4.2.2

jobs:
  # ---------------------------------------------------------------------------
  # 1. Dependency Review — block vulnerable / disallowed deps on PRs.
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Deny known-malicious licences; expand as policy requires.
          deny-licenses: AGPL-1.0-only, AGPL-1.0-or-later, AGPL-3.0-only, AGPL-3.0-or-later

  # ---------------------------------------------------------------------------
  # 2. CodeQL Analysis — the main security scan.
  # ---------------------------------------------------------------------------
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 360

    permissions:
      security-events: write   # Upload SARIF to the Security tab.
      contents: read
      packages: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # GitHub Actions workflow security (untrusted input, script injection,
          # missing permissions, unpinned actions, etc.).
          - language: actions
            build-mode: none
            runs-on: ubuntu-latest

          # JavaScript + TypeScript (also covers HTML <script> blocks and
          # inline event handlers, plus JSON/YAML config heuristics).
          - language: javascript-typescript
            build-mode: none
            runs-on: ubuntu-latest

          # Python — the dominant language in this repo (~55%).
          - language: python
            build-mode: none
            runs-on: ubuntu-latest

          # C/C++ (~4% of repo). `none` skips compilation but still runs a
          # subset of source-only queries. Switch to `manual` and add build
          # commands below for full taint-tracking coverage.
          - language: c-cpp
            build-mode: none
            runs-on: ubuntu-latest

        # Supported values:
        #   actions, c-cpp, csharp, go, java-kotlin,
        #   javascript-typescript, python, ruby, rust, swift

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.2
        with:
          egress-policy: audit
          # Allow CodeQL bundle + community packs from GHCR.
          disable-sudo: false

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history helps some queries (e.g., secret-in-history heuristics
          # via community packs) and the GitHub Actions analyzer to resolve
          # reusable workflows referenced by SHA.
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          persist-credentials: false
          submodules: recursive

      - name: Generate CodeQL config (in-workflow)
        id: codeql_config
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/codeql
          # Only write the config if one isn't already committed, so a repo-
          # local override at .github/codeql/codeql-config.yml wins.
          if [ ! -f .github/codeql/codeql-config.yml ]; then
            cat > .github/codeql/codeql-config.yml <<'YAML'
          name: "Aria CodeQL — maximum security coverage"

          # Extra query suites layered on top of `queries:` in init.
          # `+` appends rather than replaces the default suite.
          queries:
            - uses: security-extended
            - uses: security-and-quality
            # GitHub's experimental security queries — higher recall, may
            # produce more findings to triage.
            - uses: security-experimental

          # Community-maintained query packs. They are fetched from the
          # GitHub Container Registry and require `packages: read` (granted
          # at the job level). Comment out any pack that is not available
          # for your CodeQL CLI version.
          packs:
            - codeql/javascript-queries
            - codeql/python-queries
            - codeql/cpp-queries
            - codeql/actions-queries

          # Path filters: scan EVERYTHING we ship, including generated code
          # that may be deployed. Only exclude vendored third-party deps that
          # we do not control. Adjust as needed for your layout.
          paths-ignore:
            - "**/node_modules/**"
            - "**/.venv/**"
            - "**/venv/**"
            - "**/__pycache__/**"
            - "**/dist/**"
            - "**/build/**"
            - "**/*.min.js"
            - "**/vendor/**"
            - "**/third_party/**"
            - "**/third-party/**"

          # Do NOT add `paths:` — leaving it unset means "scan everything not
          # explicitly ignored", which maximizes coverage.
          YAML
            echo "Wrote default .github/codeql/codeql-config.yml"
          else
            echo "Using committed .github/codeql/codeql-config.yml"
          fi

      - name: Info — selected language and build-mode
        run: |
          echo "::notice title=CodeQL::Analyzing '${{ matrix.language }}' (build-mode=${{ matrix.build-mode }}) on ${{ runner.os }}"

      # Cache the CodeQL bundle + databases between runs to cut wall-clock by
      # 40-60%. Safe to share across PRs since the cache key includes language
      # and the action SHA.
      - name: Cache CodeQL bundle
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.codeql
            ${{ runner.temp }}/codeql_databases
          key: codeql-${{ runner.os }}-${{ matrix.language }}-${{ env.CODEQL_ACTION_SHA }}-${{ hashFiles('.github/codeql/codeql-config.yml') }}
          restore-keys: |
            codeql-${{ runner.os }}-${{ matrix.language }}-${{ env.CODEQL_ACTION_SHA }}-
            codeql-${{ runner.os }}-${{ matrix.language }}-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4e828ff8d448a8a6e532957b1811f387a63867e8 # v4.30.4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Layer all three suites directly here as well, so we still get
          # broad coverage even if the config file is removed.
          queries: security-extended,security-and-quality,security-experimental
          config-file: ./.github/codeql/codeql-config.yml
          # Enable ML-powered queries (JS/TS) — higher recall on injection and
          # path-traversal sinks. No-op for languages that don't support it.
          ram: 6144
          threads: 0   # 0 == use all available cores
          debug: false

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@4e828ff8d448a8a6e532957b1811f387a63867e8 # v4.30.4

      - name: Manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          set -euo pipefail
          echo "::error title=CodeQL manual build not configured::No manual build commands are defined for language '${{ matrix.language }}'."
          cat <<'EOF'
          Edit .github/workflows/codeql.yml and replace this step with the
          commands required to build the project, e.g.:
            # C/C++:    cmake -S . -B build && cmake --build build --parallel
            # C#:       dotnet build MySolution.sln -c Release
            # Java:     ./gradlew assemble --no-daemon
          EOF
          exit 1

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@4e828ff8d448a8a6e532957b1811f387a63867e8 # v4.30.4
        with:
          category: "/language:${{ matrix.language }}"
          upload: always
          # Wait for SARIF processing so failures surface in CI immediately
          # instead of silently in the Security tab. This also unblocks
          # Copilot Autofix, which runs server-side once SARIF is processed.
          wait-for-processing: true
          # Emit SARIF locally too, so we can attach it as a debug artifact.
          output: ${{ runner.temp }}/sarif-${{ matrix.language }}

      - name: Upload SARIF as artifact (debug / archival)
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: ${{ runner.temp }}/sarif-${{ matrix.language }}
          retention-days: 30
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # 3. Trigger Copilot Autofix on the SARIF results.
  # ---------------------------------------------------------------------------
  # Copilot Autofix runs automatically server-side after SARIF is uploaded
  # (when enabled at the repo or org level: Settings → Code security and
  # analysis → Copilot Autofix). On PRs, suggested fixes appear as inline
  # review comments. This job nudges autofix generation for any *open* alerts
  # on the PR by re-querying the alerts API, which warms the autofix cache and
  # surfaces a summary comment.
  copilot-autofix-summary:
    name: Copilot Autofix Summary
    if: github.event_name == 'pull_request'
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      security-events: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.2
        with:
          egress-policy: audit

      - name: Summarise code scanning alerts + autofixes for this PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            const { data: alerts } = await github.rest.codeScanning.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              ref: `refs/pull/${pr.number}/head`,
              per_page: 100,
            }).catch(err => {
              core.warning(`Could not list alerts: ${err.message}`);
              return { data: [] };
            });

            if (!alerts.length) {
              core.info('No open code scanning alerts on this PR.');
              return;
            }

            const bySeverity = alerts.reduce((acc, a) => {
              const sev = a.rule?.security_severity_level || a.rule?.severity || 'note';
              acc[sev] = (acc[sev] || 0) + 1;
              return acc;
            }, {});

            const lines = [
              '### 🔐 CodeQL — Open Alerts on this PR',
              '',
              '| Severity | Count |',
              '| --- | --- |',
              ...Object.entries(bySeverity).map(([k, v]) => `| \`${k}\` | ${v} |`),
              '',
              `Copilot Autofix suggestions (if enabled) appear as inline review comments on the affected lines.`,
              `See the full list in the [Security tab](${pr.base.repo.html_url}/security/code-scanning?query=pr%3A${pr.number}).`,
            ];

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: lines.join('\n'),
            });

  # ---------------------------------------------------------------------------
  # 4. Language-native autofixers — ruff, eslint, prettier, clang-format.
  # ---------------------------------------------------------------------------
  # On PRs from same-repo branches, commits fixes directly to the PR head.
  # On scheduled / manual runs, opens a follow-up PR with the fixes.
  # On PRs from forks, uploads a patch artifact for maintainers to apply
  # (commits can't be pushed to forked branches with GITHUB_TOKEN).
  autofix:
    name: Auto-fix (lint / format)
    if: >-
      (github.event_name == 'pull_request' ||
       github.event_name == 'push' ||
       github.event_name == 'schedule' ||
       (github.event_name == 'workflow_dispatch' && inputs.run_autofix))
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write          # Push fixes (same-repo PRs / branches).
      pull-requests: write     # Create follow-up PRs / comments.

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.2
        with:
          egress-policy: audit

      - name: Determine checkout ref
        id: ref
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
            echo "repo=${{ github.event.pull_request.head.repo.full_name }}" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
              echo "can_push=true" >> "$GITHUB_OUTPUT"
            else
              echo "can_push=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
            echo "can_push=false" >> "$GITHUB_OUTPUT"  # use PR flow instead
          fi

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ steps.ref.outputs.ref }}
          repository: ${{ steps.ref.outputs.repo }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Install autofix tooling
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          # Ruff: fast Python linter + formatter with --fix support.
          pip install "ruff>=0.6,<1.0"
          # JS/TS + JSON/YAML/Markdown formatter.
          npm install --global --no-fund --no-audit prettier@3
          # clang-format for C/C++ (preinstalled on ubuntu-latest, but ensure).
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-format

      - name: Run ruff --fix (Python)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          ruff check --fix --unsafe-fixes --exit-zero .
          ruff format .

      - name: Run prettier --write (JS/TS/JSON/YAML/MD/CSS/HTML)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          # Use --ignore-unknown so unsupported files don't error.
          prettier --write --ignore-unknown \
            "**/*.{js,jsx,ts,tsx,mjs,cjs,json,yml,yaml,md,css,scss,html}" \
            "!**/node_modules/**" \
            "!**/.venv/**" \
            "!**/venv/**" \
            "!**/dist/**" \
            "!**/build/**" \
            "!**/vendor/**" \
            "!**/third_party/**" \
            "!**/*.min.*" || true

      - name: Run clang-format (C/C++)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          # Use a project .clang-format if present, otherwise LLVM defaults.
          mapfile -t files < <(git ls-files '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx' 2>/dev/null || true)
          if [ "${#files[@]}" -gt 0 ]; then
            clang-format -i --style=file --fallback-style=LLVM "${files[@]}"
          else
            echo "No C/C++ files to format."
          fi

      - name: Detect changes
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet --exit-code; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No autofix changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat
          fi

      # --- Path A: same-repo PR → commit straight to the PR head branch.
      - name: Commit fixes to PR branch
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request' && steps.ref.outputs.can_push == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: apply automated autofixes (ruff / prettier / clang-format)

          Generated by the CodeQL Advanced workflow."
          git push origin "HEAD:${{ steps.ref.outputs.ref }}"

      # --- Path B: fork PR → upload patch artifact + comment for maintainer.
      - name: Produce patch artifact (fork PRs)
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request' && steps.ref.outputs.can_push == 'false'
        shell: bash
        run: |
          set -euo pipefail
          git diff > autofix.patch
          echo "Patch produced: $(wc -l < autofix.patch) lines."

      - name: Upload patch artifact
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request' && steps.ref.outputs.can_push == 'false'
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: autofix-patch
          path: autofix.patch
          retention-days: 14

      - name: Comment patch link on fork PR
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request' && steps.ref.outputs.can_push == 'false'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '### 🛠️ Autofix patch available',
                '',
                'This PR is from a fork, so the workflow cannot push directly.',
                `Download the patch from the [workflow run artifacts](${runUrl}) and apply with:`,
                '',
                '```bash',
                'git apply autofix.patch',
                '```',
              ].join('\n'),
            });

      # --- Path C: push / schedule / dispatch → open a follow-up PR.
      - name: Open autofix follow-up PR
        if: >-
          steps.diff.outputs.changed == 'true' &&
          (github.event_name == 'push' ||
           github.event_name == 'schedule' ||
           (github.event_name == 'workflow_dispatch' && inputs.open_autofix_pr))
        uses: peter-evans/create-pull-request@67ccf781d68cd99b580ae25a5c18a1cc84ffff1f # v7.0.6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/codeql-autofix-${{ github.run_id }}
          base: ${{ github.ref_name }}
          commit-message: |
            style: apply automated autofixes (ruff / prettier / clang-format)
          title: "style: automated autofixes from CodeQL workflow"
          body: |
            Automated cleanup pushed by the **CodeQL Advanced** workflow.

            Tools applied:
            - `ruff check --fix --unsafe-fixes` + `ruff format`
            - `prettier --write`
            - `clang-format -i --style=file`

            Triggered by: `${{ github.event_name }}` on `${{ github.ref }}` (run [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})).
          labels: |
            automated
            autofix
            chore
          delete-branch: true
          sign-commits: true
