# CodeQL Advanced workflow for the Aria repository.
#
# This workflow performs static analysis using GitHub's CodeQL engine across
# the repository languages chosen in the matrix. Keep the matrix in sync with
# the repo to avoid wasted CI minutes.
#
# Improvements made:
# - Added explicit PR event types to avoid noisy triggers.
# - Hardened and minimized permissions while ensuring SARIF upload works.
# - Clarified matrix comment and kept build-mode handling robust.
# - Preserved manual-build guidance and safe checkout settings.
#
name: "CodeQL Advanced"

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - "LICENSE"
  pull_request:
    # Run for relevant PR lifecycle events only.
    types: [opened, reopened, synchronize, ready_for_review]
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - "LICENSE"
  schedule:
    # Weekly scan on Monday at 23:36 UTC.
    - cron: "36 23 * * 1"
  workflow_dispatch:

# Cancel in-progress runs for the same ref/PR when a new commit is pushed.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Minimal permissions at workflow level. Job adds needed additional permissions.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Match runner OS to language requirements (Swift requires macOS).
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    timeout-minutes: 360

    # Job-specific permissions required for uploading SARIF and fetching packs.
    permissions:
      security-events: write   # required to upload SARIF results to the Security tab
      contents: read
      packages: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: csharp
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
        # Supported values for 'language':
        #   actions, c-cpp, csharp, go, java-kotlin,
        #   javascript-typescript, python, ruby, rust, swift
        # If you add or remove languages, keep this matrix in sync with the repo.
        # Use build-mode: manual for compiled languages where autobuild needs guidance.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix['build-mode'] }}
          # Use the extended security query suite for higher signal coverage.
          # Switch to "security-and-quality" to also include code-quality queries,
          # or remove this line entirely to fall back to the default suite.
          queries: security-extended
          # Uncomment to use a config file for path filters / custom packs:
          # config-file: ./.github/codeql/codeql-config.yml

      # If autobuild fails for a compiled language, switch its 'build-mode' to
      # 'manual' in the matrix and provide explicit build commands here.
      - name: Manual build steps
        if: matrix['build-mode'] == 'manual'
        shell: bash
        run: |
          echo "::error::No manual build commands configured for language '${{ matrix.language }}'."
          echo "Edit .github/workflows/codeql.yml and replace this step with the"
          echo "commands required to build the project, for example:"
          echo "  make bootstrap"
          echo "  make release"
          exit 1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: always
