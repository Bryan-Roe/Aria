name: Copilot setup validation

# Runnable checklist validating repository Copilot instruction files and related docs.
# Runs YAML and Markdown linters and produces a small report artifact contributors can inspect.
# Safe by default (read-only). Runs manually (workflow_dispatch), on push to .github, and on PRs touching .github.
# Improvements:
# - runs on pull_request as well as push
# - caches pip/npm to speed repeated runs
# - consistent shell safety (set -euo pipefail)
# - workflow_dispatch input to optionally expand checks
# - more robust file list handling and explicit reporting

on:
  workflow_dispatch:
    inputs:
      include_all:
        description: "Set to true to force linting of all repo markdown/yaml targets"
        required: false
        default: 'false'
  push:
    paths:
      - '.github/**'
      - '.github/workflows/**'
      - '.github/copilot*'
      - '.github/*.md'
      - 'README.md'
  pull_request:
    paths:
      - '.github/**'
      - '.github/workflows/**'
      - '.github/copilot*'
      - '.github/*.md'
      - 'README.md'

concurrency:
  group: copilot-setup-check
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-setup:
    name: Validate Copilot setup files & linters
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-cache-v1

      - name: Cache npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-cache-v1

      - name: Setup Node (for markdownlint)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python (for yamllint)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          # Fail fast for install errors, keep linters pinned for reproducible runs
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install --no-cache-dir yamllint
          # Install markdownlint CLI (pinned). Using global install on runner is acceptable here.
          npm install -g markdownlint-cli@0.33.0 markdownlint-rule-helpers

      - name: Lint YAML workflow files
        id: yamllint
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "Running yamllint on .github YAML files..."

          # Build list of YAML files safely (handles spaces/newlines)
          YAML_LIST_FILE="${RUNNER_TEMP}/yaml_files0"
          find .github -type f \( -iname '*.yml' -o -iname '*.yaml' \) -print0 > "$YAML_LIST_FILE" || true

          if [ -s "$YAML_LIST_FILE" ]; then
            # convert null-delimited list to shell args safely
            mapfile -d '' -t yaml_files < "$YAML_LIST_FILE"
            printf "Found %d YAML files to lint\n" "${#yaml_files[@]}"
            printf "%s\n" "${yaml_files[@]}"

            # Inline basic yamllint config: prefer warnings for long lines
            yamllint -c <(cat <<'YAML'
          extends: default
          rules:
            line-length:
              max: 140
              level: warning
          YAML
            ) "${yaml_files[@]}" || true
          else
            echo "No YAML files found under .github to lint."
          fi

      - name: Lint Copilot and Markdown files
        id: mdlint
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "Running markdownlint on common Copilot docs..."
          md_targets=()

          # Common Copilot doc locations (explicit)
          [ -f ".github/copilot-instructions.full.md" ] && md_targets+=(".github/copilot-instructions.full.md")
          [ -f ".github/copilot-instructions.md" ] && md_targets+=(".github/copilot-instructions.md")
          [ -f ".github/COPILOT.md" ] && md_targets+=(".github/COPILOT.md")

          # Add any .github/*.md and root README.md
          for f in .github/*.md README.md; do
            [ -f "$f" ] && md_targets+=("$f")
          done

          # If the workflow_dispatch input include_all=true, optionally search repository-wide markdown too
          if [ "${{ github.event.inputs.include_all || 'false' }}" = "true" ]; then
            echo "include_all set: adding docs/**/*.md and *.md at repo root"
            while IFS= read -r -d '' file; do
              md_targets+=("$file")
            done < <(find . -type f -iname '*.md' -not -path './node_modules/*' -print0 || true)
          fi

          if [ ${#md_targets[@]} -eq 0 ]; then
            echo "No target markdown files found for markdownlint."
          else
            # Deduplicate targets
            IFS=$'\n' read -r -d '' -a md_targets_unique < <(printf "%s\n" "${md_targets[@]}" | awk '!seen[$0]++' && printf '\0')
            for m in "${md_targets_unique[@]}"; do
              echo "linting: $m"
            done

            # Run markdownlint; continue-on-error preserves artifact creation even if lint failures exist
            markdownlint "${md_targets_unique[@]}" || true
          fi

      - name: Basic content checks for Copilot docs
        id: checks
        continue-on-error: false
        run: |
          set -euo pipefail
          REPORT="${RUNNER_TEMP}/copilot_setup_report.txt"
          echo "Copilot Setup Report - $(date -u)" > "$REPORT"
          echo "" >> "$REPORT"

          # Files we expect or recommend
          files_to_check=(
            .github/copilot-instructions.full.md
            .github/copilot-instructions.md
            .github/COPILOT.md
            .github/copilot.yml
          )

          for f in "${files_to_check[@]}"; do
            if [ -f "$f" ]; then
              echo "FOUND: $f" >> "$REPORT"
            else
              echo "MISSING: $f" >> "$REPORT"
            fi
          done

          echo "" >> "$REPORT"

          # Sanity-check the main Copilot instructions file if present
          MAIN=".github/copilot-instructions.full.md"
          if [ -f "$MAIN" ]; then
            echo "Checking header and length of $MAIN..." >> "$REPORT"
            head -n 10 "$MAIN" >> "$REPORT"
            echo "----" >> "$REPORT"
            wc -l "$MAIN" >> "$REPORT"
            echo "" >> "$REPORT"

            if grep -qi "last updated" "$MAIN"; then
              echo "OK: contains 'Last updated' entry" >> "$REPORT"
            else
              echo "WARN: consider adding a 'Last updated:' date near the top of $MAIN" >> "$REPORT"
            fi

            if grep -qi "copilot" "$MAIN"; then
              echo "OK: file references Copilot" >> "$REPORT"
            else
              echo "WARN: $MAIN does not mention 'Copilot' — ensure the guide is Copilot-specific" >> "$REPORT"
            fi
          else
            echo "SKIP: $MAIN not present for deep checks" >> "$REPORT"
          fi

          # Recommend a minimal copilot.yml if none exists
          if [ ! -f ".github/copilot.yml" ]; then
            echo "" >> "$REPORT"
            echo "RECOMMENDATION: add a .github/copilot.yml to control Copilot settings for this repo." >> "$REPORT"
            cat >> "$REPORT" <<'YAML'

          Example minimal .github/copilot.yml:
          # Opt-in per-repo Copilot configuration. Adjust to your repo needs.

          copilot:
            code-suggestions: enabled
            chat: enabled
            file-exclusions:
              - path: "data/"
              - path: "models/"
          YAML
          fi

          # Export report location as a step output via GITHUB_OUTPUT (preferred)
          echo "report_path=$REPORT" >> "$GITHUB_OUTPUT"

          # Print short report to logs for visibility
          echo "---- Copilot setup report ----"
          cat "$REPORT"
        shell: bash

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: copilot-setup-report
          path: ${{ steps.checks.outputs.report_path }}

      - name: Summary annotation (best-effort)
        if: always()
        env:
          REPORT_PATH: ${{ steps.checks.outputs.report_path }}
        run: |
          set -euo pipefail
          echo "=== Copilot Setup Summary ==="
          sed -n '1,200p' "$REPORT_PATH" || true

    outputs:
      # Expose the report path from the checks step
      report: ${{ steps.checks.outputs.report_path }}
