name: Copilot setup validation
run-name: >
  Copilot setup validation
  (${{ github.event_name }}${{ github.event_name == 'workflow_dispatch' && format(', include_all={0}', inputs.include_all) || '' }})

on:
  workflow_dispatch:
    inputs:
      include_all:
        description: Force linting of all repository Markdown/YAML targets
        required: false
        type: boolean
        default: false
  push:
    paths:
      - '.github/**'
      - 'README.md'
  pull_request:
    paths:
      - '.github/**'
      - 'README.md'

concurrency:
  group: copilot-setup-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683
  SETUP_PYTHON_SHA: a26af69be951a213d495a4c3e4e4022e16d87065
  SETUP_NODE_SHA: 49933ea5288caeca8642d1e84afbd3f7d6820020
  UPLOAD_ARTIFACT_SHA: 65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08

jobs:
  validate-setup:
    name: Validate Copilot setup files & linters
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1
          persist-credentials: false
          clean: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install --disable-pip-version-check yamllint==1.35.1
          npm install -g markdownlint-cli@0.33.0

      - name: Lint YAML workflow files
        id: yamllint
        continue-on-error: true
        run: |
          set -euo pipefail

          YAML_LIST_FILE="${RUNNER_TEMP}/yaml_files.txt"
          find .github -type f \( -iname '*.yml' -o -iname '*.yaml' \) -print0 > "$YAML_LIST_FILE" || true

          if [ ! -s "$YAML_LIST_FILE" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "No YAML files found under .github to lint."
            exit 0
          fi

          mapfile -d '' -t yaml_files < "$YAML_LIST_FILE"
          printf "Found %d YAML files to lint\n" "${#yaml_files[@]}"
          printf '%s\n' "${yaml_files[@]}"

          yamllint -c <(cat <<'YAML'
          extends: default
          rules:
            line-length:
              max: 140
              level: warning
          YAML
          ) "${yaml_files[@]}"

          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Lint Copilot and Markdown files
        id: mdlint
        continue-on-error: true
        env:
          INCLUDE_ALL: ${{ inputs.include_all }}
        run: |
          set -euo pipefail

          md_targets=()

          [ -f ".github/copilot-instructions.full.md" ] && md_targets+=(".github/copilot-instructions.full.md")
          [ -f ".github/copilot-instructions.md" ] && md_targets+=(".github/copilot-instructions.md")
          [ -f ".github/COPILOT.md" ] && md_targets+=(".github/COPILOT.md")

          for f in .github/*.md README.md; do
            [ -f "$f" ] && md_targets+=("$f")
          done

          if [ "${INCLUDE_ALL}" = "true" ]; then
            while IFS= read -r -d '' file; do
              md_targets+=("$file")
            done < <(find . -type f -iname '*.md' -not -path './node_modules/*' -print0 | sort -z)
          fi

          if [ "${#md_targets[@]}" -eq 0 ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "No target markdown files found for markdownlint."
            exit 0
          fi

          mapfile -t md_targets_unique < <(printf "%s\n" "${md_targets[@]}" | awk '!seen[$0]++' | sort)

          printf 'Linting markdown targets:\n'
          printf ' - %s\n' "${md_targets_unique[@]}"

          markdownlint "${md_targets_unique[@]}"

          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Basic content checks for Copilot docs
        id: checks
        run: |
          set -euo pipefail

          REPORT="${RUNNER_TEMP}/copilot_setup_report.txt"
          {
            echo "Copilot Setup Report - $(date -u)"
            echo
          } > "$REPORT"

          files_to_check=(
            .github/copilot-instructions.full.md
            .github/copilot-instructions.md
            .github/COPILOT.md
            .github/copilot.yml
          )

          for f in "${files_to_check[@]}"; do
            if [ -f "$f" ]; then
              echo "FOUND: $f" >> "$REPORT"
            else
              echo "MISSING: $f" >> "$REPORT"
            fi
          done

          echo >> "$REPORT"

          MAIN=".github/copilot-instructions.full.md"
          if [ -f "$MAIN" ]; then
            echo "Checking header and length of $MAIN..." >> "$REPORT"
            head -n 10 "$MAIN" >> "$REPORT"
            echo "----" >> "$REPORT"
            wc -l "$MAIN" >> "$REPORT"
            echo >> "$REPORT"

            if grep -qi "last updated" "$MAIN"; then
              echo "OK: contains 'Last updated' entry" >> "$REPORT"
            else
              echo "WARN: consider adding a 'Last updated:' date near the top of $MAIN" >> "$REPORT"
            fi

            if grep -qi "copilot" "$MAIN"; then
              echo "OK: file references Copilot" >> "$REPORT"
            else
              echo "WARN: $MAIN does not mention 'Copilot' — ensure the guide is Copilot-specific" >> "$REPORT"
            fi
          else
            echo "SKIP: $MAIN not present for deep checks" >> "$REPORT"
          fi

          echo "report_path=$REPORT" >> "$GITHUB_OUTPUT"

          {
            echo "## Copilot Setup Summary"
            echo
            sed -n '1,200p' "$REPORT"
          } >> "$GITHUB_STEP_SUMMARY"

          cat "$REPORT"

      - name: Upload report artifact
        if: ${{ always() && steps.checks.outputs.report_path != '' }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: copilot-setup-report
          path: ${{ steps.checks.outputs.report_path }}
          if-no-files-found: warn
          retention-days: 7

      - name: Fail if validation failed
        if: always()
        run: |
          set -euo pipefail

          yaml_outcome="${{ steps.yamllint.outcome }}"
          md_outcome="${{ steps.mdlint.outcome }}"

          echo "yamllint outcome: $yaml_outcome"
          echo "markdownlint outcome: $md_outcome"

          if [ "$yaml_outcome" = "failure" ] || [ "$md_outcome" = "failure" ]; then
            echo "One or more lint checks failed."
            exit 1
          fi
