name: API Health Smoke

on:
  pull_request:
    branches: [main, dev]
    paths: &api_health_paths
      - "function_app.py"
      - "host.json"
      - "shared/**"
      - "ai-projects/chat-cli/src/**"
      - "scripts/integration_smoke.py"
      - "scripts/ci_orchestrator.py"
      - ".github/actions/setup-python-env/**"
      - ".github/workflows/api-health-smoke.yml"
  push:
    branches: [main]
    paths: *api_health_paths
  schedule:
    - cron: "30 4 * * *" # Daily 04:30 UTC
  workflow_dispatch:

concurrency:
  group: api-health-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Principle of least privilege: this workflow only needs to read repo contents.
permissions:
  contents: read

env:
  # Opt into Node.js 24 for JS actions ahead of June 2026 forced migration.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

defaults:
  run:
    shell: bash

jobs:
  smoke:
    name: API Smoke Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          extra-packages: "pytest requests"

      - name: Run integration smoke checks
        id: integration_smoke
        run: python scripts/integration_smoke.py --json

      - name: Run strict endpoint smoke (scheduled only)
        id: strict_smoke
        if: github.event_name == 'schedule'
        run: python scripts/integration_smoke.py --strict-endpoints --json

      - name: Validate AI status route contract tests
        id: contract_tests
        run: python scripts/ci_orchestrator.py --integration-contract-tests

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: api-health-smoke-${{ github.run_number }}-${{ github.run_attempt }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            data_out/integration_smoke/
            data_out/ci_orchestrator/status.json

      - name: Summary
        if: always()
        env:
          INTEGRATION_OUTCOME: ${{ steps.integration_smoke.outcome }}
          STRICT_OUTCOME: ${{ steps.strict_smoke.outcome }}
          CONTRACT_OUTCOME: ${{ steps.contract_tests.outcome }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Map a step outcome (success|failure|cancelled|skipped|"") to a
          # human-readable summary cell with an appropriate emoji.
          render_result() {
            case "${1:-}" in
              success)   echo "✅ passed" ;;
              failure)   echo "❌ failed" ;;
              cancelled) echo "⚠️ cancelled" ;;
              skipped)   echo "⏭️ skipped" ;;
              "")        echo "⏭️ not run" ;;
              *)         echo "ℹ️ ${1}" ;;
            esac
          }

          {
            echo "## API Health Smoke"
            echo ""
            echo "**Event:** \`${EVENT_NAME}\`"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| integration_smoke.py --json | $(render_result "${INTEGRATION_OUTCOME}") |"
            if [[ "${EVENT_NAME}" == "schedule" ]]; then
              echo "| integration_smoke.py --strict-endpoints --json | $(render_result "${STRICT_OUTCOME}") |"
            else
              echo "| integration_smoke.py --strict-endpoints --json | ⏭️ skipped (non-scheduled event) |"
            fi
            echo "| ci_orchestrator --integration-contract-tests | $(render_result "${CONTRACT_OUTCOME}") |"
          } >> "${GITHUB_STEP_SUMMARY}"
