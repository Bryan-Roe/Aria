name: API Health Smoke

on:
  pull_request:
    branches: [main, dev]
    paths: &api_health_paths
      - "function_app.py"
      - "host.json"
      - "shared/**"
      - "ai-projects/chat-cli/src/**"
      - "scripts/integration_smoke.py"
      - "scripts/ci_orchestrator.py"
      - ".github/actions/setup-python-env/**"
      - ".github/workflows/api-health-smoke.yml"
  push:
    branches: [main]
    paths: *api_health_paths
  schedule:
    - cron: "30 4 * * *" # Daily 04:30 UTC
  workflow_dispatch:

concurrency:
  group: api-health-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Principle of least privilege: this workflow only needs to read repo contents.
permissions:
  contents: read

env:
  # Opt into Node.js 24 for JS actions ahead of June 2026 forced migration.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.2
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  UPLOAD_ARTIFACT_SHA: 65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
  PYTHON_UNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHON_VERSION: "3.11"

defaults:
  run:
    shell: bash

jobs:
  smoke:
    name: API Smoke Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-requirements: 'false'
          extra-packages: 'pytest requests'

      - name: Run integration smoke checks
        id: integration_smoke
        run: |
          set -euo pipefail
          python scripts/integration_smoke.py \
            --output data_out/integration_smoke/status-standard.json \
            --json
          test -f data_out/integration_smoke/status-standard.json
          python -m json.tool data_out/integration_smoke/status-standard.json >/dev/null
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("data_out/integration_smoke/status-standard.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          assert isinstance(data, dict), "status-standard.json must be a JSON object"
          assert isinstance(data.get("passed"), bool), "status-standard.json missing boolean 'passed'"
          assert isinstance(data.get("results"), list), "status-standard.json missing list 'results'"
          PY

      - name: Run strict endpoint smoke (scheduled only)
        id: strict_smoke
        if: github.event_name == 'schedule'
        run: |
          set -euo pipefail
          python scripts/integration_smoke.py \
            --strict-endpoints \
            --output data_out/integration_smoke/status-strict.json \
            --json
          test -f data_out/integration_smoke/status-strict.json
          python -m json.tool data_out/integration_smoke/status-strict.json >/dev/null
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("data_out/integration_smoke/status-strict.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          assert isinstance(data, dict), "status-strict.json must be a JSON object"
          assert isinstance(data.get("passed"), bool), "status-strict.json missing boolean 'passed'"
          assert isinstance(data.get("results"), list), "status-strict.json missing list 'results'"
          PY

      - name: Validate AI status route contract tests
        id: contract_tests
        run: |
          set -euo pipefail
          python scripts/ci_orchestrator.py --integration-contract-tests
          test -f data_out/ci_orchestrator/status.json
          python -m json.tool data_out/ci_orchestrator/status.json >/dev/null
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("data_out/ci_orchestrator/status.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          assert isinstance(data, dict), "status.json must be a JSON object"
          for key in ("total_jobs", "succeeded", "failed"):
              assert key in data, f"status.json missing required key: {key}"
          PY

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: api-health-smoke-${{ github.run_number }}-${{ github.run_attempt }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            data_out/integration_smoke/
            data_out/ci_orchestrator/status.json

      - name: Summary
        if: always()
        run: |
          set -euo pipefail
          echo "## API Health Smoke" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          # integration_smoke
          if [ "${{ steps.integration_smoke.outcome }}" = "success" ]; then
            echo "| integration_smoke.py --json | ✅ passed |" >> "$GITHUB_STEP_SUMMARY"
            echo "| integration_smoke output | \`data_out/integration_smoke/status-standard.json\` |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| integration_smoke.py --json | ❌ failed |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # strict_smoke (scheduled only)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ steps.strict_smoke.outcome }}" = "success" ]; then
              echo "| integration_smoke.py --strict-endpoints | ✅ passed |" >> "$GITHUB_STEP_SUMMARY"
              echo "| strict smoke output | \`data_out/integration_smoke/status-strict.json\` |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| integration_smoke.py --strict-endpoints | ❌ failed |" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "| integration_smoke.py --strict-endpoints | ⊘ skipped (non-scheduled) |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # contract_tests
          if [ "${{ steps.contract_tests.outcome }}" = "success" ]; then
            echo "| ci_orchestrator --integration-contract-tests | ✅ passed |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| ci_orchestrator --integration-contract-tests | ❌ failed |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Evaluate overall status and fail if any required test failed
          if [ "${{ steps.integration_smoke.outcome }}" != "success" ] || \
             ( [ "${{ github.event_name }}" = "schedule" ] && [ "${{ steps.strict_smoke.outcome }}" != "success" ] ) || \
             [ "${{ steps.contract_tests.outcome }}" != "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### ❌ One or more API health checks failed." >> "$GITHUB_STEP_SUMMARY"
            echo "::error::API health checks failed. See artifacts and logs above."
            exit 1
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### ✅ All API health checks passed." >> "$GITHUB_STEP_SUMMARY"
