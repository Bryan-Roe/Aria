name: Broken Links Check

# Trigger on PRs and pushes to markdown/docs files
on:
  pull_request:
    branches: [main, dev]
    paths:
      - "**/*.md"
      - "docs/**"
      - ".github/workflows/broken-links.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "docs/**"
      - ".github/workflows/broken-links.yml"
  # Allow manual trigger
  workflow_dispatch:
  # (Optional) Enable periodic checking as reminder/audit
  # schedule:
  #   - cron: "0 7 * * 1"  # Every Monday at 07:00 UTC

concurrency:
  group: "broken-links-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  link-check:
    name: "Link Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Run Lychee link checker"
        id: lychee
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          fail: true
          args: >-
            --verbose
            --no-progress
            --max-concurrency 8
            --accept 200,204,206,301,302,307,308,401,403,429
            "**/*.md"
            "docs/**/*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # continue-on-error: true  # Uncomment to make workflow pass but report errors

      - name: "Summary"
        if: always()
        run: |
          echo "## 🔗 Broken Links Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scanned markdown and docs links with [Lychee](https://github.com/lycheeverse/lychee-action)." >> $GITHUB_STEP_SUMMARY
          # Output summary; lychee-action auto uploads as artifact if any broken links are found

      - name: "Show Failures"
        if: failure()
        run: |
          echo "❌ One or more broken links detected!"
          exit 1
