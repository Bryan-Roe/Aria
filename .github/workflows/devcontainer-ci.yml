name: Devcontainer CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  DEVCONTAINERS_CI_SHA: b63b30de439b47a52267f241112c5b453b673db5 # v0.3

concurrency:
  group: devcontainer-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Build and test devcontainer
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5
        with:
          runCmd: python -m pytest tests -q --maxfail=1
