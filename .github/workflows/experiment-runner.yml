name: Aria Experiment Runner
# Runs a lightweight, reproducible experiment/evaluation cycle and uploads metrics as an artifact.
# Improvements:
# - safer action pinning to stable major tags (v4)
# - concurrency to avoid overlapping runs
# - workflow_dispatch inputs for configurable behavior
# - clearer, reproducible evaluation script using Node heredoc
# - outputs exported via GITHUB_OUTPUT (modern way)
# - metrics written to JSON and uploaded as artifact
# - minimal permissions principle
on:
  workflow_run:
    workflows: ["Aria Autonomous Evolver"]
    types: ["completed"]
  workflow_dispatch:
    inputs:
      fail_on_low:
        description: 'If true, the job will fail when score < threshold'
        required: false
        default: 'false'
      threshold:
        description: 'Score threshold (0-100) that marks a variant as low-performing'
        required: false
        default: '50'

jobs:
  run-experiments:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    # prevent overlapping runs for the same workflow
    concurrency:
      group: aria-experiment-runner-${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || github.run_id }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20.x'

      - name: Execute experiment evaluation
        id: evaluate
        env:
          THRESHOLD: ${{ inputs.threshold || '50' }}
          FAIL_ON_LOW: ${{ inputs.fail_on_low || 'false' }}
          METRICS_FILE: experiment-metrics.json
        run: |
          set -euo pipefail
          # Use a Node heredoc for readability and maintainability.
          # Outputs are written to $GITHUB_OUTPUT for downstream steps to consume.
          node <<'NODE'
          'use strict';
          const fs = require('fs');
          const crypto = require('crypto');

          // Cryptographically strong random float in [0, 1)
          function rand() {
            const buf = crypto.randomBytes(6); // 48 bits of randomness
            const int = buf.readUIntBE(0, 6);
            return int / 0x1000000000000; // 2^48
          }

          // Generate metrics with 2 decimal places
          const metrics = {
            performance: +(rand() * 100).toFixed(2),
            stability: +(rand() * 100).toFixed(2),
            efficiency: +(rand() * 100).toFixed(2),
            note: 'Synthetic evaluation for CI experiments',
            timestamp: new Date().toISOString()
          };

          const score = +((metrics.performance + metrics.stability + metrics.efficiency) / 3).toFixed(2);
          const result = { metrics, score };

          // Persist metrics to file for artifact upload
          const metricsFile = process.env.METRICS_FILE || 'experiment-metrics.json';
          fs.writeFileSync(metricsFile, JSON.stringify(result, null, 2), { encoding: 'utf8' });

          console.log('Experiment evaluation result:', JSON.stringify(result, null, 2));

          // Export outputs via GITHUB_OUTPUT (modern recommended approach)
          // score as plain value, metrics as base64-encoded JSON to keep the YAML/line-safety
          const scoreOut = `score=${score}\n`;
          const metricsOut = `metrics=${Buffer.from(JSON.stringify(metrics)).toString('base64')}\n`;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, scoreOut + metricsOut);

          // Decide pass/fail based on threshold + optional fail_on_low
          const threshold = Number(process.env.THRESHOLD || 50);
          if (score < threshold) {
            console.warn(`Low performance variant detected (score ${score} < threshold ${threshold})`);
            if ((process.env.FAIL_ON_LOW || 'false').toLowerCase() === 'true') {
              console.error('Failing job because fail_on_low=true and score < threshold');
              process.exit(2);
            }
          } else {
            console.log(`Variant acceptable (score ${score} >= threshold ${threshold})`);
          }
          NODE

      - name: Upload metrics artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: experiment-metrics
          path: experiment-metrics.json

      - name: Summary (logs outputs)
        run: |
          set -euo pipefail
          echo "Experiment score: ${{ steps.evaluate.outputs.score }}"
          echo "Metrics (decoded):"
          echo "${{ steps.evaluate.outputs.metrics }}" | base64 --decode || echo "Failed to decode metrics"
