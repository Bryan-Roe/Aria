name: AGI smoke tests

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: agi-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  agi-smoke:
    name: AGI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install pytest

      - name: Run AGI smoke tests
        run: |
          set -euo pipefail
          pytest \
            tests/test_agi_smoke.py \
            tests/test_local_agi_sse_integration.py \
            tests/test_agi_persistence_endpoint.py \
            tests/test_agi_persistence_auth.py \
            tests/test_agi_prune.py \
            -q --maxfail=1
