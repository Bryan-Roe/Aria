name: AGI smoke tests

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  agi-smoke:
    name: AGI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install pytest

      - name: Run AGI smoke tests
        run: |
          pytest tests/test_agi_smoke.py tests/test_local_agi_sse_integration.py -q --maxfail=1
