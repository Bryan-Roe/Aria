name: Workflow Lint

on:
    pull_request:
        paths:
            - ".github/workflows/**"
            - ".github/actions/**"
    push:
        branches: [main]
        paths:
            - ".github/workflows/**"
            - ".github/actions/**"
    workflow_dispatch:

concurrency:
    group: actionlint-${{ github.ref }}
    cancel-in-progress: true

permissions:
    checks: write

jobs:
    actionlint:
        name: actionlint
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup ShellCheck
              run: sudo apt-get update && sudo apt-get install -y shellcheck

            - name: Run actionlint
              uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d  # v1.72.0
              with:
                  fail_level: failure
                  reporter: github-check
