# =============================================================================
# QAI CI Pipeline - Main continuous integration workflow
# =============================================================================
# Purpose: Validates code quality, runs tests, and performs daily training
# Triggers: Daily scheduled runs and manual dispatch
# Jobs:
#   - validate: Code validation, unit & integration tests
#   - train: Daily scheduled training workflow (requires validate pass)
#   - deploy: Model deployment after successful training
# =============================================================================

name: QAI CI Pipeline

on:
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM UTC
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read
  checks: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.2
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  ACTIONS_CACHE_SHA: 1bd1e32a3bdc45362d1e726936510720a7c30a57   # v4.2.0
  SETUP_PYTHON_SHA: a26af69be951a213d495a4c3e4e4022e16d87065    # v5.6.0
  UPLOAD_ARTIFACT_SHA: 65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
  PYTHON_UNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate (lint, tests, integration smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache pip
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pip-wheel
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', 'pyproject.toml') }}

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          extra-packages: 'pytest pytest-timeout pytest-cov'

      - name: Run CI validation
        run: |
          set -euo pipefail
          python scripts/ci_orchestrator.py --validate-all

      - name: Run integration smoke checks
        run: |
          set -euo pipefail
          python scripts/integration_smoke.py

      - name: Run integration contract unit tests
        run: |
          set -euo pipefail
          python scripts/ci_orchestrator.py --integration-contract-tests

      - name: Run unit tests
        run: |
          set -euo pipefail
          python scripts/test_runner.py --unit --coverage

      - name: Run integration tests
        run: |
          set -euo pipefail
          python scripts/test_runner.py --integration

      - name: Generate summary
        if: always()
        run: |
          set -euo pipefail
          echo "## CI Validation Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f data_out/ci_orchestrator/status.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat data_out/ci_orchestrator/status.json >> "$GITHUB_STEP_SUMMARY"
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ No ci_orchestrator status file found" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ job.status }}" != "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### ❌ Validation failed — see logs above for details." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: validation-results
          path: |
            data_out/ci_orchestrator/
            data_out/integration_smoke/
            data_out/test_runner/
          retention-days: 14

  train:
    name: Train (scheduled)
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 90
    if: github.event_name == 'schedule'

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: false

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache pip
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pip-wheel
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', 'pyproject.toml') }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install training dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then python -m pip install -r requirements.txt; fi

      - name: Run training workflow
        run: |
          set -euo pipefail
          python scripts/master_orchestrator.py --workflow daily_full_pipeline

      - name: Generate training summary
        if: always()
        run: |
          set -euo pipefail
          echo "## Training Results" >> "$GITHUB_STEP_SUMMARY"
          if [ -f data_out/master_orchestrator/status.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat data_out/master_orchestrator/status.json >> "$GITHUB_STEP_SUMMARY"
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ No master_orchestrator status file found" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ job.status }}" != "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### ❌ Training job failed — see logs above." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload training results
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: training-results
          path: data_out/
          retention-days: 30

  deploy:
    name: Deploy (scheduled)
    runs-on: ubuntu-latest
    needs: train
    timeout-minutes: 30
    if: github.event_name == 'schedule'

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache pip
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pip-wheel
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', 'pyproject.toml') }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install deploy dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then python -m pip install -r requirements.txt; fi

      - name: Deploy best model
        run: |
          set -euo pipefail
          python scripts/model_deployer.py --deploy best --strategy canary

      - name: Upload deployment manifest
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: deployment-manifest
          path: deployed_models/model_registry.json
          retention-days: 90
