name: QAI CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r dev-requirements.txt
        pip install pytest-cov
    
    - name: Run pytest unit tests
      run: |
        python -m pytest tests/ -m "not slow and not azure" -v --tb=short --junitxml=test-results.xml
    
    - name: Run CI validation
      run: |
        python scripts/ci_orchestrator.py --validate-all
      continue-on-error: true
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: validation-results
        path: |
          test-results.xml
          data_out/ci_orchestrator/

  train:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'schedule'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run training workflow (dry-run)
      run: |
        python scripts/training/autotrain.py --dry-run
    
    - name: Upload training results
      uses: actions/upload-artifact@v4
      with:
        name: training-results
        path: data_out/autotrain/
