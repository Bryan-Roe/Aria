# =============================================================================
# QAI CI Pipeline - Main continuous integration workflow
# =============================================================================
# Purpose: Validates code quality, runs tests, and performs daily training
# Triggers: Push/PR to main/dev branches, daily scheduled runs
# Jobs:
#   - validate: Code validation, unit & integration tests
#   - train: Daily scheduled training workflow (requires validate pass)
#   - deploy: Model deployment after successful training
# =============================================================================

name: QAI CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

permissions:
  contents: read
  actions: read
  checks: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate (lint, tests, integration smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pip-wheel
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', 'pyproject.toml') }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install test & lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt || true
          # Install dev/test tools separately to avoid strict dependency conflicts
          python -m pip install pytest pytest-timeout pytest-cov ruff black mypy

      - name: Lint (ruff)
        run: |
          ruff check shared/ scripts/ apps/aria/server.py tests/ --output-format=github

      - name: Format check (black)
        run: |
          black --check --quiet shared/ scripts/ apps/aria/server.py tests/

      - name: Type check (mypy)
        run: |
          mypy shared/ --ignore-missing-imports --no-error-summary

      - name: Run CI validation (orchestrator)
        run: |
          python scripts/ci_orchestrator.py --validate-all

      - name: Integration smoke checks
        run: |
          python scripts/integration_smoke.py

      - name: Integration contract tests
        run: |
          python scripts/ci_orchestrator.py --integration-contract-tests

      - name: Unit tests (pytest)
        run: |
          python -m pytest tests/ --maxfail=1 -q --disable-warnings --cov=.

      - name: Integration tests
        run: |
          python scripts/test_runner.py --integration

      - name: Generate summary
        if: always()
        run: |
          {
            echo "## CI Validation Results"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f data_out/ci_orchestrator/status.json ]; then
            {
              echo '```json'
              cat data_out/ci_orchestrator/status.json
              echo ''
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: |
            data_out/ci_orchestrator/
            data_out/integration_smoke/
            data_out/test_runner/
          retention-days: 14

  train:
    name: Train (scheduled)
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 90
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pip-wheel
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', 'pyproject.toml') }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install training dependencies
        run: |
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then python -m pip install -r requirements.txt; fi

      - name: Run training workflow
        run: python scripts/master_orchestrator.py --workflow daily_full_pipeline

      - name: Generate training summary
        if: always()
        run: |
          {
            echo "## Training Results"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f data_out/master_orchestrator/status.json ]; then
            {
              echo '```json'
              cat data_out/master_orchestrator/status.json
              echo ''
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload training results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-results
          path: data_out/
          retention-days: 30

  deploy:
    name: Deploy (scheduled)
    runs-on: ubuntu-latest
    needs: train
    timeout-minutes: 30
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pip-wheel
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', 'pyproject.toml') }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install deploy dependencies
        run: |
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then python -m pip install -r requirements.txt; fi

      - name: Deploy best model
        run: python scripts/model_deployer.py --deploy best --strategy canary

      - name: Upload deployment manifest
        uses: actions/upload-artifact@v4
        with:
          name: deployment-manifest
          path: deployed_models/model_registry.json
          retention-days: 90
