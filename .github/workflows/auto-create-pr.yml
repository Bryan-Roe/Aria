name: Auto-create PRs for feature branches

on:
  push:
    branches:
      - 'agi/**'
      - 'auto-pr/**'
      - 'feature/**'
      - 'pr/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-create-pr-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt into Node.js 24 for JS actions ahead of June 2026 forced migration.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.2
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  GITHUB_SCRIPT_SHA: 60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1

defaults:
  run:
    shell: bash

jobs:
  create_pr:
    name: Create pull request
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Create PR if none exists
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.ref;
            
            // Validate branch reference
            if (!ref || !ref.startsWith('refs/heads/')) {
              core.info('Not a branch ref; skipping.');
              return;
            }
            
            const head = ref.replace('refs/heads/', '');
            const base = 'main';
            
            // Prevent self-merging
            if (head === base) {
              core.info('Branch equals base; skipping.');
              return;
            }
            
            // Validate branch name format
            const validPrefixes = ['agi/', 'auto-pr/', 'feature/', 'pr/'];
            if (!validPrefixes.some(prefix => head.startsWith(prefix))) {
              core.info(`Branch '${head}' does not match auto-PR prefixes; skipping.`);
              return;
            }
            
            core.info(`Checking existing PRs for branch: ${head}`);
            try {
              const { data: existing } = await github.rest.pulls.list({ 
                owner, 
                repo, 
                head: `${owner}:${head}`, 
                state: 'open' 
              });
              if (existing && existing.length > 0) {
                core.info('PR already exists for this branch; skipping creation.');
                return;
              }
            } catch (listErr) {
              core.warning(`Failed to list existing PRs: ${listErr.message}`);
              throw listErr;
            }
            
            const title = `[Auto PR] ${head}`;
            const body = `Automated pull request for branch **${head}** → **${base}**.\n\nSummary: AGI persistence audit + CI updates.\n\nThis PR was created by the repository automation workflow (.github/workflows/auto-create-pr.yml).`;

            // Create the PR as a draft
            let pr;
            try {
              pr = await github.rest.pulls.create({ 
                owner, 
                repo, 
                head, 
                base, 
                title, 
                body, 
                draft: true 
              });
              core.info(`Created PR: ${pr.data.html_url}`);
            } catch (createErr) {
              core.error(`Failed to create PR: ${createErr.message}`);
              throw createErr;
            }

            // Add labels and assignee if possible (best-effort)
            try {
              await github.rest.issues.addLabels({ 
                owner, 
                repo, 
                issue_number: pr.data.number, 
                labels: ['ci', 'automation'] 
              });
              core.info('Added labels: ci, automation');
            } catch (labErr) {
              core.warning(`Adding labels failed: ${labErr.message}`);
            }

            try {
              // Assign to repository owner if permitted
              await github.rest.issues.addAssignees({ 
                owner, 
                repo, 
                issue_number: pr.data.number, 
                assignees: [owner] 
              });
              core.info(`Assigned PR to: ${owner}`);
            } catch (assignErr) {
              core.warning(`Assigning PR failed: ${assignErr.message}`);
            }
