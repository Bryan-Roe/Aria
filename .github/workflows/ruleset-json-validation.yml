---
# =============================================================================
# Ruleset JSON Validation
# =============================================================================
# Purpose: Validate repository ruleset JSON templates and catch schema drift.
# Triggers: PR/push touching ruleset templates/docs, weekly schedule, manual run.
# =============================================================================

name: Ruleset JSON Validation

on:
  pull_request:
    branches: [main, dev]
    paths:
      - '.github/workflows/ruleset-json-validation.yml'
      - '.github/rulesets/*.json'
      - '.github/DEFAULT_GITHUB_RULESET_CHECKLIST.md'
      - '.github/DEFAULT_GITHUB_AUTOMATION.md'
  push:
    branches: [main]
    paths:
      - '.github/workflows/ruleset-json-validation.yml'
      - '.github/rulesets/*.json'
      - '.github/DEFAULT_GITHUB_RULESET_CHECKLIST.md'
      - '.github/DEFAULT_GITHUB_AUTOMATION.md'
  schedule:
    - cron: '37 5 * * 1'  # Mondays at 05:37 UTC
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ruleset-json-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2

jobs:
  validate-rulesets:
    name: Validate ruleset JSON templates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          install-requirements: 'false'

      - name: Validate ruleset JSON schema essentials
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          required_top_level = {
              'name',
              'target',
              'enforcement',
              'conditions',
              'rules',
              'bypass_actors',
          }

          allowed_targets = {'branch', 'tag', 'push'}
          allowed_enforcement = {'active', 'disabled', 'evaluate'}

          ruleset_files = sorted(Path('.github/rulesets').glob('*.json'))
          if not ruleset_files:
              raise SystemExit('No ruleset JSON files found under .github/rulesets/*.json')

          def fail(msg: str) -> None:
              raise SystemExit(msg)

          for file in ruleset_files:
              with file.open('r', encoding='utf-8') as fh:
                  data = json.load(fh)

              missing = sorted(required_top_level - set(data.keys()))
              if missing:
                  fail(f'{file}: missing top-level keys: {missing}')

              target = data['target']
              if target not in allowed_targets:
                  fail(f'{file}: invalid target={target!r}; expected one of {sorted(allowed_targets)}')

              enforcement = data['enforcement']
              if enforcement not in allowed_enforcement:
                  fail(f'{file}: invalid enforcement={enforcement!r}; expected one of {sorted(allowed_enforcement)}')

              rules = data['rules']
              if not isinstance(rules, list) or not rules:
                  fail(f'{file}: rules must be a non-empty list')

              rule_types = []
              for idx, rule in enumerate(rules):
                  if not isinstance(rule, dict):
                      fail(f'{file}: rules[{idx}] must be an object')
                  rtype = rule.get('type')
                  if not isinstance(rtype, str) or not rtype:
                      fail(f'{file}: rules[{idx}].type must be a non-empty string')
                  rule_types.append(rtype)

              if 'required_status_checks' in rule_types:
                  rsc = next(r for r in rules if r.get('type') == 'required_status_checks')
                  params = rsc.get('parameters', {})
                  checks = params.get('required_status_checks', [])
                  if not isinstance(checks, list) or not checks:
                      fail(f'{file}: required_status_checks rule must define parameters.required_status_checks[]')
                  contexts = {
                      c.get('context')
                      for c in checks
                      if isinstance(c, dict)
                  }
                  if 'Merge Gate / All Gates Passed' not in contexts:
                      fail(
                          f'{file}: required_status_checks must include '
                          '"Merge Gate / All Gates Passed" context'
                      )

              print(f'JSON schema essentials OK: {file}')
          PY

      - name: Verify ruleset checklist references template path
        run: |
          set -euo pipefail
          grep -q ".github/rulesets/main-default-automation.ruleset.json" .github/DEFAULT_GITHUB_RULESET_CHECKLIST.md
          echo "Checklist references ruleset JSON template path."
