name: PR Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      watcher_timeout_minutes:
        description: 'Timeout minutes for watcher job (overrides default)'
        required: false
        default: '10'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; elif [ -f pyproject.toml ]; then python -m pip install -e .[dev]; else pip install pytest; fi

      - name: Run pre-commit
        run: |
          if command -v pre-commit >/dev/null 2>&1; then pre-commit run --all-files || true; fi

      - name: Run tests
        uses: ./.github/actions/run-pytest-suite
        with:
          test-path: tests
          extra-args: --maxfail=1 -q
        env:
          CI: true
  watcher:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event.inputs.watcher_timeout_minutes || 10 }}
    container:
      image: mcr.microsoft.com/devcontainers/python:1-3.11
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dev dependencies (in container)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install pytest watchdog; fi

      - name: Run test watcher (runs tests once then exits via timeout)
        run: |
          timeout "${{ github.event.inputs.watcher_timeout_minutes || '10' }}m" \
            python3 scripts/test_watcher.py --cmd "pytest tests -q --maxfail=1"
        env:
          CI: true
