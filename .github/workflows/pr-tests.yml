name: PR Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      watcher_timeout_minutes:
        description: Timeout minutes for watcher job (overrides default)
        required: false
        default: '10'
        type: string
      run_watcher:
        description: Run the watcher job (typically only for scheduled/manual runs)
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  # Cancel superseded runs for the same PR/branch. Use ref_name as a stable
  # fallback for push/schedule events where pull_request.number is absent.
  group: pr-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 for JS actions ahead of June 2026 forced migration
  PYTHON_VERSION: '3.11'
  TEST_PATH: tests
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  PIP_NO_PYTHON_VERSION_WARNING: '1'
  PYTHONDONTWRITEBYTECODE: '1'
  PYTHONUNBUFFERED: '1'
  # Default watcher timeout (minutes); overridable via workflow_dispatch input.
  DEFAULT_WATCHER_TIMEOUT_MINUTES: '10'

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # Need history so pre-commit can diff against the PR base ref.
          # PRs use merge commits; depth 2 is enough for pull_request, but
          # for push events we may need more — use 0 for correctness.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt
            pyproject.toml
            setup.cfg

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt
          fi
          if [[ -f requirements-dev.txt ]]; then
            python -m pip install -r requirements-dev.txt
          elif [[ -f pyproject.toml ]]; then
            python -m pip install -e ".[dev]"
          else
            python -m pip install pytest
          fi

      - name: Install dependencies (lmstudio-provider)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f extensions/lmstudio-provider/package.json ]]; then
            npm ci --prefix ./extensions/lmstudio-provider
          else
            echo "::notice::No package.json at extensions/lmstudio-provider; skipping npm ci"
          fi

      - name: Cache pre-commit hooks
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809  # v4.2.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Run pre-commit
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v pre-commit >/dev/null 2>&1; then
            echo "::notice::pre-commit not installed; skipping"
            exit 0
          fi
          pre-commit run --all-files --show-diff-on-failure --color=always

      - name: Run tests
        uses: ./.github/actions/run-pytest-suite
        with:
          test-path: ${{ env.TEST_PATH }}
          extra-args: --maxfail=1 -q
        env:
          CI: 'true'

  watcher:
    name: Test watcher (scheduled)
    needs: test
    # Run on schedule and main-branch push automatically; for manual dispatch
    # require the user to explicitly opt in via the `run_watcher` input.
    # `inputs.*` is only populated for workflow_dispatch, so guard accordingly.
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_watcher == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.watcher_timeout_minutes || '10') }}
    container:
      image: mcr.microsoft.com/devcontainers/python:1-3.11
    env:
      WATCHER_TIMEOUT_MINUTES: ${{ github.event.inputs.watcher_timeout_minutes || '10' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Install dev dependencies (in container)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt
          fi
          if [[ -f requirements-dev.txt ]]; then
            python -m pip install -r requirements-dev.txt
          else
            python -m pip install pytest watchdog
          fi

      - name: Run test watcher (runs tests once then exits via timeout)
        shell: bash
        run: |
          set -euo pipefail
          # `timeout` returns 124 on expiry; treat that as success since the
          # watcher is designed to be terminated by the timeout.
          set +e
          timeout "${WATCHER_TIMEOUT_MINUTES}m" \
            python3 scripts/test_watcher.py --cmd "pytest tests -q --maxfail=1"
          rc=$?
          set -e
          if [[ "${rc}" -eq 0 || "${rc}" -eq 124 ]]; then
            exit 0
          fi
          exit "${rc}"
        env:
          CI: 'true'
