name: PR Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      watcher_timeout_minutes:
        description: Timeout minutes for watcher job (overrides default)
        required: false
        default: '10'
      run_watcher:
        description: Run the watcher job (typically only for scheduled/manual runs)
        required: false
        default: 'false'

concurrency:
  group: pr-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 for JS actions ahead of June 2026 forced migration
  PYTHON_VERSION: '3.11'
  TEST_PATH: tests

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt
            pyproject.toml
            setup.cfg

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [[ -f requirements-dev.txt ]]; then
            python -m pip install -r requirements-dev.txt
          elif [[ -f pyproject.toml ]]; then
            python -m pip install -e ".[dev]"
          else
            python -m pip install pytest
          fi

      - name: Run pre-commit (changed files only)
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v pre-commit >/dev/null 2>&1; then
            echo "pre-commit not installed; skipping"
            exit 0
          fi
          # Run only on files changed in this PR/push to avoid blocking CI on
          # pre-existing lint violations in the repository. Once `ruff check .`
          # reports zero violations this guard can be replaced with
          # `pre-commit run --all-files`.
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          if [[ -n "${BASE_SHA}" ]] && git cat-file -e "${BASE_SHA}" 2>/dev/null; then
            pre-commit run --from-ref "${BASE_SHA}" --to-ref "${HEAD_SHA}"
          else
            echo "Base ref not available locally; skipping pre-commit to avoid blocking on existing violations."
          fi

      - name: Run tests
        uses: ./.github/actions/run-pytest-suite
        with:
          test-path: ${{ env.TEST_PATH }}
          extra-args: --maxfail=1 -q
        env:
          CI: true

  watcher:
    needs: test
    if: >-
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      ) && (github.event.inputs.run_watcher || 'false') == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.watcher_timeout_minutes || '10') }}
    container:
      image: mcr.microsoft.com/devcontainers/python:1-3.11
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install dev dependencies (in container)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install pytest watchdog; fi

      - name: Run test watcher (runs tests once then exits via timeout)
        run: |
          timeout "${{ github.event.inputs.watcher_timeout_minutes || '10' }}m" \
            python3 scripts/test_watcher.py --cmd "pytest tests -q --maxfail=1"
        env:
          CI: true
