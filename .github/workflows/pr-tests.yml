name: PR Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      watcher_timeout_minutes:
        description: Timeout minutes for watcher job (overrides default)
        required: false
        default: '10'
      run_watcher:
        description: Run the watcher job (typically only for scheduled/manual runs)
        required: false
        default: 'false'

concurrency:
  group: pr-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'
  TEST_PATH: tests

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt
            pyproject.toml
            setup.cfg

      - name: Install dev dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [[ -f requirements-dev.txt ]]; then
            python -m pip install -r requirements-dev.txt
          elif [[ -f pyproject.toml ]]; then
            python -m pip install -e ".[dev]"
          else
            python -m pip install pytest
          fi

      - name: Run pre-commit
        shell: bash
        run: |
          set -euo pipefail
          if command -v pre-commit >/dev/null 2>&1; then
            pre-commit run --all-files
          else
            echo "pre-commit not installed; skipping"
          fi

      - name: Run tests
        uses: ./.github/actions/run-pytest-suite
        with:
          test-path: ${{ env.TEST_PATH }}
          extra-args: --maxfail=1 -q
        env:
          CI: 'true'

  watcher:
    name: Test watcher
    needs: test
    if: >-
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      ) && (github.event.inputs.run_watcher || 'false') == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.watcher_timeout_minutes || '10') }}
    container:
      image: mcr.microsoft.com/devcontainers/python:1-3.11
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dev dependencies (in container)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [[ -f requirements-dev.txt ]]; then
            python -m pip install -r requirements-dev.txt
          else
            python -m pip install pytest watchdog
          fi

      - name: Run test watcher (runs tests once then exits via timeout)
        shell: bash
        run: |
          set -euo pipefail
          timeout "${{ github.event.inputs.watcher_timeout_minutes || '10' }}m" \
            python3 scripts/test_watcher.py --cmd "pytest ${{ env.TEST_PATH }} -q --maxfail=1"
        env:
          CI: 'true'
