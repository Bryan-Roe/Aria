name: Workflow Validation

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_dispatch:

jobs:
  validate-workflows:
    name: Validate Workflow Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          install-requirements: 'false'
          extra-packages: 'pyyaml jsonschema'

      - name: Validate YAML syntax
        run: |
          python -c "
          import yaml
          import sys
          from pathlib import Path

          failed = []
          workflows_dir = Path('.github/workflows')

          print('Validating workflow files...')
          for yml_file in workflows_dir.glob('*.yml'):
              try:
                  with open(yml_file) as f:
                      content = yaml.safe_load(f)
                  print(f'✓ {yml_file.name}')

                  # Basic structure validation
                  if 'name' not in content:
                      print(f'  ⚠️  Warning: Missing name field')
                  if 'on' not in content:
                      print(f'  ⚠️  Warning: Missing on field')
                  if 'jobs' not in content:
                      print(f'  ⚠️  Warning: Missing jobs field')

              except Exception as e:
                  print(f'✗ {yml_file.name}: {e}')
                  failed.append(str(yml_file))

          if failed:
              print(f'\n❌ {len(failed)} workflow(s) failed validation')
              sys.exit(1)
          else:
              print(f'\n✅ All workflows validated successfully')
          "

      - name: Check for common issues
        run: |
          echo "Checking for common workflow issues..."

          # Check for deprecated actions
          if grep -r "actions/checkout@v[12]" .github/workflows/; then
            echo "⚠️  Warning: Found deprecated checkout action versions (v1/v2). Consider upgrading to v4."
          fi

          if grep -r "actions/setup-python@v[123]" .github/workflows/; then
            echo "⚠️  Warning: Found old setup-python action versions. Consider upgrading to v5."
          fi

          # Check for hardcoded secrets
          if grep -r "ghp_\|github_pat_" .github/workflows/ 2>/dev/null; then
            echo "❌ ERROR: Found hardcoded GitHub tokens!"
            exit 1
          fi

          echo "✅ Common issues check completed"

      - name: Validate action references
        run: |
          echo "Validating action references..."

          # Extract all uses: lines and check format
          grep -r "uses:" .github/workflows/ | while read -r line; do
            action=$(echo "$line" | sed -n "s/.*uses: *\([^ ]*\).*/\1/p")
            if [ -n "$action" ]; then
              # Check if action reference has version
              if [[ "$action" != *"@"* ]] && [[ "$action" != "./"* ]]; then
                echo "⚠️  Warning: Action without version: $action"
              fi
            fi
          done || true

          echo "✅ Action reference validation completed"

  test-workflows:
    name: Test Workflow Execution
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: validate-workflows
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test workflow can be triggered
        run: |
          echo "Workflow validation and test completed successfully"
          echo "All workflows are syntactically correct and ready to use"
