---
# =============================================================================
# Default GitHub Automation Baseline
# =============================================================================
# Purpose: Keep the repository's default GitHub automation stack healthy.
# Verifies required automation files exist and are valid YAML.
#
# Baseline components:
#   1) CI + PR gate: .github/workflows/merge-gate.yml
#   2) Auto-labeler:  .github/workflows/labeler.yml + .github/labeler.yml
#   3) Stale bot:      .github/workflows/stale.yml
#   4) Dependabot:     .github/dependabot.yml
#   5) Security gate:  .github/workflows/dependency-review.yml
#   6) Ruleset validator: .github/workflows/ruleset-json-validation.yml
# =============================================================================

name: Default GitHub Automation Baseline

on:
  pull_request:
    branches: [main, dev]
    paths:
      - '.github/workflows/default-github-automation.yml'
      - '.github/workflows/merge-gate.yml'
      - '.github/workflows/labeler.yml'
      - '.github/workflows/stale.yml'
      - '.github/workflows/dependency-review.yml'
      - '.github/workflows/ruleset-json-validation.yml'
      - '.github/labeler.yml'
      - '.github/dependabot.yml'
      - '.github/DEFAULT_GITHUB_AUTOMATION.md'
      - '.github/DEFAULT_GITHUB_RULESET_CHECKLIST.md'
      - '.github/rulesets/*.json'
  push:
    branches: [main]
    paths:
      - '.github/workflows/default-github-automation.yml'
      - '.github/workflows/merge-gate.yml'
      - '.github/workflows/labeler.yml'
      - '.github/workflows/stale.yml'
      - '.github/workflows/dependency-review.yml'
      - '.github/workflows/ruleset-json-validation.yml'
      - '.github/labeler.yml'
      - '.github/dependabot.yml'
      - '.github/DEFAULT_GITHUB_AUTOMATION.md'
      - '.github/DEFAULT_GITHUB_RULESET_CHECKLIST.md'
      - '.github/rulesets/*.json'
  schedule:
    - cron: '21 5 * * 1'  # Mondays at 05:21 UTC
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: default-gh-automation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  SETUP_PYTHON_SHA: a26af69be951a213d495a4c3e4e4022e16d87065    # v5.6.0

jobs:
  baseline:
    name: Verify default automation baseline
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Verify required automation files exist
        run: |
          set -euo pipefail

          required_files=(
            ".github/workflows/merge-gate.yml"
            ".github/workflows/labeler.yml"
            ".github/workflows/stale.yml"
            ".github/workflows/dependency-review.yml"
            ".github/workflows/ruleset-json-validation.yml"
            ".github/labeler.yml"
            ".github/dependabot.yml"
            ".github/DEFAULT_GITHUB_AUTOMATION.md"
            ".github/DEFAULT_GITHUB_RULESET_CHECKLIST.md"
            ".github/rulesets/main-default-automation.ruleset.json"
          )

          missing=0
          {
            echo "## Default GitHub Automation Baseline"
            echo
            echo "| File | Status |"
            echo "|------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

          for file in "${required_files[@]}"; do
            if [[ -f "$file" ]]; then
              echo "✅ Found: $file"
              printf '| <code>%s</code> | ✅ present |\n' "$file" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "❌ Missing: $file"
              printf '| <code>%s</code> | ❌ missing |\n' "$file" >> "$GITHUB_STEP_SUMMARY"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "::error::One or more required baseline files are missing."
            exit 1
          fi

      - name: Validate YAML syntax for baseline files
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import yaml

          yaml_files = [
              Path('.github/workflows/merge-gate.yml'),
              Path('.github/workflows/labeler.yml'),
              Path('.github/workflows/stale.yml'),
              Path('.github/workflows/dependency-review.yml'),
              Path('.github/workflows/ruleset-json-validation.yml'),
              Path('.github/workflows/default-github-automation.yml'),
              Path('.github/labeler.yml'),
              Path('.github/dependabot.yml'),
          ]

          for f in yaml_files:
              if not f.exists():
                  raise SystemExit(f"Missing expected YAML file: {f}")
              with f.open('r', encoding='utf-8') as fh:
                  yaml.safe_load(fh)
              print(f"YAML OK: {f}")
          PY

      - name: Verify documentation mentions required branch-protection check
        run: |
          set -euo pipefail
          if grep -q "Merge Gate / All Gates Passed" .github/DEFAULT_GITHUB_AUTOMATION.md; then
            echo "✅ Branch protection check guidance is documented."
          else
            echo "::error::Expected 'Merge Gate / All Gates Passed' in .github/DEFAULT_GITHUB_AUTOMATION.md"
            exit 1
          fi
