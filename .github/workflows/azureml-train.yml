# =============================================================================
# AzureML LoRA Training - Cloud-based model fine-tuning
# =============================================================================
# Purpose: Submits LoRA fine-tuning jobs to Azure ML
# Triggers: Manual workflow_dispatch only
# Jobs:
#   - submit-job: Submits Azure ML training job with specified parameters
# Note: Requires Azure credentials and ML workspace configuration
# =============================================================================

name: AzureML LoRA Train

on:
  workflow_dispatch:
    inputs:
      subscriptionId:
        description: Azure subscription ID
        required: true
      resourceGroup:
        description: Resource group name
        required: true
      workspaceName:
        description: Azure ML workspace name
        required: true
      compute:
        description: Azure ML compute target (e.g., azureml:gpu-cluster)
        required: true
        default: azureml:gpu-cluster
      jobFile:
        description: Job YAML path (single run or sweep)
        required: true
        default: AI/microsoft_phi-silica-3.6_v1/azureml/job-lora-train.yml

permissions:
  id-token: write
  contents: read

jobs:
  submit-job:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5  # v2.3.0
        with:
          # Create an Azure AD app and set its JSON creds in this secret:
          # { "clientId": "...", "clientSecret": "...", "subscriptionId": "...", "tenantId": "..." }
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI
        uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956  # v2.2.0
        with:
          inlineScript: |
            az extension add -n ml -y
            az account set --subscription "$SUBSCRIPTION_ID"
            az configure --defaults group="$RESOURCE_GROUP" workspace="$WORKSPACE_NAME"
        env:
          SUBSCRIPTION_ID: ${{ github.event.inputs.subscriptionId }}
          RESOURCE_GROUP: ${{ github.event.inputs.resourceGroup }}
          WORKSPACE_NAME: ${{ github.event.inputs.workspaceName }}

      - name: Submit Azure ML job
        uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956  # v2.2.0
        with:
          inlineScript: |
            echo "Submitting job from $JOB_FILE ..."
            az ml job create -f "$JOB_FILE" --set compute="$COMPUTE_TARGET" --stream
        env:
          JOB_FILE: ${{ github.event.inputs.jobFile }}
          COMPUTE_TARGET: ${{ github.event.inputs.compute }}
