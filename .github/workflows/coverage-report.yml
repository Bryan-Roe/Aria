# =============================================================================
# Coverage Report - Test coverage tracking and PR diff comments
# =============================================================================
# Purpose: Measures pytest coverage, stores a baseline artifact on main,
#          and posts an updated coverage diff comment on every PR.
# Triggers: push to main, pull_request to main/dev, workflow_dispatch
# Jobs:
#   - coverage: Run tests with --cov, extract %, upload artifact, post PR comment
# =============================================================================

name: Coverage Report

on:
    push:
        branches: [main]
    pull_request:
        branches: [main, dev]
    workflow_dispatch:

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: coverage-${{ github.ref }}
    cancel-in-progress: true

jobs:
    coverage:
        name: Measure Coverage
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

            - name: Setup Python
              uses: ./.github/actions/setup-python-env
              with:
                  extra-packages: "pytest pytest-cov"

            - name: Run tests with coverage
              id: run
              run: |
                  python -m pytest tests/ \
                    --cov=. \
                    --cov-report=xml:coverage.xml \
                    --cov-report=term-missing:skip-covered \
                    --ignore=data_out --ignore=mount \
                    -q --tb=short 2>&1 | tee pytest-out.txt || true

                  TOTAL=$(python3 - <<'PYEOF'
                  import xml.etree.ElementTree as ET, sys
                  try:
                      root = ET.parse('coverage.xml').getroot()
                      print(f"{float(root.attrib['line-rate'])*100:.1f}")
                  except Exception as e:
                      sys.stderr.write(str(e) + '\n')
                      print("0.0")
                  PYEOF
                  )
                  echo "total=$TOTAL" >> $GITHUB_OUTPUT
                  echo "Coverage: $TOTAL%"
              env:
                  PYTHONPATH: ${{ github.workspace }}

            # On main pushes → store as the next PR's baseline
            - name: Upload main baseline artifact
              if: github.ref == 'refs/heads/main'
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
              with:
                  name: coverage-main-baseline
                  path: coverage.xml
                  if-no-files-found: warn
                  retention-days: 90
                  overwrite: true

            # On PRs → also upload per-SHA artifact for auditability
            - name: Upload PR coverage artifact
              if: github.event_name == 'pull_request'
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
              with:
                  name: coverage-pr-${{ github.event.pull_request.number }}
                  path: coverage.xml
                  if-no-files-found: warn
                  retention-days: 30
                  overwrite: true

            # PRs → download main baseline for comparison
            - name: Download main baseline
              if: github.event_name == 'pull_request'
              id: dl-base
              uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11  # v6
              with:
                  name: coverage-main-baseline
                  workflow: coverage-report.yml
                  branch: main
                  path: baseline
                  if_no_artifact_found: warn
              continue-on-error: true

            - name: Parse baseline coverage
              if: github.event_name == 'pull_request'
              id: baseline
              run: |
                  BASE=$(python3 - <<'PYEOF'
                  import xml.etree.ElementTree as ET, glob, sys
                  files = glob.glob('baseline/**/*.xml', recursive=True) + glob.glob('baseline/*.xml')
                  if not files:
                      print("")
                      sys.exit(0)
                  try:
                      root = ET.parse(files[0]).getroot()
                      print(f"{float(root.attrib['line-rate'])*100:.1f}")
                  except Exception as e:
                      sys.stderr.write(str(e) + '\n')
                      print("")
                  PYEOF
                  )
                  echo "total=$BASE" >> $GITHUB_OUTPUT

            - name: Post PR coverage comment
              if: github.event_name == 'pull_request'
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
              env:
                  COV_TOTAL: ${{ steps.run.outputs.total }}
                  COV_BASE: ${{ steps.baseline.outputs.total }}
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const total = parseFloat(process.env.COV_TOTAL || '0');
                      const baseRaw = process.env.COV_BASE;
                      const base = baseRaw ? parseFloat(baseRaw) : null;
                      const sha = context.sha.slice(0, 7);
                      const badge = total >= 80 ? '🟢' : total >= 60 ? '🟡' : '🔴';

                      const rows = [`| Total coverage | **${total}%** |`];
                      if (base !== null && !isNaN(base)) {
                        const d = (total - base).toFixed(1);
                        const sign = parseFloat(d) > 0 ? '+' : '';
                        const arrow = parseFloat(d) > 0 ? '▲' : parseFloat(d) < 0 ? '▼' : '→';
                        rows.push(`| ${arrow} vs \`main\` | ${sign}${d}% |`);
                      }
                      rows.push('| Minimum threshold | 60% |');

                      const body = [
                        `## ${badge} Coverage — \`${sha}\``,
                        '',
                        '| Metric | Value |',
                        '|--------|-------|',
                        ...rows,
                        '',
                        `> Updated on every push · ${new Date().toISOString().slice(0, 10)}`,
                      ].join('\n');

                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });

                      const existing = comments.find(c =>
                        c.user.login === 'github-actions[bot]' && c.body.includes('Coverage —')
                      );

                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }

            - name: Write step summary
              if: always()
              run: |
                  T="${{ steps.run.outputs.total }}"
                  echo "## Coverage: ${T}%" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
                  echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
                  echo "| Total | ${T}% |" >> $GITHUB_STEP_SUMMARY
                  echo "| Threshold | 60% |" >> $GITHUB_STEP_SUMMARY
                  if [ -f pytest-out.txt ]; then
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "<details><summary>pytest output</summary>" >> $GITHUB_STEP_SUMMARY
                    printf '\n```\n' >> $GITHUB_STEP_SUMMARY
                    tail -40 pytest-out.txt >> $GITHUB_STEP_SUMMARY
                    printf '```\n\n</details>\n' >> $GITHUB_STEP_SUMMARY
                  fi
