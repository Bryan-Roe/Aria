name: Site Bundle Validation

on:
  pull_request:
    paths:
      - 'generated_sites/**'
      - 'scripts/validate_site_bundles.py'
      - '.github/actions/validate-site-bundles/**'
      - '.github/workflows/site-bundle-validation.yml'
  push:
    branches: [ main ]
    paths:
      - 'generated_sites/**'
      - 'scripts/validate_site_bundles.py'
      - '.github/actions/validate-site-bundles/**'
      - '.github/workflows/site-bundle-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  UPLOAD_ARTIFACT_SHA: 65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0

defaults:
  run:
    shell: bash

jobs:
  validate-generated-sites:
    name: Validate Generated Site Bundles
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          install-requirements: 'false'

      - name: Validate generated site bundles (strict)
        uses: ./.github/actions/validate-site-bundles
        with:
          strict-metadata: 'true'

      - name: Upload validation context
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: generated-site-bundles-${{ github.run_number }}
          retention-days: 7
          if-no-files-found: warn
          path: |
            generated_sites/**/metadata.json
