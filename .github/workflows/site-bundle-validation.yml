name: Site Bundle Validation

on:
  pull_request:
    paths:
      - 'generated_sites/**'
      - 'scripts/validate_site_bundles.py'
      - '.github/actions/validate-site-bundles/**'
      - '.github/workflows/site-bundle-validation.yml'
  push:
    branches: [ main ]
    paths:
      - 'generated_sites/**'
      - 'scripts/validate_site_bundles.py'
      - '.github/actions/validate-site-bundles/**'
      - '.github/workflows/site-bundle-validation.yml'
  workflow_dispatch:

jobs:
  validate-generated-sites:
    name: Validate Generated Site Bundles
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          install-requirements: 'false'

      - name: Validate generated site bundles (strict)
        uses: ./.github/actions/validate-site-bundles
        with:
          strict-metadata: 'true'

      - name: Upload validation context
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: generated-site-bundles-${{ github.run_number }}
          retention-days: 7
          if-no-files-found: warn
          path: |
            generated_sites/**/metadata.json
