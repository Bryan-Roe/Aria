name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Quick Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          extra-packages: 'pyyaml'

      - name: Validate workflow YAML files
        uses: ./.github/actions/validate-workflow-yaml
        with:
          workflows-path: .github/workflows
          require-jobs: 'true'

      - name: Validate Azure Function bindings
        uses: ./.github/actions/validate-function-bindings
        with:
          functions-path: functions
          require-http-route: 'true'

      - name: Validate generated site bundles (strict)
        uses: ./.github/actions/validate-site-bundles
        with:
          strict-metadata: 'true'

      - name: Check for TODO/FIXME in changed files
        uses: ./.github/actions/scan-todo-fixme
        with:
          base-ref: ${{ github.base_ref }}
        continue-on-error: true

      - name: Fast validation
        run: |
          if [ -f scripts/fast_validate.py ]; then
            python scripts/fast_validate.py
          else
            echo "Fast validate script not found, skipping"
          fi

  description-check:
    name: PR Description Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      MIN_DESCRIPTION_LENGTH: 100
    steps:
      - name: Check PR description is filled in
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          MIN_DESCRIPTION_LENGTH: ${{ env.MIN_DESCRIPTION_LENGTH }}
        run: |
          UNFILLED_PATTERNS=(
            "What does this change do"
            "List of user-visible changes"
            "How was this tested"
            "Replace ALL placeholder text"
          )

          FAILED=0
          for pattern in "${UNFILLED_PATTERNS[@]}"; do
            if echo "$PR_BODY" | grep -qF "$pattern"; then
              echo "❌ PR description still contains unfilled placeholder: '$pattern'"
              FAILED=1
            fi
          done

          # Require a minimum body length (more than just the template boilerplate)
          BODY_LENGTH=$(echo "$PR_BODY" | wc -c)
          if [ "$BODY_LENGTH" -lt "$MIN_DESCRIPTION_LENGTH" ]; then
            echo "❌ PR description is too short ($BODY_LENGTH chars, minimum $MIN_DESCRIPTION_LENGTH). Please fill in the Summary, Changes, and Testing sections."
            FAILED=1
          fi

          # Warn if the PR title looks like a default codespace/branch name (advisory only)
          if echo "$PR_TITLE" | grep -qiE "^(pending changes|exported from|codespace|untitled|draft|wip)"; then
            echo "⚠️  PR title looks like a default/generated name: '$PR_TITLE'. Consider using a descriptive title."
          fi

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Please update the PR description with:"
            echo "  - Summary: What changed and why"
            echo "  - Changes: Bullet list of user-visible changes"
            echo "  - Testing: Commands run and their outcomes"
            exit 1
          fi

          echo "✓ PR description looks filled in ($BODY_LENGTH chars)"

  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        id: size
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          ADDITIONS=$(git diff "$BASE_SHA"..."$HEAD_SHA" --numstat | awk '{sum+=$1} END {print sum}')
          DELETIONS=$(git diff "$BASE_SHA"..."$HEAD_SHA" --numstat | awk '{sum+=$2} END {print sum}')
          FILES_CHANGED=$(git diff "$BASE_SHA"..."$HEAD_SHA" --name-only | wc -l)

          echo "Files changed: $FILES_CHANGED"
          echo "Lines added: $ADDITIONS"
          echo "Lines deleted: $DELETIONS"

          # Warn if PR is very large
          if [ "$FILES_CHANGED" -gt 50 ] || [ "$ADDITIONS" -gt 1000 ]; then
            echo "⚠️ Warning: This is a large PR. Consider breaking it into smaller PRs for easier review."
            echo "pr_size=large" >> $GITHUB_OUTPUT
          else
            echo "✓ PR size looks good"
            echo "pr_size=normal" >> $GITHUB_OUTPUT
          fi

  label-pr:
    name: Auto-label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Label PR based on files changed
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b  # v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
