# =============================================================================
# Aria Platform — CI Workflow (improved)
# =============================================================================
# - Faster installs via pip cache
# - Unit tests run on Linux + Windows (matrix) to catch cross-platform issues
# - Consolidated install steps and consistent caching keys
# - mypy remains advisory until the baseline is fixed
# - Final `ci-success` aggregates required checks for branch protection
# =============================================================================

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

defaults:
  run:
    shell: bash
    # Strict mode catches errors early and makes pipes fail loudly.
    # (Configured via `bash --noprofile --norc -eo pipefail {0}` implicitly by
    #  GitHub Actions; we additionally enable `nounset` in scripts below.)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.2
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  ACTIONS_CACHE_SHA: 1bd1e32a3bdc45362d1e726936510720a7c30a57   # v4.2.0
  SETUP_PYTHON_SHA: a26af69be951a213d495a4c3e4e4022e16d87065    # v5.6.0
  UPLOAD_ARTIFACT_SHA: 65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
  PYTHON_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  LINT_PATHS: "shared/ scripts/ apps/aria/server.py tests/"

jobs:
  # ---------------------------------------------------------------------------
  # Lint (ruff + black)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57
        with:
          path: ~/.cache/pip
          key: pip-cache-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements*.txt','pyproject.toml','constraints.txt','requirements-dev.txt') }}
          restore-keys: |
            pip-cache-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install lint dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements-dev.txt ]]; then
            python -m pip install -r requirements-dev.txt
          fi
          # Ensure ruff and black are available (prefer pinned dev reqs)
          python -m pip install "ruff>=0.5,<1.0" "black>=24.0,<26.0"

      - name: Ruff (lint)
        run: ruff check ${LINT_PATHS} --output-format=github

      - name: Black (format check)
        run: black --check --quiet ${LINT_PATHS}

  # ---------------------------------------------------------------------------
  # Type checks (mypy) — advisory until baseline is clean
  # ---------------------------------------------------------------------------
  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache mypy
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57
        with:
          path: |
            ~/.cache/pip
            .mypy_cache
          key: mypy-pip-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('shared/**/*.py','pyproject.toml','requirements*.txt','constraints.txt') }}
          restore-keys: |
            mypy-pip-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          if [[ -f constraints.txt && -f requirements.txt ]]; then
            python -m pip install -r requirements.txt -c constraints.txt
          elif [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install "mypy>=1.10,<2.0" pydantic pydantic-settings

      - name: Run mypy on shared/
        # Keep advisory until the baseline is fixed; flip `continue-on-error` to false to enforce.
        continue-on-error: true
        run: mypy shared/ --ignore-missing-imports --show-error-codes

  # ---------------------------------------------------------------------------
  # Unit tests (pytest) — matrix: ubuntu + windows
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests (pytest) — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57
        with:
          path: ~/.cache/pip
          key: pip-cache-${{ matrix.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements*.txt','pyproject.toml','constraints.txt','requirements-dev.txt') }}
          restore-keys: |
            pip-cache-${{ matrix.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          if [[ -f constraints.txt && -f requirements.txt ]]; then
            python -m pip install -r requirements.txt -c constraints.txt
          elif [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt
          fi
          if [[ -f requirements-dev.txt ]]; then
            python -m pip install -r requirements-dev.txt
          fi
          python -m pip install pydantic pydantic-settings tenacity pytest pytest-cov
          python -m pip check || true

      - name: Run unit tests
        env:
          CI: "true"
          AZURE_CLIENT_ID: ""
          AZURE_TENANT_ID: ""
          AZURE_CLIENT_SECRET: ""
          OPENAI_API_KEY: ""
        run: |
          set -euo pipefail
          mkdir -p data_out
          python -m pytest tests/ \
            -q --tb=short \
            -m "not slow and not azure and not integration" \
            --ignore=tests/test_ui_playwright.py \
            --ignore=tests/test_ui_pyppeteer.py \
            --ignore=tests/test_ui_selenium.py \
            --maxfail=1 \
            --durations=10 \
            --junitxml=data_out/junit-${{ matrix.os }}.xml \
            --cov=shared --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml:data_out/coverage-${{ matrix.os }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: unit-test-results-${{ matrix.os }}
          path: |
            data_out/junit-${{ matrix.os }}.xml
            data_out/coverage-${{ matrix.os }}.xml
            data_out/
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Aggregate gate — required check for branch protection.
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, type-check, unit-tests]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPE_RESULT: ${{ needs.type-check.result }}
          TEST_RESULT: ${{ needs.unit-tests.result }}
        run: |
          set -euo pipefail
          echo "lint=$LINT_RESULT type-check=$TYPE_RESULT unit-tests=$TEST_RESULT"
          if [[ "$LINT_RESULT" != "success" || "$TEST_RESULT" != "success" ]]; then
            echo "::error::One or more required CI jobs failed."
            exit 1
          fi
          echo "All required CI jobs passed."
