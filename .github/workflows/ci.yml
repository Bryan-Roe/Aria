# =============================================================================
# Aria Platform — CI Workflow
# =============================================================================
# Runs on every pull request and push to main.
# Jobs: lint → type-check → unit-tests
#
# This is the fast feedback loop.  Integration / nightly jobs live in
# ci-pipeline.yml and nightly-regression.yml.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  # ---------------------------------------------------------------------------
  # Lint (ruff + black --check)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt
            pyproject.toml

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff black

      - name: Run ruff
        run: ruff check shared/ scripts/ apps/aria/server.py tests/ --output-format=github

      - name: Run black (check only)
        run: black --check --quiet shared/ scripts/ apps/aria/server.py tests/

  # ---------------------------------------------------------------------------
  # Type checks (mypy)
  # ---------------------------------------------------------------------------
  type-check:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip mypy pydantic pydantic-settings
          if [[ -f requirements.txt ]]; then pip install -r requirements.txt; fi

      - name: Run mypy on shared/
        run: mypy shared/ --ignore-missing-imports --no-error-summary || true

  # ---------------------------------------------------------------------------
  # Unit tests (pytest, no cloud)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then pip install -r requirements.txt; fi
          if [[ -f requirements-dev.txt ]]; then pip install -r requirements-dev.txt; fi
          python -m pip install pydantic pydantic-settings tenacity

      - name: Run unit tests
        run: |
          python -m pytest tests/ -q --tb=short \
            -m "not slow and not azure and not integration" \
            --ignore=tests/test_ui_playwright.py \
            --ignore=tests/test_ui_pyppeteer.py \
            --ignore=tests/test_ui_selenium.py \
            -x
        env:
          CI: "true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: data_out/
          retention-days: 7
