# =============================================================================
# Aria Platform — CI Workflow (improved for reliability)
# =============================================================================
# Runs on pull requests and pushes to main. Adds manual dispatch and reduces
# unnecessary runs by ignoring docs/markdown-only changes. Use fetch-depth: 0
# on checkout to ensure tools that rely on git history (tags, changelogs) work.
# Jobs: lint → type-check → unit-tests
# Improvements made:
# - Added workflow defaults to ensure consistent shell on Linux/macOS/Windows
# - Stabilized concurrency group to avoid referencing github.ref_name (not
#   available in some runner versions)
# - Minor step hardening and consistency updates
# =============================================================================

name: CI

on:
  push:
    branches: [main]
    # Avoid CI runs for documentation-only updates
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Cancel in-progress runs for the same branch on normal events (push/PR),
  # but keep manual workflow_dispatch runs from being auto-canceled.
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  # ---------------------------------------------------------------------------
  # Lint (ruff + black --check)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt
            pyproject.toml

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff black

      - name: Run ruff
        run: ruff check shared/ scripts/ apps/aria/server.py tests/ --output-format=github

      - name: Run black (check only)
        run: black --check --quiet shared/ scripts/ apps/aria/server.py tests/

  # ---------------------------------------------------------------------------
  # Type checks (mypy)
  # ---------------------------------------------------------------------------
  type-check:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Upgrade pip and install type-check deps (use constraints if present)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install mypy pydantic pydantic-settings
          if [[ -f constraints.txt && -f requirements.txt ]]; then
            pip install -r requirements.txt -c constraints.txt
          elif [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          fi

      - name: Run mypy on shared/
        run: mypy shared/ --ignore-missing-imports --no-error-summary || true

  # ---------------------------------------------------------------------------
  # Unit tests (pytest, no cloud)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt
            pyproject.toml

      - name: Upgrade pip and install dependencies (use constraints if present)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [[ -f constraints.txt && -f requirements.txt ]]; then
            pip install -r requirements.txt -c constraints.txt
          elif [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          fi
          if [[ -f requirements-dev.txt ]]; then pip install -r requirements-dev.txt; fi
          python -m pip install pydantic pydantic-settings tenacity
          pip check

      - name: Run unit tests
        run: |
          python -m pytest tests/ -q --tb=short \
            -m "not slow and not azure and not integration" \
            --ignore=tests/test_ui_playwright.py \
            --ignore=tests/test_ui_pyppeteer.py \
            --ignore=tests/test_ui_selenium.py \
            -x
        env:
          CI: "true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: data_out/
          retention-days: 7
