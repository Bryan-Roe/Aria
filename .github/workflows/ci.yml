name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-test-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install .[dev]

      - name: Ruff
        run: python -m ruff check shared/config.py shared/logging.py tests/test_shared_config.py

      - name: Black
        run: python -m black --check shared/config.py shared/logging.py tests/test_shared_config.py

      - name: Unit tests
        run: python -m pytest tests/test_shared_config.py tests/test_autonomous_training_orchestrator.py tests/test_aria_server.py tests/test_function_app_endpoints.py

      - name: Mypy
        run: python -m mypy shared/config.py shared/logging.py
