name: CI

# Canonical PR validation runs through merge-gate.yml.
# This workflow is for branch CI and manual validation runs.
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHON_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml

      - name: Install lint dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements-dev.txt ]]; then
            python -m pip install -r requirements-dev.txt
          else
            python -m pip install "ruff>=0.5,<1.0" "black>=24.0,<26.0"
          fi

      - name: Ruff (lint)
        run: |
          set -euo pipefail
          python -m ruff check shared scripts tests apps/aria/server.py --output-format=github

      - name: Black (format check)
        run: |
          set -euo pipefail
          python -m black --check --quiet shared scripts tests apps/aria/server.py

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml

      - name: Install type-check dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          if [[ -f constraints.txt && -f requirements.txt ]]; then
            python -m pip install -r requirements.txt -c constraints.txt
          elif [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt
          fi
          if [[ -f requirements-dev.txt ]]; then
            python -m pip install -r requirements-dev.txt
          fi
          python -m pip install "mypy>=1.10,<2.0"

      - name: Run mypy on shared/
        continue-on-error: true
        run: python -m mypy shared/ --ignore-missing-imports --show-error-codes

  unit-tests:
    name: Unit tests (pytest) — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt
            pyproject.toml

      - name: Install test dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          if [[ -f constraints.txt && -f requirements.txt ]]; then
            python -m pip install -r requirements.txt -c constraints.txt
          elif [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt
          fi
          if [[ -f requirements-dev.txt ]]; then
            python -m pip install -r requirements-dev.txt
          fi
          python -m pip install pytest pytest-cov
          python -m pip check || true

      - name: Run unit tests
        env:
          CI: "true"
          AZURE_CLIENT_ID: ""
          AZURE_TENANT_ID: ""
          AZURE_CLIENT_SECRET: ""
          OPENAI_API_KEY: ""
        run: |
          set -euo pipefail
          mkdir -p data_out
          python -m pytest tests/ \
            -q --tb=short \
            -m "not slow and not azure and not integration" \
            --ignore=tests/test_ui_playwright.py \
            --ignore=tests/test_ui_pyppeteer.py \
            --ignore=tests/test_ui_selenium.py \
            --maxfail=1 \
            --durations=10 \
            --junitxml=data_out/junit-${{ matrix.os }}.xml \
            --cov=shared --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml:data_out/coverage-${{ matrix.os }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: unit-test-results-${{ matrix.os }}
          path: |
            data_out/junit-${{ matrix.os }}.xml
            data_out/coverage-${{ matrix.os }}.xml
          retention-days: 7
          if-no-files-found: warn

  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, type-check, unit-tests]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPE_RESULT: ${{ needs.type-check.result }}
          TEST_RESULT: ${{ needs.unit-tests.result }}
        run: |
          set -euo pipefail
          echo "lint=$LINT_RESULT"
          echo "type-check=$TYPE_RESULT"
          echo "unit-tests=$TEST_RESULT"

          if [[ "$LINT_RESULT" != "success" ]]; then
            echo "::error::Lint job failed."
            exit 1
          fi

          if [[ "$TEST_RESULT" != "success" ]]; then
            echo "::error::Unit test job failed."
            exit 1
          fi

          if [[ "$TYPE_RESULT" != "success" ]]; then
            echo "::warning::Type check did not pass, but it is currently advisory."
          fi

          echo "All required CI jobs passed."
