name: Quantum AI Smoke

on:
  pull_request:
    paths:
      - 'quantum-ai/**'
      - '.github/workflows/quantum-ai-smoke.yml'
      - '.vscode/tasks.json'
  push:
    branches: [ main ]
    paths:
      - 'quantum-ai/**'
      - '.github/workflows/quantum-ai-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683      # v4.2.2
  UPLOAD_ARTIFACT_SHA: 65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0

defaults:
  run:
    shell: bash

concurrency:
  group: quantum-ai-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke-quantum-ai:
    name: Smoke Quantum Code LLM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: ./.github/actions/setup-python-env
        with:
          install-requirements: 'false'

      - name: Install quantum-ai smoke dependencies
        run: |
          python3 -m pip install -r quantum-ai/requirements-smoke.txt

      - name: Run quantum-ai smoke script
        uses: ./.github/actions/run-quantum-ai-smoke
        with:
          backend: classical
          epochs: '1'

      - name: Upload smoke context
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: quantum-ai-smoke-${{ github.run_number }}
          retention-days: 7
          if-no-files-found: warn
          path: |
            quantum-ai/results/
