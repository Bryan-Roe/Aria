name: Markdown Quality

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".markdownlint.jsonc"
      - ".markdownlint.yaml"
      - ".markdownlint-cli2.jsonc"
      - ".markdownlint-cli2.yaml"
      - ".github/workflows/markdown-quality.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".markdownlint.jsonc"
      - ".markdownlint.yaml"
      - ".markdownlint-cli2.jsonc"
      - ".markdownlint-cli2.yaml"
      - ".github/workflows/markdown-quality.yml"
  workflow_dispatch:
    inputs:
      fix:
        description: "Attempt to auto-fix markdown issues and upload patch as artifact"
        type: boolean
        default: false

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: markdown-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege: read-only by default.
permissions:
  contents: read

env:
  # Opt into Node.js 24 for JS actions ahead of June 2026 forced migration.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HARDEN_RUNNER_SHA: 0634a2670c59f64b4a01f0f96f84700a4088b9f0
  CHECKOUT_SHA: 11bd71901bbe5b1630ceea73d27597364c9af683
  UPLOAD_ARTIFACT_SHA: 65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
  MARKDOWNLINT_ACTION_SHA: 6b51ade7a9e4a75a7ad929842dd298a3804ebe8b

defaults:
  run:
    shell: bash

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # Avoid leaving credentials on disk for subsequent steps.
          persist-credentials: false
          # Shallow clone is sufficient for linting changed/all markdown files.
          fetch-depth: 1

      - name: Lint Markdown files
        id: lint
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b
        with:
          # Lint all repo markdown except generated/output and mounted volumes.
          # Keep this list in sync with .markdownlintignore if present.
          globs: |
            **/*.md
            !**/node_modules/**
            !**/.venv/**
            !**/venv/**
            !**/.git/**
            !**/dist/**
            !**/build/**
            !**/.next/**
            !**/.cache/**
            !data_out/**
            !mount/**
            !**/CHANGELOG.md
          fix: ${{ github.event_name == 'workflow_dispatch' && inputs.fix == true }}

      - name: Generate auto-fix patch
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.fix == true }}
        run: |
          set -euo pipefail
          if ! git diff --quiet; then
            git diff > markdownlint-autofix.patch
            echo "Auto-fix patch generated."
          else
            echo "No auto-fix changes were produced." > markdownlint-autofix.patch
          fi

      - name: Upload auto-fix patch
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.fix == true }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: markdownlint-autofix-patch
          path: markdownlint-autofix.patch
          if-no-files-found: ignore
          retention-days: 7

      - name: Summary
        if: always()
        env:
          OUTCOME: ${{ steps.lint.outcome }}
        run: |
          {
            echo "## Markdown Quality"
            echo ""
            echo "Validated Markdown style and structure with **markdownlint-cli2**."
            echo ""
            echo "- Result: \`${OUTCOME}\`"
            echo "- Event: \`${GITHUB_EVENT_NAME}\`"
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo ""
            if [ "${OUTCOME}" != "success" ]; then
              echo "> ❌ Markdown lint failed. Run \`npx markdownlint-cli2 \"**/*.md\"\` locally, or re-run this workflow via \"Run workflow\" with **fix** enabled to download an auto-fix patch."
            else
              echo "> ✅ All Markdown files passed linting."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
