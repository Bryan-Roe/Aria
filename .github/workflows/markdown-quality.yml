name: Markdown Quality

on:
    pull_request:
        branches: [main, dev]
        paths:
            - "**/*.md"
            - ".github/workflows/markdown-quality.yml"
    push:
        branches: [main]
        paths:
            - "**/*.md"
            - ".github/workflows/markdown-quality.yml"
    workflow_dispatch:

concurrency:
    group: markdown-quality-${{ github.ref }}
    cancel-in-progress: true

jobs:
    markdownlint:
        name: markdownlint
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

            - name: Lint Markdown files
              uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b  # v23
              with:
                  globs: |
                      **/*.md
                      !data_out/**
                      !mount/**

            - name: Summary
              if: always()
              run: |
                  echo "## Markdown Quality" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Validated Markdown style and structure with markdownlint-cli2." >> $GITHUB_STEP_SUMMARY
