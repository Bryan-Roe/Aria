name: Markdown Quality

on:
    pull_request:
        branches: [main, dev]
        paths:
            - "**/*.md"
            - ".github/workflows/markdown-quality.yml"
    push:
        branches: [main]
        paths:
            - "**/*.md"
            - ".github/workflows/markdown-quality.yml"
    workflow_dispatch:

concurrency:
    group: markdown-quality-${{ github.ref }}
    cancel-in-progress: true

jobs:
    markdownlint:
        name: markdownlint
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Lint Markdown files
              uses: DavidAnson/markdownlint-cli2-action@6f63d6e6b784234ee39f53a9d1f6d2cde2d7d6b3 # v23
              with:
                  globs: |
                      **/*.md
                      !data_out/**
                      !mount/**

            - name: Summary
              if: always()
              run: |
                  echo "## Markdown Quality" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Validated Markdown style and structure with markdownlint-cli2." >> $GITHUB_STEP_SUMMARY
