# Dependabot configuration for Aria
# Docs: https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2

# Shared defaults to reduce repetition and improve maintainability
# Note: YAML anchors are used to DRY common settings.
_defaults: &defaults
  schedule:
    interval: "daily"
    time: "04:00"
    timezone: "UTC"
  labels:
    - "dependencies"
    - "autofix"
  assignees:
    - "Bryan-Roe"
  allow:
    - dependency-type: "direct"
    - dependency-type: "indirect"
  rebase-strategy: "auto"
  open-pull-requests-limit: 5

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    <<: *defaults
    commit-message:
      prefix: "deps(actions)"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "devcontainers"
    directory: "/"
    <<: *defaults
    commit-message:
      prefix: "deps(devcontainer)"

  - package-ecosystem: "pip"
    directory: "/"
    <<: *defaults
    commit-message:
      prefix: "deps(pip)"
    groups:
      python-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 10

  # Project-specific Python environments
  - package-ecosystem: "pip"
    directory: "/ai-projects/quantum-ml"
    <<: *defaults
    commit-message:
      prefix: "deps(quantum-ml)"
    groups:
      quantum-ml-deps:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/ai-projects/quantum-ml/production"
    <<: *defaults
    commit-message:
      prefix: "deps(quantum-prod)"
    groups:
      quantum-prod-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/ai-projects/chat-cli"
    <<: *defaults
    commit-message:
      prefix: "deps(chat-cli)"
    groups:
      chat-cli-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/ai-projects/cooking-ai"
    <<: *defaults
    commit-message:
      prefix: "deps(cooking-ai)"
    groups:
      cooking-ai-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/ai-projects/llm-maker"
    <<: *defaults
    commit-message:
      prefix: "deps(llm-maker)"
    groups:
      llm-maker-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/ai-projects/lora-training/microsoft_phi-silica-3.6_v1"
    <<: *defaults
    commit-message:
      prefix: "deps(lora)"
    groups:
      lora-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/ai-projects/lora-training/microsoft_phi-silica-3.6_v1/local_train"
    <<: *defaults
    commit-message:
      prefix: "deps(lora-local-train)"
    groups:
      lora-local-train-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/ai-projects/lora-training/quantum-ai"
    <<: *defaults
    commit-message:
      prefix: "deps(lora-quantum-ai)"
    groups:
      lora-quantum-ai-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/apps/dashboard"
    <<: *defaults
    commit-message:
      prefix: "deps(dashboard)"
    groups:
      dashboard-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/mount"
    <<: *defaults
    commit-message:
      prefix: "deps(mount)"
    groups:
      mount-deps:
        patterns:
          - "*"
