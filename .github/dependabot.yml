# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for more information:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
# https://containers.dev/guide/dependabot

version: 2
updates:
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(pip)"
    groups:
      python-dependencies:
        patterns:
          - "*"
    reviewers:
      - "Bryan-Roe"

  - package-ecosystem: "pip"
    directory: "/ai-projects/quantum-ml"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(quantum-ml)"
    groups:
      quantum-ml-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/ai-projects/quantum-ml/production"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(quantum-prod)"
    groups:
      quantum-prod-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/ai-projects/chat-cli"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(chat-cli)"
    groups:
      chat-cli-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/ai-projects/cooking-ai"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(cooking-ai)"
    groups:
      cooking-ai-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/ai-projects/llm-maker"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(llm-maker)"
    groups:
      llm-maker-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/ai-projects/lora-training/microsoft_phi-silica-3.6_v1"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(lora)"
    groups:
      lora-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/ai-projects/lora-training/quantum-ai"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(lora-quantum)"
    groups:
      lora-quantum-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/mount"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(mount)"
    groups:
      mount-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
    reviewers:
      - "Bryan-Roe"

